<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Lane Dash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#1A1221;overflow:hidden;font-family:'Montserrat',sans-serif;}
  #game-shell{position:relative;width:393px;height:852px;margin:0 auto;overflow:hidden;background:var(--bg);}
  :root{--bg:#1A1221;--primary:#EC4F99;--primary-light:#F6A7CC;--gold:#F5C842;}
  #phaser-container{position:absolute;top:0;left:0;width:393px;height:852px;z-index:1;}
  #phaser-container canvas{display:block;}

  .title-bar{position:absolute;top:0;left:0;width:100%;height:76px;background:var(--primary);z-index:10;display:flex;align-items:center;justify-content:center;}
  .title-bar::after{content:'';position:absolute;bottom:-12px;left:0;width:100%;height:12px;background-image:radial-gradient(circle at 12px 0px,var(--primary) 12px,transparent 12px);background-size:24px 12px;background-repeat:repeat-x;}
  .title-text{font-weight:900;font-size:18px;color:#fff;}

  /* ── Status bar: lives left, score center, timer right ── */
  .status-bar{position:absolute;top:96px;left:0;width:100%;height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:10;}
  .status-bar .lives{font-weight:900;font-size:18px;color:#FF4D6A;letter-spacing:2px;}
  .status-bar .score-wrap{display:flex;align-items:center;}
  .status-bar .score-label{font-weight:700;font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;}
  .status-bar .score-val{font-weight:900;font-size:16px;color:#fff;margin-left:6px;}
  .score-delta{font-weight:900;font-size:14px;opacity:0;pointer-events:none;margin-left:4px;}
  .score-delta.pop{animation:deltaPop 0.8s ease-out forwards;}
  .score-delta.plus{color:#4FECA2;}.score-delta.minus{color:#FF4D6A;}
  @keyframes deltaPop{0%{opacity:1;transform:translateY(0);}60%{opacity:1;transform:translateY(-6px);}100%{opacity:0;transform:translateY(-14px);}}
  .status-bar .timer-val{font-weight:900;font-size:16px;color:#fff;}
  .status-bar .timer-val.warn{color:#FF4D6A;}

  .combo-text{position:absolute;top:136px;left:50%;transform:translateX(-50%);font-weight:900;font-size:15px;color:var(--primary);z-index:10;text-shadow:0 0 6px rgba(236,79,153,0.4);}

  /* ── Grade overlay ── */
  .grade-overlay{position:absolute;top:280px;left:0;width:100%;display:flex;flex-direction:column;align-items:center;z-index:11;}
  .grade-letter{font-weight:900;font-size:96px;line-height:1;}
  .grade-letter.pop-in{animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;}
  @keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
  .grade-score{font-weight:700;font-size:16px;color:#aaa;margin-top:4px;}
  .stars-row{position:absolute;top:440px;left:0;width:100%;display:flex;justify-content:center;gap:12px;z-index:11;}
  .stars-row .star{font-size:30px;opacity:0;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;}
  .stars-row .star.filled{color:#F5C842;}.stars-row .star.empty{color:#555;}
  .result-info{position:absolute;top:490px;left:0;width:100%;text-align:center;z-index:11;}
  .result-info .attr-mod{font-weight:700;font-size:16px;color:#aaa;margin-bottom:12px;}
  .result-info .stats{display:flex;justify-content:center;gap:40px;font-weight:700;font-size:14px;color:#fff;}

  .rules-card{position:absolute;top:260px;left:50%;transform:translateX(-50%);width:310px;padding:24px 20px;background:rgba(255,255,255,0.95);border-radius:20px;z-index:15;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.25);}
  .rules-card h2{font-weight:900;font-size:20px;color:var(--primary);margin-bottom:10px;}
  .rules-card p{font-weight:700;font-size:14px;color:#333;line-height:1.8;}

  .btn-area{position:absolute;bottom:20px;left:12px;right:12px;display:flex;flex-direction:column;gap:14px;z-index:10;}
  .btn-row{display:flex;gap:10px;justify-content:center;}
  .btn-candy{position:relative;height:64px;border-radius:24px;border:2px solid var(--primary);box-shadow:0 4px 0 rgba(0,0,0,0.15);overflow:hidden;cursor:pointer;z-index:10;-webkit-tap-highlight-color:transparent;user-select:none;}
  .btn-candy.full{width:369px;}
  .btn-candy.half{width:175px;height:56px;}
  .btn-candy .base{position:absolute;inset:0;background:var(--primary);border-radius:22px;}
  .btn-candy .glass{position:absolute;inset:0;background:rgba(255,255,255,0.3);border-radius:22px;}
  .btn-candy .highlight{position:absolute;left:0;right:0;top:2px;height:20px;background:rgba(255,255,255,0.3);border-radius:20px 20px 0 0;}
  .btn-candy .glow{position:absolute;inset:0;box-shadow:inset 0 0 4px 4px rgba(255,255,255,0.5);border-radius:22px;pointer-events:none;}
  .btn-candy .label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;z-index:1;gap:8px;}
  .btn-candy.half .label{font-size:20px;}
  .btn-candy:active{transform:translateY(3px);box-shadow:none;}
  .hidden{display:none !important;}
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="game-shell">
  <div id="phaser-container"></div>
  <div class="title-bar"><span class="title-text" id="title-text">Lane Dash</span></div>
  <div class="status-bar hidden" id="status-bar">
    <span class="lives" id="lives-display">&hearts;&hearts;&hearts;</span>
    <div class="score-wrap"><span class="score-label">SCORE</span><span class="score-val" id="score-value">0</span><span class="score-delta" id="score-delta"></span></div>
    <span class="timer-val" id="timer-value">30s</span>
  </div>
  <div class="combo-text hidden" id="combo-text"></div>
  <div class="rules-card hidden" id="rules-card"><h2>3-LANE SPRINT</h2><p>Tap LEFT or RIGHT to switch lanes.<br>Dodge falling obstacles to survive.<br>Speed increases as you progress!</p></div>
  <div class="grade-overlay hidden" id="grade-overlay"><div class="grade-letter pop-in" id="grade-letter"></div><div class="grade-score" id="grade-score"></div></div>
  <div class="stars-row hidden" id="stars-row"></div>
  <div class="result-info hidden" id="result-info"><div class="attr-mod" id="attr-mod"></div><div class="stats"><span id="stat-combo"></span><span id="stat-hits"></span></div></div>
  <div class="btn-area" id="btn-area"></div>
</div>

<script>
var CTX=window.__EPISODE_CTX__||{};var params=new URLSearchParams(window.location.search);
var ATTRIBUTE=CTX.attribute||params.get('attribute')||'Agility';
var PRIMARY_COLOR=CTX.primaryColor||params.get('primaryColor')||'#EC4F99';
var DISPLAY_ATTRIBUTE=(CTX.character&&CTX.character.name?CTX.character.name+'\u7684':'')+ATTRIBUTE;
var EPISODE_LABEL=CTX.episodeLabel||params.get('episodeLabel')||'';
var EPISODE_TITLE=CTX.episodeTitle||params.get('episodeTitle')||'Lane Dash';
var W=393,H=852,ROUND_SECONDS=30;
var RATING_THRESHOLDS={S:320,A:240,B:170,C:105};
var MODIFIER_BY_RATING={S:3,A:1,B:0,C:-1};

var THEMES={combat:{bg:'#1A1221',primary:'#EC4F99',primaryLight:'#F6A7CC',gold:'#F5C842'},sweet:{bg:'#FFF0F5',primary:'#FF6B9D',primaryLight:'#FFB5D5',gold:'#FFD700'},cyber:{bg:'#0A0E1A',primary:'#00E5FF',primaryLight:'#80F0FF',gold:'#FFD740'},nature:{bg:'#1A2E1A',primary:'#4FECA2',primaryLight:'#A0F5D0',gold:'#F5C842'}};
var themeName=CTX.theme||params.get('theme')||'combat';
var TH=THEMES[themeName]||THEMES.combat;
document.documentElement.style.setProperty('--bg',TH.bg);
document.documentElement.style.setProperty('--primary',PRIMARY_COLOR||TH.primary);
document.documentElement.style.setProperty('--primary-light',TH.primaryLight);
document.documentElement.style.setProperty('--gold',TH.gold);
document.getElementById('game-shell').style.background=TH.bg;

function getRating(s){if(s>=RATING_THRESHOLDS.S)return'S';if(s>=RATING_THRESHOLDS.A)return'A';if(s>=RATING_THRESHOLDS.B)return'B';return'C';}
function getModifier(r){return MODIFIER_BY_RATING[r];}
function notifyGameComplete(r){var p=JSON.stringify(r);if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.jsBridge){window.webkit.messageHandlers.jsBridge.postMessage(p);return;}if(window.jsBridge&&window.jsBridge.postMessage){window.jsBridge.postMessage(p);return;}if(window.parent!==window){window.parent.postMessage(p,'*');return;}console.log('[GameComplete]',r);}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function $(id){return document.getElementById(id);}
function setVisible(id,v){var el=$(id);if(!el)return;if(v)el.classList.remove('hidden');else el.classList.add('hidden');}
function makeCandyButton(label,cls,fs,onClick){var b=document.createElement('div');b.className='btn-candy '+(cls||'full');b.innerHTML='<div class="base"></div><div class="glass"></div><div class="highlight"></div><div class="glow"></div><div class="label" style="font-size:'+(fs||18)+'px">'+label+'</div>';b.addEventListener('pointerdown',function(e){e.preventDefault();audio.tap();});b.addEventListener('pointerup',function(e){e.preventDefault();if(onClick)onClick();});return b;}
function clearBtnArea(){$('btn-area').innerHTML='';}
function deltaPop(val){var el=$('score-delta');el.textContent=(val>0?'+':'')+val;el.className='score-delta pop '+(val>0?'plus':'minus');setTimeout(function(){el.className='score-delta';},800);}
function fitShell(){var sh=$('game-shell');var s=Math.min(window.innerWidth/393,window.innerHeight/852);sh.style.transform='scale('+s+')';sh.style.transformOrigin='top center';sh.style.marginTop=Math.max(0,(window.innerHeight-852*s)/2)+'px';}
window.addEventListener('resize',fitShell);fitShell();
(function(){var t=EPISODE_LABEL?EPISODE_LABEL+': '+EPISODE_TITLE:EPISODE_TITLE;$('title-text').textContent=t;})();

class MoonAudio{constructor(){this._ctx=null;this._master=null;this._bgmNodes=[];this._unlocked=false;}_ensure(){if(this._ctx)return this._ctx;this._ctx=new(window.AudioContext||window.webkitAudioContext)();this._master=this._ctx.createGain();this._master.gain.value=0.5;this._master.connect(this._ctx.destination);return this._ctx;}unlock(){if(this._unlocked)return;this._ensure();if(this._ctx.state==='suspended')this._ctx.resume();this._unlocked=true;}tap(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.08);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.1);}success(){var c=this._ensure(),t=c.currentTime,m=this._master;[523,784].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.12);g.gain.linearRampToValueAtTime(0.22,t+i*0.12+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.3);o.connect(g).connect(m);o.start(t+i*0.12);o.stop(t+i*0.12+0.3);});}fail(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.linearRampToValueAtTime(80,t+0.25);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.3);}alert(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(220,t+0.15);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.2);}swoosh(){var c=this._ensure(),t=c.currentTime;var len=c.sampleRate*0.15,buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);var s=c.createBufferSource();s.buffer=buf;var f=c.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(2000,t);f.frequency.exponentialRampToValueAtTime(500,t+0.15);f.Q.value=2;var g=c.createGain();g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);s.connect(f).connect(g).connect(this._master);s.start(t);}heartbeat(){var c=this._ensure(),t=c.currentTime,m=this._master;[0,0.18].forEach(function(off){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(60,t+off);o.frequency.exponentialRampToValueAtTime(30,t+off+0.15);g.gain.setValueAtTime(0.3,t+off);g.gain.exponentialRampToValueAtTime(0.001,t+off+0.2);o.connect(g).connect(m);o.start(t+off);o.stop(t+off+0.2);});}tick(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=1000;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.06);}bgm(style){this.stopBgm();var c=this._ensure();var P={action:[[164.81,196,246.94],[174.61,220,261.63],[146.83,174.61,220],[155.56,196,246.94]],tense:[[130.81,155.56,196],[123.47,146.83,185],[116.54,138.59,174.61],[123.47,146.83,185]]};var ch=P[style]||P.action;var bt=style==='tense'?1.2:0.8;var ll=ch.length*bt;var mg=c.createGain();mg.gain.value=0;mg.gain.linearRampToValueAtTime(0.1,c.currentTime+1);mg.connect(this._master);var sc=function(){var now=c.currentTime;ch.forEach(function(chord,ci){var ct=now+ci*bt;chord.forEach(function(f){var o=c.createOscillator(),e=c.createGain();o.type='sawtooth';o.frequency.value=f;e.gain.setValueAtTime(0,ct);e.gain.linearRampToValueAtTime(0.06,ct+0.05);e.gain.setValueAtTime(0.06,ct+bt*0.7);e.gain.linearRampToValueAtTime(0,ct+bt);o.connect(e).connect(mg);o.start(ct);o.stop(ct+bt);});var b=c.createOscillator(),be=c.createGain();b.type='sine';b.frequency.value=chord[0]/2;be.gain.setValueAtTime(0,ct);be.gain.linearRampToValueAtTime(0.1,ct+0.03);be.gain.setValueAtTime(0.1,ct+bt*0.5);be.gain.linearRampToValueAtTime(0,ct+bt);b.connect(be).connect(mg);b.start(ct);b.stop(ct+bt);});};sc();var self=this;var iid=setInterval(function(){if(!self._ctx||self._ctx.state==='closed'){clearInterval(iid);return;}sc();},ll*1000);this._bgmNodes.push({masterGain:mg,intervalId:iid});}stopBgm(fadeMs){var fade=(fadeMs||500)/1000;if(!this._ctx)return;var t=this._ctx.currentTime;for(var n of this._bgmNodes){if(n.intervalId)clearInterval(n.intervalId);if(n.masterGain)n.masterGain.gain.linearRampToValueAtTime(0,t+fade);}this._bgmNodes=[];}stopAll(){this.stopBgm(200);}}
var audio=new MoonAudio();

function hexToInt(h){return parseInt(h.replace('#',''),16);}
var PRIMARY_INT=hexToInt(PRIMARY_COLOR||TH.primary);var GOLD_INT=hexToInt(TH.gold);var DANGER_INT=hexToInt('#FF4D6A');

function spawnParticles(scene,x,y,color,count,life){for(var i=0;i<count;i++){var a=(Math.PI*2*i)/count+Math.random()*0.3;var sp=80+Math.random()*120;var sz=3+Math.random()*4;var p=scene.add.circle(x,y,sz,color,1).setDepth(50);scene.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scaleX:0.2,scaleY:0.2,duration:life||400,ease:'Quad.easeOut',onComplete:function(){p.destroy();}});}}
function showToast(scene,text,colorHex,x,y){var t=scene.add.text(x,y,text,{fontFamily:'Montserrat',fontSize:'28px',fontStyle:'900',color:colorHex,stroke:'#ffffff',strokeThickness:4}).setOrigin(0.5).setDepth(60).setAlpha(0);scene.tweens.add({targets:t,y:y-30,alpha:1,duration:200,ease:'Back.easeOut',onComplete:function(){scene.time.delayedCall(600,function(){scene.tweens.add({targets:t,y:y-50,alpha:0,duration:200,onComplete:function(){t.destroy();}});});}});}
function screenShake(sc,i){sc.cameras.main.shake(150,i||0.008);}
function damageFlash(scene){var f=scene.add.rectangle(W/2,H/2,W,H,0xff4d6a,0).setDepth(80);scene.tweens.add({targets:f,alpha:0.3,yoyo:true,duration:80,onComplete:function(){f.destroy();}});}

function drawRRect(gfx,x,y,w,h,r){gfx.beginPath();gfx.moveTo(x+r,y);gfx.lineTo(x+w-r,y);gfx.arc(x+w-r,y+r,r,-Math.PI/2,0);gfx.lineTo(x+w,y+h-r);gfx.arc(x+w-r,y+h-r,r,0,Math.PI/2);gfx.lineTo(x+r,y+h);gfx.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);gfx.lineTo(x,y+r);gfx.arc(x+r,y+r,r,Math.PI,-Math.PI/2);gfx.closePath();}

// Lane positions — 3 equal lanes spanning full width
var LANES = [W/6, W/2, W*5/6]; // 65.5, 196.5, 327.5
var LANE_TOP = 160;
var LANE_BOTTOM = 760;

// ══════════════════════════════════════════════════════════════════════════════
class BootScene extends Phaser.Scene{
  constructor(){super('BootScene');}
  create(){
    this.children.removeAll(true);
    setVisible('rules-card',true);setVisible('status-bar',false);setVisible('combo-text',false);
    setVisible('grade-overlay',false);setVisible('stars-row',false);setVisible('result-info',false);

    // Draw empty lanes preview
    var gfx=this.add.graphics().setDepth(2);
    // Lane backgrounds
    for(var i=0;i<3;i++){
      gfx.fillStyle(PRIMARY_INT,0.03+i*0.01);
      gfx.fillRect(i*131,LANE_TOP,131,LANE_BOTTOM-LANE_TOP);
    }
    // Lane dividers (dashed)
    gfx.lineStyle(2,0xffffff,0.1);
    for(var dy=LANE_TOP;dy<LANE_BOTTOM;dy+=24){gfx.lineBetween(131,dy,131,dy+12);gfx.lineBetween(262,dy,262,dy+12);}
    // Road markings
    gfx.lineStyle(3,0xffffff,0.06);
    gfx.lineBetween(0,LANE_TOP,W,LANE_TOP);
    gfx.lineBetween(0,LANE_BOTTOM,W,LANE_BOTTOM);

    clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('START','full',20,function(){audio.unlock();window.__game.scene.start('GameScene');}));
  }
}

// ══════════════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene{
  constructor(){super('GameScene');}
  init(){
    this.score=0;this.timeLeft=ROUND_SECONDS;this.isOver=false;
    this.player={lane:1,x:LANES[1],y:700,w:42,h:56};
    this.hazards=[];this.spawnMs=520;this.lives=3;this.invulnMs=0;
    this.combo=0;this.maxCombo=0;this.totalHits=0;this.totalMiss=0;
    this.lastTickSec=-1;this.audioStarted=false;this.difficulty=1;
    this.speedLineTimer=0;
  }
  create(){
    this.children.removeAll(true);
    var self=this;
    setVisible('rules-card',false);setVisible('status-bar',true);setVisible('combo-text',true);
    setVisible('grade-overlay',false);setVisible('stars-row',false);setVisible('result-info',false);
    $('score-value').textContent='0';$('timer-value').textContent=ROUND_SECONDS+'s';
    $('timer-value').classList.remove('warn');$('combo-text').textContent='';
    this.updateLives();

    this.graphics=this.add.graphics().setDepth(3);
    this.playerGfx=this.add.graphics().setDepth(10);
    this.laneGfx=this.add.graphics().setDepth(1);
    this.speedGfx=this.add.graphics().setDepth(2);

    // Draw static lane structure
    this.drawLanes();
    this.drawPlayer(PRIMARY_INT);

    // Buttons
    clearBtnArea();
    var row=document.createElement('div');row.className='btn-row';
    row.appendChild(makeCandyButton('\u25C0 LEFT','half',18,function(){self.moveLeft();}));
    row.appendChild(makeCandyButton('RIGHT \u25B6','half',18,function(){self.moveRight();}));
    $('btn-area').appendChild(row);

    // Touch zones: tap left/right half
    this.input.on('pointerdown',function(ptr){
      if(self.isOver)return;
      if(ptr.y<LANE_TOP||ptr.y>LANE_BOTTOM+40)return;
      if(ptr.x<W/2)self.moveLeft();else self.moveRight();
    });

    this.cursors=this.input.keyboard.createCursorKeys();
    this.input.once('pointerdown',function(){audio.unlock();audio.bgm('action');self.audioStarted=true;});
  }

  drawLanes(){
    var g=this.laneGfx;g.clear();
    for(var i=0;i<3;i++){g.fillStyle(PRIMARY_INT,0.03+i*0.01);g.fillRect(i*131,LANE_TOP,131,LANE_BOTTOM-LANE_TOP);}
    g.lineStyle(2,0xffffff,0.08);
    for(var dy=LANE_TOP;dy<LANE_BOTTOM;dy+=24){g.lineBetween(131,dy,131,dy+12);g.lineBetween(262,dy,262,dy+12);}
    g.lineStyle(3,0xffffff,0.06);g.lineBetween(0,LANE_TOP,W,LANE_TOP);g.lineBetween(0,LANE_BOTTOM,W,LANE_BOTTOM);
  }

  drawPlayer(color){
    var g=this.playerGfx;g.clear();var p=this.player;
    g.fillStyle(color,1);drawRRect(g,p.x-p.w/2,p.y-p.h/2,p.w,p.h,8);g.fillPath();
    g.lineStyle(2,0xffffff,0.3);drawRRect(g,p.x-p.w/2,p.y-p.h/2,p.w,p.h,8);g.strokePath();
    g.fillStyle(0xffffff,0.3);drawRRect(g,p.x-p.w/2+4,p.y-p.h/2+3,p.w-8,p.h*0.35,5);g.fillPath();
  }

  moveLeft(){if(this.isOver||this.player.lane<=0)return;this.player.lane-=1;this.player.x=LANES[this.player.lane];this.drawPlayer(PRIMARY_INT);audio.swoosh();}
  moveRight(){if(this.isOver||this.player.lane>=2)return;this.player.lane+=1;this.player.x=LANES[this.player.lane];this.drawPlayer(PRIMARY_INT);audio.swoosh();}

  updateLives(){var h='';for(var i=0;i<3;i++)h+=(i<this.lives?'\u2764':'\u2661');$('lives-display').innerHTML=h;}
  addScore(d){this.score=Math.max(0,this.score+d);$('score-value').textContent=Math.round(this.score);deltaPop(Math.round(d));}

  spawnHazard(){
    var lane=Math.floor(Math.random()*3);var x=LANES[lane];
    var hw=40,hh=64;
    var baseSpeed=240+this.difficulty*12;var vy=baseSpeed+Math.random()*130;
    this.hazards.push({lane:lane,x:x,y:LANE_TOP-hh,w:hw,h:hh,vy:vy,scored:false});
    audio.alert();
  }

  collides(a,b){return Math.abs(a.x-b.x)*2<(a.w+b.w)&&Math.abs(a.y-b.y)*2<(a.h+b.h);}

  finishGame(reason){
    if(this.isOver)return;this.isOver=true;audio.stopBgm(600);
    this.scene.start('ResultScene',{score:Math.round(this.score),maxCombo:this.maxCombo,hits:this.totalHits,misses:this.totalMiss,reason:reason||'time'});
  }

  update(time,delta){
    if(this.isOver)return;
    if(Phaser.Input.Keyboard.JustDown(this.cursors.left))this.moveLeft();
    if(Phaser.Input.Keyboard.JustDown(this.cursors.right))this.moveRight();

    this.timeLeft=Math.max(0,this.timeLeft-delta/1000);var sec=Math.ceil(this.timeLeft);
    $('timer-value').textContent=sec+'s';
    if(this.timeLeft<=10)$('timer-value').classList.add('warn');else $('timer-value').classList.remove('warn');
    if(this.timeLeft<=10&&sec!==this.lastTickSec&&sec>0){this.lastTickSec=sec;if(this.timeLeft<=5)audio.heartbeat();else audio.tick();}

    var dt=delta/1000;
    this.addScore(dt*3); // passive score
    this.difficulty=Math.min(12,1+(ROUND_SECONDS-this.timeLeft)*0.35);

    // Spawn
    this.spawnMs-=delta;
    if(this.spawnMs<=0){var bi=520,mi=200;this.spawnMs=Math.max(mi,bi-this.difficulty*22)+Math.random()*180;this.spawnHazard();}
    if(this.invulnMs>0)this.invulnMs-=delta;

    // Speed lines effect
    this.speedGfx.clear();
    this.speedLineTimer-=delta;
    if(this.speedLineTimer<=0){this.speedLineTimer=80;
      this.speedGfx.lineStyle(1,0xffffff,0.06);
      for(var sl=0;sl<4;sl++){var sx=30+Math.random()*(W-60);this.speedGfx.lineBetween(sx,LANE_TOP+Math.random()*100,sx,LANE_TOP+Math.random()*100+60);}
    }

    // Draw hazards
    this.graphics.clear();
    for(var i=this.hazards.length-1;i>=0;i--){
      var h=this.hazards[i];h.y+=h.vy*dt;
      // Draw hazard
      this.graphics.fillStyle(DANGER_INT,1);drawRRect(this.graphics,h.x-h.w/2,h.y-h.h/2,h.w,h.h,6);this.graphics.fillPath();
      this.graphics.lineStyle(2,0xffffff,0.15);drawRRect(this.graphics,h.x-h.w/2,h.y-h.h/2,h.w,h.h,6);this.graphics.strokePath();
      this.graphics.fillStyle(0xffffff,0.2);drawRRect(this.graphics,h.x-h.w/2+4,h.y-h.h/2+3,h.w-8,h.h*0.3,4);this.graphics.fillPath();

      if(!h.scored&&h.y>this.player.y+36){
        h.scored=true;this.combo+=1;this.maxCombo=Math.max(this.maxCombo,this.combo);this.totalHits+=1;
        var cb=Math.min(this.combo,5)*4;var gain=16+cb;this.addScore(gain);
        showToast(this,'+'+gain,TH.primary,this.player.x,this.player.y-40);
        $('combo-text').textContent='Combo x'+this.combo;audio.success();
        this.difficulty=Math.min(12,this.difficulty+0.2);
      }
      if(h.y>LANE_BOTTOM+40){this.hazards.splice(i,1);continue;}
      if(this.invulnMs<=0&&this.collides(h,this.player)){
        this.invulnMs=720;this.lives-=1;this.totalMiss+=1;this.combo=0;$('combo-text').textContent='';
        this.updateLives();this.addScore(-10);
        showToast(this,'Hit! -10','#FF4D6A',this.player.x,this.player.y-40);
        audio.fail();damageFlash(this);screenShake(this,0.012);
        this.drawPlayer(DANGER_INT);var self=this;this.time.delayedCall(160,function(){self.drawPlayer(PRIMARY_INT);});
        this.hazards.splice(i,1);
        if(this.lives<=0){this.finishGame('fail');return;}
      }
    }
    if(this.timeLeft<=0)this.finishGame('time');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
class ResultScene extends Phaser.Scene{
  constructor(){super('ResultScene');}
  init(data){this.finalScore=data.score||0;this.maxCombo=data.maxCombo||0;this.hits=data.hits||0;this.misses=data.misses||0;}
  create(){
    this.children.removeAll(true);
    var self=this;var rating=getRating(this.finalScore);var modifier=getModifier(rating);var modText=modifier>0?'+'+modifier:String(modifier);
    setVisible('status-bar',false);setVisible('combo-text',false);setVisible('rules-card',false);
    setVisible('grade-overlay',true);setVisible('stars-row',true);setVisible('result-info',true);
    var rH={S:TH.gold,A:TH.primary,B:'#9B7DB8',C:'#888888'};
    $('grade-letter').textContent=rating;$('grade-letter').style.color=rH[rating];$('grade-score').textContent='Score '+this.finalScore;
    var sc={S:4,A:3,B:2,C:1}[rating];var sh='';for(var i=0;i<4;i++){var f=i<sc;sh+='<span class="star '+(f?'filled':'empty')+'" style="animation-delay:'+(0.2+i*0.08)+'s">\u2605</span>';}$('stars-row').innerHTML=sh;
    $('attr-mod').textContent=DISPLAY_ATTRIBUTE+' '+modText;$('stat-combo').textContent='Combo '+this.maxCombo;$('stat-hits').textContent='Dodged '+this.hits+' / Hit '+this.misses;
    if(rating==='S'){spawnParticles(this,W/2,350,GOLD_INT,16,600);audio.success();this.time.delayedCall(100,function(){audio.success();});}else if(rating==='A'){audio.success();}
    this.add.rectangle(W/2,H/2,W,H,hexToInt(TH.bg),0.7).setDepth(0);
    clearBtnArea();$('btn-area').appendChild(makeCandyButton('CONTINUE','full',18,function(){notifyGameComplete({rating:rating,score:self.finalScore,attribute:ATTRIBUTE,modifier:modifier,gameId:'lane-dash',maxCombo:self.maxCombo,hits:self.hits,misses:self.misses});self.time.delayedCall(600,function(){self.scene.start('BootScene');});}));
  }
}

var DPR=Math.min(window.devicePixelRatio||1,2);
var config={type:Phaser.CANVAS,canvas:(function(){var c=document.createElement('canvas');$('phaser-container').appendChild(c);return c;})(),width:W*DPR,height:H*DPR,transparent:true,fps:{forceSetTimeOut:true},scene:[BootScene,GameScene,ResultScene],callbacks:{postBoot:function(game){game.canvas.style.width=W+'px';game.canvas.style.height=H+'px';game.scene.scenes.forEach(function(s){s.cameras.main.setZoom(DPR);});}}};
window.__game=new Phaser.Game(config);
</script>
