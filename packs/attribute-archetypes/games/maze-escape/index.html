<script>
// ── Host context ─────────────────────────────────────────────────────────────
const CTX = window.__EPISODE_CTX__ || {};
const params = new URLSearchParams(window.location.search);
const ATTRIBUTE = CTX.attribute || params.get('attribute') || 'Wisdom';
const PRIMARY_COLOR = CTX.primaryColor || params.get('primaryColor') || '#3B82F6';
const DISPLAY_ATTRIBUTE = (CTX.character && CTX.character.name ? CTX.character.name + '\u7684' : '') + ATTRIBUTE;

const W = 393;
const H = 736;
const ROUND_SECONDS = 30;
const RATING_THRESHOLDS = { S: 220, A: 160, B: 110, C: 70 };
const MODIFIER_BY_RATING = { S: 3, A: 1, B: 0, C: -1 };
// ── Procedural Maze Generator (DFS Recursive Backtracker) ────────────────────
// Guarantees S→K→E is always reachable. No hand-crafted data needed.
function generateMaze(cols, rows) {
  const w = 2 * cols + 1, h = 2 * rows + 1;
  const grid = [];
  for (let y = 0; y < h; y++) {
    const row = [];
    for (let x = 0; x < w; x++) row.push('#');
    grid[y] = row;
  }
  const visited = new Set();
  const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
  function carve(cx, cy) {
    visited.add(cx + ',' + cy);
    grid[cy * 2 + 1][cx * 2 + 1] = '.';
    const shuffled = dirs.slice().sort(() => Math.random() - 0.5);
    for (const [dx, dy] of shuffled) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited.has(nx + ',' + ny)) {
        grid[cy * 2 + 1 + dy][cx * 2 + 1 + dx] = '.';
        carve(nx, ny);
      }
    }
  }
  carve(0, 0);
  grid[1][1] = 'S';
  grid[h - 2][w - 2] = 'E';
  // Place key at a random dead-end (cell with only 1 open neighbour)
  const deadEnds = [];
  for (let cy = 0; cy < rows; cy++) {
    for (let cx = 0; cx < cols; cx++) {
      const gy = cy * 2 + 1, gx = cx * 2 + 1;
      if (grid[gy][gx] !== '.') continue; // skip S, E
      let openNeighbours = 0;
      for (const [dx, dy] of dirs) {
        if (grid[gy + dy]?.[gx + dx] === '.' || grid[gy + dy]?.[gx + dx] === 'S' || grid[gy + dy]?.[gx + dx] === 'E') openNeighbours++;
      }
      if (openNeighbours === 1) deadEnds.push([gx, gy]);
    }
  }
  if (deadEnds.length > 0) {
    const [kx, ky] = deadEnds[Math.floor(Math.random() * deadEnds.length)];
    grid[ky][kx] = 'K';
  } else {
    // Fallback: place at centre
    grid[2 * Math.floor(rows / 2) + 1][2 * Math.floor(cols / 2) + 1] = 'K';
  }
  return grid.map(row => row.join(''));
}

function getRating(score) {
  if (score >= RATING_THRESHOLDS.S) return 'S';
  if (score >= RATING_THRESHOLDS.A) return 'A';
  if (score >= RATING_THRESHOLDS.B) return 'B';
  return 'C';
}

function getModifier(rating) {
  return MODIFIER_BY_RATING[rating];
}

function notifyGameComplete(result) {
  const payload = JSON.stringify(result);
  if (window.webkit?.messageHandlers?.jsBridge) {
    window.webkit.messageHandlers.jsBridge.postMessage(payload);
    return;
  }
  if (window.jsBridge?.postMessage) {
    window.jsBridge.postMessage(payload);
    return;
  }
  if (window.parent !== window) {
    window.parent.postMessage(payload, '*');
    return;
  }
  console.log('[GameComplete]', result);
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function hexToRgb(hex) {
  const raw = hex.replace('#', '');
  const full = raw.length === 3 ? raw.split('').map(c => c + c).join('') : raw;
  const v = parseInt(full, 16);
  return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
}

function rgbToHex(r, g, b) {
  const h = n => clamp(Math.round(n), 0, 255).toString(16).padStart(2, '0');
  return '#' + h(r) + h(g) + h(b);
}

function blendHex(a, b, t) {
  const ca = hexToRgb(a), cb = hexToRgb(b);
  return rgbToHex(ca.r + (cb.r - ca.r) * t, ca.g + (cb.g - ca.g) * t, ca.b + (cb.b - ca.b) * t);
}

function hexToInt(hex) {
  return parseInt(hex.replace('#', ''), 16);
}

// ── Attribute Theme System ───────────────────────────────────────────────────
const ATTR_THEMES = {
  ATK: { bgBase:'#FAF0E6', primary:'#FF6B9D', secondary:'#FF9B5E', accentGold:'#FFD76E', accentRed:'#E53E3E', trackBg:'#E8D5C4', trackBorder:'#D4C0AB', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textDark:'#1A1A2E', textMuted:'#7A7A8E', bgmStyle:'action' },
  WIL: { bgBase:'#F5F0FA', primary:'#8B5CF6', secondary:'#6D28D9', accentGold:'#C084FC', accentRed:'#DC2626', trackBg:'#E4D9F0', trackBorder:'#C9B8DE', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textDark:'#1A1028', textMuted:'#6E6A80', bgmStyle:'tense' },
  INT: { bgBase:'#EFF6FF', primary:'#3B82F6', secondary:'#0EA5E9', accentGold:'#67E8F9', accentRed:'#EF4444', trackBg:'#DBEAFE', trackBorder:'#BFDBFE', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textDark:'#0F172A', textMuted:'#64748B', bgmStyle:'mystery' },
  CHA: { bgBase:'#FDF2F8', primary:'#F472B6', secondary:'#EC4899', accentGold:'#FBCFE8', accentRed:'#E11D48', trackBg:'#FCE7F3', trackBorder:'#F9A8D4', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textDark:'#1A1A2E', textMuted:'#7A6B80', bgmStyle:'romantic' },
};

function resolveTheme() {
  const a = (ATTRIBUTE || '').toLowerCase();
  if (/身手|atk|attack|agility/i.test(a)) return ATTR_THEMES.ATK;
  if (/意志|wil/i.test(a)) return ATTR_THEMES.WIL;
  if (/智慧|int|wisdom/i.test(a)) return ATTR_THEMES.INT;
  if (/魅力|cha|charm/i.test(a)) return ATTR_THEMES.CHA;
  return ATTR_THEMES.INT;
}

const THEME = resolveTheme();

const PALETTE = {
  bgBase:       THEME.bgBase,
  bgDark:       '#1A1221',
  primary:      PRIMARY_COLOR || THEME.primary,
  primaryLight: blendHex(PRIMARY_COLOR || THEME.primary, '#ffffff', 0.55),
  primaryDark:  blendHex(PRIMARY_COLOR || THEME.primary, '#000000', 0.3),
  secondary:    THEME.secondary,
  accentGold:   THEME.accentGold,
  accentRed:    THEME.accentRed,
  textDark:     THEME.textDark,
  textLight:    '#FFFFFF',
  textMuted:    THEME.textMuted,
  surfaceCard:  '#FFFFFF',
  success:      THEME.success,
  warning:      THEME.warning,
  danger:       THEME.danger,
  trackBg:      THEME.trackBg,
  trackBorder:  THEME.trackBorder,
};

// Candy button palette — derived from primary
const CANDY = {
  btnTop:     blendHex(PRIMARY_COLOR || THEME.primary, '#ffffff', 0.35),
  btnBottom:  blendHex(PRIMARY_COLOR || THEME.primary, '#000000', 0.1),
  btnSlab:    blendHex(PRIMARY_COLOR || THEME.primary, '#000000', 0.35),
  cardPink:   '#FFB5C5',
  cardPinkLt: '#FFC8D6',
};

const CC = {};
function initColors() {
  Object.entries(PALETTE).forEach(([k, v]) => {
    CC[k] = hexToInt(v);
    CC[k + 'Hex'] = v;
  });
  CC.white = 0xffffff;
  Object.entries(CANDY).forEach(([k, v]) => {
    CC['candy_' + k] = hexToInt(v);
  });
}
initColors();

// ── MoonAudio Engine ─────────────────────────────────────────────────────────
class MoonAudio {
  constructor() { this._ctx = null; this._master = null; this._bgmNodes = []; this._unlocked = false; }

  _ensure() {
    if (this._ctx) return this._ctx;
    this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    this._master = this._ctx.createGain();
    this._master.gain.value = 0.5;
    this._master.connect(this._ctx.destination);
    return this._ctx;
  }

  unlock() {
    if (this._unlocked) return;
    this._ensure();
    if (this._ctx.state === 'suspended') this._ctx.resume();
    this._unlocked = true;
  }

  tap() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.08);
    g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.1);
  }

  success() {
    const ctx = this._ensure(), t = ctx.currentTime;
    [523, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, t + i * 0.12);
      g.gain.linearRampToValueAtTime(0.22, t + i * 0.12 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
      osc.connect(g).connect(this._master); osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.3);
    });
  }

  fail() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t);
    osc.frequency.linearRampToValueAtTime(80, t + 0.25);
    g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.3);
  }

  alert() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(220, t + 0.15);
    g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.2);
  }

  swoosh() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const len = ctx.sampleRate * 0.15, buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.setValueAtTime(2000, t);
    f.frequency.exponentialRampToValueAtTime(500, t + 0.15); f.Q.value = 2;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.connect(f).connect(g).connect(this._master); src.start(t);
  }

  heartbeat() {
    const ctx = this._ensure(), t = ctx.currentTime;
    [0, 0.18].forEach(off => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(60, t + off);
      osc.frequency.exponentialRampToValueAtTime(30, t + off + 0.15);
      g.gain.setValueAtTime(0.3, t + off); g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.2);
      osc.connect(g).connect(this._master); osc.start(t + off); osc.stop(t + off + 0.2);
    });
  }

  tick() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 1000;
    g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.06);
  }

  bgm(style) {
    this.stopBgm();
    const ctx = this._ensure();
    const PROG = {
      action: [[164.81,196,246.94],[174.61,220,261.63],[146.83,174.61,220],[155.56,196,246.94]],
      tense: [[130.81,155.56,196],[123.47,146.83,185],[116.54,138.59,174.61],[123.47,146.83,185]],
      mystery: [[146.83,174.61,220],[138.59,164.81,207.65],[130.81,155.56,196],[138.59,174.61,220]],
      romantic: [[261.63,329.63,392],[293.66,349.23,440],[246.94,311.13,369.99],[261.63,329.63,392]],
    };
    const chords = PROG[style] || PROG.mystery;
    const beat = style === 'action' ? 0.8 : 1.2;
    const loopLen = chords.length * beat;
    const mg = ctx.createGain(); mg.gain.value = 0;
    mg.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 1);
    mg.connect(this._master);
    const sched = () => {
      const now = ctx.currentTime;
      chords.forEach((ch, ci) => {
        const ct = now + ci * beat;
        ch.forEach(freq => {
          const o = ctx.createOscillator(), e = ctx.createGain();
          o.type = style === 'romantic' ? 'sine' : style === 'action' ? 'sawtooth' : 'triangle';
          o.frequency.value = freq;
          e.gain.setValueAtTime(0, ct);
          e.gain.linearRampToValueAtTime(0.06, ct + 0.05);
          e.gain.setValueAtTime(0.06, ct + beat * 0.7);
          e.gain.linearRampToValueAtTime(0, ct + beat);
          o.connect(e).connect(mg); o.start(ct); o.stop(ct + beat);
        });
        const b = ctx.createOscillator(), be = ctx.createGain();
        b.type = 'sine'; b.frequency.value = ch[0] / 2;
        be.gain.setValueAtTime(0, ct);
        be.gain.linearRampToValueAtTime(0.1, ct + 0.03);
        be.gain.setValueAtTime(0.1, ct + beat * 0.5);
        be.gain.linearRampToValueAtTime(0, ct + beat);
        b.connect(be).connect(mg); b.start(ct); b.stop(ct + beat);
      });
    };
    sched();
    const iid = setInterval(() => {
      if (!this._ctx || this._ctx.state === 'closed') { clearInterval(iid); return; }
      sched();
    }, loopLen * 1000);
    this._bgmNodes.push({ masterGain: mg, intervalId: iid });
  }

  stopBgm(fadeMs) {
    const fade = (fadeMs || 500) / 1000;
    if (!this._ctx) return;
    const t = this._ctx.currentTime;
    for (const n of this._bgmNodes) {
      if (n.intervalId) clearInterval(n.intervalId);
      if (n.masterGain) n.masterGain.gain.linearRampToValueAtTime(0, t + fade);
    }
    this._bgmNodes = [];
  }

  stopAll() { this.stopBgm(200); }
}

const audio = new MoonAudio();

// ── Helpers ──────────────────────────────────────────────────────────────────

/** Draw a rounded rectangle path on a Phaser Graphics object */
function drawRRect(gfx, x, y, w, h, r) {
  gfx.beginPath();
  gfx.moveTo(x + r, y);
  gfx.lineTo(x + w - r, y);
  gfx.arc(x + w - r, y + r, r, -Math.PI / 2, 0);
  gfx.lineTo(x + w, y + h - r);
  gfx.arc(x + w - r, y + h - r, r, 0, Math.PI / 2);
  gfx.lineTo(x + r, y + h);
  gfx.arc(x + r, y + h - r, r, Math.PI / 2, Math.PI);
  gfx.lineTo(x, y + r);
  gfx.arc(x + r, y + r, r, Math.PI, -Math.PI / 2);
  gfx.closePath();
}

/** Spawn particles from a point */
function spawnParticles(scene, x, y, color, count, life) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = 80 + Math.random() * 120;
    const sz = 3 + Math.random() * 4;
    const p = scene.add.circle(x, y, sz, color, 1).setDepth(50);
    scene.tweens.add({
      targets: p, x: x + Math.cos(angle) * speed, y: y + Math.sin(angle) * speed,
      alpha: 0, scaleX: 0.2, scaleY: 0.2, duration: life || 400,
      ease: 'Quad.easeOut', onComplete: () => p.destroy()
    });
  }
}

/** Float-up feedback toast */
function showToast(scene, text, colorHex, x, y) {
  const t = scene.add.text(x, y, text, {
    fontFamily: 'Nunito', fontSize: '28px', fontStyle: '900',
    color: colorHex, stroke: '#ffffff', strokeThickness: 4
  }).setOrigin(0.5).setDepth(60).setAlpha(0);
  scene.tweens.add({
    targets: t, y: y - 30, alpha: 1, duration: 200, ease: 'Back.easeOut',
    onComplete: () => {
      scene.time.delayedCall(600, () => {
        scene.tweens.add({
          targets: t, y: y - 50, alpha: 0, duration: 200, onComplete: () => t.destroy()
        });
      });
    }
  });
}

/** Damage flash overlay */
function damageFlash(scene) {
  const flash = scene.add.rectangle(W / 2, H / 2, W, H, 0xff4d6a, 0).setDepth(80);
  scene.tweens.add({
    targets: flash, alpha: 0.3, yoyo: true, duration: 80, onComplete: () => flash.destroy()
  });
}

/** Screen shake */
function screenShake(scene, intensity) {
  scene.cameras.main.shake(150, intensity || 0.008);
}

/** Draw 4 gold corner circles on a card (signature decoration) */
function drawGoldCorners(scene, cx, cy, cw, ch, radius, depth) {
  const r = radius || 7;
  const d = depth || 16;
  const inset = r + 4;
  const positions = [
    [cx - cw / 2 + inset, cy - ch / 2 + inset],
    [cx + cw / 2 - inset, cy - ch / 2 + inset],
    [cx - cw / 2 + inset, cy + ch / 2 - inset],
    [cx + cw / 2 - inset, cy + ch / 2 - inset],
  ];
  positions.forEach(([px, py]) => {
    scene.add.circle(px, py, r, CC.accentGold, 1).setDepth(d);
    scene.add.circle(px - 1, py - 1, r * 0.4, 0xffffff, 0.5).setDepth(d + 1);
  });
}

/** Draw a soft-shadow floating card (no stroke border) */
function drawCandyCard(scene, cx, cy, cw, ch, bgColor, depth) {
  const d = depth || 14;
  const r = 24;
  const shadowGfx = scene.add.graphics().setDepth(d);
  shadowGfx.fillStyle(0x000000, 0.06);
  shadowGfx.fillRoundedRect(cx - cw / 2 + 3, cy - ch / 2 + 5, cw, ch, r);
  shadowGfx.fillStyle(0x000000, 0.04);
  shadowGfx.fillRoundedRect(cx - cw / 2 + 1, cy - ch / 2 + 3, cw, ch, r);
  const bodyGfx = scene.add.graphics().setDepth(d + 1);
  bodyGfx.fillStyle(bgColor, 1);
  bodyGfx.fillRoundedRect(cx - cw / 2, cy - ch / 2, cw, ch, r);
  return bodyGfx;
}

// ── Puffy Candy Button ───────────────────────────────────────────────────────
function makeButton(scene, cfg) {
  const { x, y, w, label, fontSize, onTap, icon } = cfg;
  const h = cfg.h || 64;
  const r = 22;
  const slabH = 7;
  const container = scene.add.container(x, y).setDepth(20);

  const topInt = CC.candy_btnTop;
  const bottomInt = CC.candy_btnBottom;
  const slabInt = CC.candy_btnSlab;

  const slabGfx = scene.add.graphics();
  slabGfx.fillStyle(slabInt, 1);
  drawRRect(slabGfx, -w / 2, -h / 2 + slabH, w, h, r);
  slabGfx.fillPath();
  container.add(slabGfx);

  const bodyGfx = scene.add.graphics();
  bodyGfx.fillStyle(bottomInt, 1);
  drawRRect(bodyGfx, -w / 2, -h / 2, w, h, r);
  bodyGfx.fillPath();
  container.add(bodyGfx);

  const topGfx = scene.add.graphics();
  topGfx.fillStyle(topInt, 1);
  drawRRect(topGfx, -w / 2, -h / 2, w, h * 0.55, r);
  topGfx.fillPath();
  container.add(topGfx);

  const glossGfx = scene.add.graphics();
  glossGfx.fillStyle(0xffffff, 0.28);
  const glossH = h * 0.30;
  const glossInset = 4;
  drawRRect(glossGfx, -w / 2 + glossInset, -h / 2 + 3, w - glossInset * 2, glossH, r - 4);
  glossGfx.fillPath();
  container.add(glossGfx);

  let iconText = null;
  if (icon) {
    iconText = scene.add.text(-w / 4 + 4, 0, icon, {
      fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: '#ffffff'
    }).setOrigin(0.5);
    container.add(iconText);
  }

  const labelText = scene.add.text(icon ? 8 : 0, 0, label.toUpperCase(), {
    fontFamily: 'Nunito', fontSize: (fontSize || 20) + 'px', fontStyle: '900',
    color: '#ffffff', stroke: 'rgba(0,0,0,0.15)', strokeThickness: 1,
    letterSpacing: 2
  }).setOrigin(0.5);
  container.add(labelText);

  const hitArea = scene.add.rectangle(0, 0, w, h + slabH + 4).setOrigin(0.5).setInteractive({ useHandCursor: true }).setAlpha(0.001);
  container.add(hitArea);

  hitArea.on('pointerdown', () => {
    container.setPosition(x, y + slabH - 1);
    slabGfx.setVisible(false);
    audio.tap();
  });
  hitArea.on('pointerup', () => {
    container.setPosition(x, y);
    slabGfx.setVisible(true);
    if (onTap) onTap();
  });
  hitArea.on('pointerout', () => {
    container.setPosition(x, y);
    slabGfx.setVisible(true);
  });

  return container;
}

// ── Timer Bar (candy style) ──────────────────────────────────────────────────
function createTimerBar(scene, y, w) {
  const h = 8;
  const barObj = { maxW: w };

  const trackGfx = scene.add.graphics().setDepth(5);
  trackGfx.fillStyle(CC.trackBg, 1);
  trackGfx.fillRoundedRect(W / 2 - w / 2, y, w, h, h / 2);

  barObj.gfx = scene.add.graphics().setDepth(6);
  barObj.y = y; barObj.h = h;

  barObj.update = function(ratio) {
    barObj.gfx.clear();
    const r = clamp(ratio, 0, 1);
    let col;
    if (r > 0.33) col = CC.success;
    else if (r > 0.15) col = CC.warning;
    else col = CC.danger;
    const fw = barObj.maxW * r;
    barObj.gfx.fillStyle(col, 1);
    barObj.gfx.fillRoundedRect(W / 2 - barObj.maxW / 2, barObj.y, fw, barObj.h, barObj.h / 2);
    if (fw > 10) {
      barObj.gfx.fillStyle(0xffffff, 0.3);
      barObj.gfx.fillRoundedRect(W / 2 - barObj.maxW / 2 + 2, barObj.y + 1, fw - 4, 3, 1.5);
    }
  };

  barObj.update(1);
  return barObj;
}

/** Draw dot pattern background */
function drawDotPattern(scene, opacity) {
  const dots = scene.add.graphics().setDepth(0);
  dots.fillStyle(CC.primary, opacity || 0.05);
  for (let bx = 20; bx < W; bx += 28) {
    for (let by = 18; by < H; by += 30) {
      dots.fillCircle(bx + ((by / 30) % 2 ? 5 : -3), by, 2);
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  GAME SCENE
// ══════════════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init() {
    this.score = 0;
    this.timeLeft = ROUND_SECONDS;
    this.isOver = false;
    this.combo = 0;
    this.maxCombo = 0;
    this.escapes = 0;
    this.bumps = 0;
    this.mazeIndex = 0;
    this.cell = 24;       // recalculated per maze in loadMaze()
    this.boardX = 64;     // recalculated per maze in loadMaze()
    this.boardY = 208;
    this.lastTickSec = -1;
    this.audioStarted = false;
    this.difficulty = 1;
    this.timePenaltyPerBump = 1.5;
  }

  create() {
    this.cameras.main.setBackgroundColor(PALETTE.bgBase);
    drawDotPattern(this, 0.05);

    // ── Timer bar (top) ──
    this.timerBar = createTimerBar(this, 0, W);

    // ── Title & subtitle ──
    this.add.text(W / 2, 30, 'Maze Escape', {
      fontFamily: 'Nunito', fontSize: '22px', fontStyle: '900', color: PALETTE.textDark
    }).setOrigin(0.5).setDepth(16);
    this.add.text(W / 2, 52, DISPLAY_ATTRIBUTE + ' check', {
      fontFamily: 'Patrick Hand', fontSize: '16px', color: PALETTE.textMuted
    }).setOrigin(0.5).setDepth(16);

    // ── Score pill ──
    const scoreGfx = this.add.graphics().setDepth(10);
    scoreGfx.fillStyle(CC.white, 0.92);
    drawRRect(scoreGfx, 16, 102, 100, 32, 16);
    scoreGfx.fillPath();
    const scoreShadow = this.add.graphics().setDepth(9);
    scoreShadow.fillStyle(0x000000, 0.05);
    drawRRect(scoreShadow, 17, 105, 100, 32, 16);
    scoreShadow.fillPath();
    this.scoreText = this.add.text(66, 118, '0', {
      fontFamily: 'Nunito', fontSize: '16px', fontStyle: '900', color: PALETTE.textDark
    }).setOrigin(0.5).setDepth(11);

    // Timer text pill
    const timerShadow = this.add.graphics().setDepth(9);
    timerShadow.fillStyle(0x000000, 0.05);
    drawRRect(timerShadow, W - 115, 105, 100, 32, 16);
    timerShadow.fillPath();
    const timerGfx = this.add.graphics().setDepth(10);
    timerGfx.fillStyle(CC.white, 0.92);
    drawRRect(timerGfx, W - 116, 102, 100, 32, 16);
    timerGfx.fillPath();
    this.timerText = this.add.text(W - 66, 118, ROUND_SECONDS + 's', {
      fontFamily: 'Nunito', fontSize: '16px', fontStyle: '900', color: PALETTE.textDark
    }).setOrigin(0.5).setDepth(11);

    // Maze label
    this.mazeLabel = this.add.text(W / 2, 80, 'Maze 1', {
      fontFamily: 'Nunito', fontSize: '18px', fontStyle: '700', color: PALETTE.primary
    }).setOrigin(0.5).setDepth(10);

    // ── Main card for maze area (candy style) ──
    const mazeCardW = 330;
    const mazeCardH = 310;
    const mazeCardY = 350;

    drawCandyCard(this, W / 2, mazeCardY, mazeCardW, mazeCardH, hexToInt(CANDY.cardPink), 14);
    drawGoldCorners(this, W / 2, mazeCardY, mazeCardW, mazeCardH, 7, 17);

    this.graphics = this.add.graphics().setDepth(19);

    // Key status indicator
    this.keyStatus = this.add.text(W / 2, 518, 'Find the key first!', {
      fontFamily: 'Patrick Hand', fontSize: '17px', color: PALETTE.textMuted
    }).setOrigin(0.5).setDepth(18);

    // Combo display
    this.comboText = this.add.text(W / 2, 540, '', {
      fontFamily: 'Nunito', fontSize: '20px', fontStyle: '900', color: PALETTE.primary,
      stroke: '#ffffff', strokeThickness: 2
    }).setOrigin(0.5).setDepth(20);

    // Direction buttons (D-pad layout) — puffy candy style
    makeButton(this, { x: W / 2, y: H - 120, w: 72, h: 44, label: '\u25B2', fontSize: 22, onTap: () => this.tryMove(0, -1) });
    makeButton(this, { x: W / 2 - 86, y: H - 68, w: 72, h: 44, label: '\u25C0', fontSize: 22, onTap: () => this.tryMove(-1, 0) });
    makeButton(this, { x: W / 2, y: H - 68, w: 72, h: 44, label: '\u25BC', fontSize: 22, onTap: () => this.tryMove(0, 1) });
    makeButton(this, { x: W / 2 + 86, y: H - 68, w: 72, h: 44, label: '\u25B6', fontSize: 22, onTap: () => this.tryMove(1, 0) });

    this.cursors = this.input.keyboard.createCursorKeys();
    this.installSwipe();

    // First interaction unlocks audio
    this.input.once('pointerdown', () => {
      audio.unlock();
      audio.bgm(THEME.bgmStyle);
      this.audioStarted = true;
    });

    this.loadMaze(0);
  }

  installSwipe() {
    this.swipeStart = null;
    this.input.on('pointerdown', (pointer) => {
      this.swipeStart = { x: pointer.x, y: pointer.y };
    });
    this.input.on('pointerup', (pointer) => {
      if (!this.swipeStart) return;
      const dx = pointer.x - this.swipeStart.x;
      const dy = pointer.y - this.swipeStart.y;
      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
      if (Math.abs(dx) > Math.abs(dy)) this.tryMove(dx > 0 ? 1 : -1, 0);
      else this.tryMove(0, dy > 0 ? 1 : -1);
      this.swipeStart = null;
    });
  }

  loadMaze(index) {
    // Generate a fresh random maze every time (guaranteed solvable via DFS)
    // Increase grid size slightly as difficulty rises
    const baseCols = 5, baseRows = 5;
    const extra = Math.min(index, 4); // cap at +4
    this.map = generateMaze(baseCols + extra, baseRows + extra);
    // Adapt cell size to fit within the play area
    const gridW = this.map[0].length;
    const gridH = this.map.length;
    const maxBoardW = W - 40;             // 20px margin each side
    const maxBoardH = H - this.boardY - 40; // 40px bottom margin
    this.cell = Math.floor(Math.min(maxBoardW / gridW, maxBoardH / gridH));
    this.boardX = Math.floor((W - gridW * this.cell) / 2);
    this.mazeIndex = index;
    this.hasKey = false;
    this.mazeBumps = 0;
    for (let y = 0; y < this.map.length; y++) {
      for (let x = 0; x < this.map[y].length; x++) {
        const cell = this.map[y][x];
        if (cell === 'S') this.player = { x, y };
        if (cell === 'K') this.key = { x, y };
        if (cell === 'E') this.exit = { x, y };
      }
    }
    this.mazeLabel.setText('Maze ' + (this.escapes + 1));
    this.keyStatus.setText('Find the key first!');
    this.keyStatus.setColor(PALETTE.textMuted);
    this.drawMaze();
  }

  addScore(delta) {
    this.score = Math.max(0, this.score + delta);
    this.scoreText.setText(Math.round(this.score));
    this.tweens.add({
      targets: this.scoreText, scaleX: 1.2, scaleY: 1.2,
      yoyo: true, duration: 120, ease: 'Quad.easeOut'
    });
  }

  cellBlocked(x, y) {
    return this.map[y][x] === '#';
  }

  tryMove(dx, dy) {
    if (this.isOver) return;
    if (!this.audioStarted) { audio.unlock(); audio.bgm(THEME.bgmStyle); this.audioStarted = true; }

    const nextX = this.player.x + dx;
    const nextY = this.player.y + dy;
    if (nextX < 0 || nextY < 0 || nextY >= this.map.length || nextX >= this.map[0].length || this.cellBlocked(nextX, nextY)) {
      // Wall bump: escalating penalty
      this.bumps += 1;
      this.mazeBumps += 1;
      this.combo = 0;
      const penalty = -(2 + Math.min(this.mazeBumps, 5));
      this.addScore(penalty);
      // Time penalty
      this.timeLeft = Math.max(0, this.timeLeft - this.timePenaltyPerBump);
      showToast(this, 'Wall! ' + penalty, PALETTE.danger, W / 2, 480);
      audio.fail();
      damageFlash(this);
      screenShake(this, 0.006);
      this.comboText.setText('');
      return;
    }

    this.player.x = nextX;
    this.player.y = nextY;

    if (!this.hasKey && this.player.x === this.key.x && this.player.y === this.key.y) {
      this.hasKey = true;
      const keyBonus = 14 + Math.min(this.escapes, 3) * 4;
      this.addScore(keyBonus);
      showToast(this, '\u2726 Key +' + keyBonus, PALETTE.accentGold, W / 2, 480);
      spawnParticles(this, this.boardX + this.key.x * this.cell + this.cell / 2, this.boardY + this.key.y * this.cell + this.cell / 2, CC.accentGold, 8, 400);
      audio.success();
      this.keyStatus.setText('Key found! Head to exit!');
      this.keyStatus.setColor(PALETTE.success);
    } else if (this.player.x === this.exit.x && this.player.y === this.exit.y) {
      if (!this.hasKey) {
        showToast(this, 'Need the key!', PALETTE.warning, W / 2, 480);
        audio.alert();
      } else {
        // Escape bonus
        const cleanBonus = Math.max(0, 14 - this.mazeBumps * 2);
        const diffBonus = Math.min(this.difficulty, 8) * 2;
        const comboBonus = Math.min(this.combo, 4) * 4;
        const gain = 36 + cleanBonus + comboBonus + diffBonus;
        this.escapes += 1;
        this.combo += 1;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
        this.addScore(gain);

        this.difficulty = Math.min(12, this.difficulty + 1);
        this.timePenaltyPerBump = Math.min(3, 1.5 + this.difficulty * 0.15);

        showToast(this, '\u2726 Escaped +' + gain, PALETTE.success, W / 2, 480);
        spawnParticles(this, W / 2, 350, CC.accentGold, 12, 500);
        audio.success();
        this.comboText.setText('Combo x' + this.combo);
        this.tweens.add({
          targets: this.comboText, scaleX: 1.3, scaleY: 1.3,
          yoyo: true, duration: 120, ease: 'Quad.easeOut'
        });
        this.loadMaze(this.mazeIndex + 1);
      }
    }
    this.drawMaze();
  }

  drawMaze() {
    this.graphics.clear();
    for (let y = 0; y < this.map.length; y++) {
      for (let x = 0; x < this.map[y].length; x++) {
        const cell = this.map[y][x];
        const px = this.boardX + x * this.cell;
        const py = this.boardY + y * this.cell;
        if (cell === '#') {
          this.graphics.fillStyle(CC.primaryDark, 0.85);
          this.graphics.fillRoundedRect(px, py, this.cell - 2, this.cell - 2, 5);
        } else {
          this.graphics.fillStyle(CC.trackBg, 0.6);
          this.graphics.fillRoundedRect(px, py, this.cell - 2, this.cell - 2, 4);
        }
      }
    }

    // Key
    const r = Math.max(3, this.cell * 0.3);  // scale marker radius with cell size
    if (!this.hasKey) {
      this.graphics.fillStyle(CC.accentGold, 1);
      this.graphics.fillCircle(this.boardX + this.key.x * this.cell + this.cell / 2, this.boardY + this.key.y * this.cell + this.cell / 2, r);
      this.graphics.lineStyle(2, CC.primaryDark, 1);
      this.graphics.strokeCircle(this.boardX + this.key.x * this.cell + this.cell / 2 + r * 0.6, this.boardY + this.key.y * this.cell + this.cell / 2, r * 0.5);
    }

    // Exit
    const pad = Math.max(2, this.cell * 0.15);
    const exitColor = this.hasKey ? CC.success : CC.primary;
    this.graphics.fillStyle(exitColor, 1);
    this.graphics.fillRoundedRect(this.boardX + this.exit.x * this.cell + pad, this.boardY + this.exit.y * this.cell + pad, this.cell - pad * 2, this.cell - pad * 2, 5);

    // Player
    this.graphics.fillStyle(CC.primary, 1);
    this.graphics.fillCircle(this.boardX + this.player.x * this.cell + this.cell / 2, this.boardY + this.player.y * this.cell + this.cell / 2, r);
    this.graphics.fillStyle(CC.white, 0.95);
    this.graphics.fillCircle(this.boardX + this.player.x * this.cell + this.cell / 2 + r * 0.25, this.boardY + this.player.y * this.cell + this.cell / 2 - r * 0.25, r * 0.25);
  }

  finishGame() {
    if (this.isOver) return;
    this.isOver = true;
    audio.stopBgm(600);
    this.scene.start('ResultScene', {
      score: Math.round(this.score),
      maxCombo: this.maxCombo,
      hits: this.escapes,
      misses: this.bumps
    });
  }

  update(time, delta) {
    if (this.isOver) return;

    if (Phaser.Input.Keyboard.JustDown(this.cursors.left)) this.tryMove(-1, 0);
    if (Phaser.Input.Keyboard.JustDown(this.cursors.right)) this.tryMove(1, 0);
    if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) this.tryMove(0, -1);
    if (Phaser.Input.Keyboard.JustDown(this.cursors.down)) this.tryMove(0, 1);

    this.timeLeft = Math.max(0, this.timeLeft - delta / 1000);
    const sec = Math.ceil(this.timeLeft);
    this.timerText.setText(sec + 's');
    this.timerBar.update(this.timeLeft / ROUND_SECONDS);

    if (this.timeLeft <= 10 && sec !== this.lastTickSec && sec > 0) {
      this.lastTickSec = sec;
      if (this.timeLeft <= 5) audio.heartbeat();
      else audio.tick();
    }

    if (this.timeLeft <= 10) {
      this.timerText.setColor(PALETTE.danger);
    } else {
      this.timerText.setColor(PALETTE.textDark);
    }

    if (this.timeLeft <= 0) this.finishGame();
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  RESULT SCENE
// ══════════════════════════════════════════════════════════════════════════════
class ResultScene extends Phaser.Scene {
  constructor() { super('ResultScene'); }

  init(data) {
    this.finalScore = data.score || 0;
    this.maxCombo = data.maxCombo || 0;
    this.hits = data.hits || 0;
    this.misses = data.misses || 0;
  }

  create() {
    this.cameras.main.setBackgroundColor(PALETTE.bgBase);
    drawDotPattern(this, 0.04);

    const rating = getRating(this.finalScore);
    const modifier = getModifier(rating);
    const modText = modifier > 0 ? '+' + modifier : String(modifier);

    const ratingColors = { S: CC.accentGold, A: CC.primary, B: CC.secondary, C: hexToInt(PALETTE.textMuted) };
    const ratingHex = { S: PALETTE.accentGold, A: PALETTE.primary, B: '#9B7DB8', C: PALETTE.textMuted };
    const ratingColor = ratingColors[rating];
    const ratingColorHex = ratingHex[rating];

    // Header card — candy style
    const headerW = 340, headerH = 100;
    drawCandyCard(this, W / 2, 80, headerW, headerH, CC.white, 5);
    drawGoldCorners(this, W / 2, 80, headerW, headerH, 6, 8);

    this.add.text(W / 2, 60, 'Settlement', {
      fontFamily: 'Nunito', fontSize: '30px', fontStyle: '900', color: PALETTE.textDark
    }).setOrigin(0.5).setDepth(8);
    this.add.text(W / 2, 96, 'Maze Escape', {
      fontFamily: 'Patrick Hand', fontSize: '18px', color: PALETTE.textMuted
    }).setOrigin(0.5).setDepth(8);

    // Rating letter with glow effect
    const ratingText = this.add.text(W / 2, 230, rating, {
      fontFamily: 'Nunito', fontSize: '96px', fontStyle: '900',
      color: ratingColorHex, stroke: PALETTE.textDark, strokeThickness: 4
    }).setOrigin(0.5).setDepth(10).setScale(0);

    if (rating === 'S') {
      const glow = this.add.circle(W / 2, 230, 70, ratingColor, 0.25).setDepth(9).setScale(0);
      this.tweens.add({ targets: glow, scaleX: 1.5, scaleY: 1.5, alpha: 0, duration: 800 });
      const glow2 = this.add.circle(W / 2, 230, 50, ratingColor, 0.15).setDepth(9).setScale(0);
      this.tweens.add({ targets: glow2, scaleX: 2, scaleY: 2, alpha: 0, duration: 1000, delay: 100 });
      spawnParticles(this, W / 2, 230, CC.accentGold, 16, 600);
      audio.success();
      this.time.delayedCall(100, () => audio.success());
    } else if (rating === 'A') {
      const glow = this.add.circle(W / 2, 230, 60, ratingColor, 0.18).setDepth(9).setScale(0);
      this.tweens.add({ targets: glow, scaleX: 1.3, scaleY: 1.3, alpha: 0, duration: 600 });
      audio.success();
    }

    this.tweens.add({
      targets: ratingText, scaleX: 1, scaleY: 1, duration: 400,
      ease: 'Back.easeOut', delay: 100
    });

    // Star row (4 stars)
    const starCount = { S: 4, A: 3, B: 2, C: 1 }[rating];
    for (let i = 0; i < 4; i++) {
      const sx = W / 2 - 54 + i * 36;
      const filled = i < starCount;
      const star = this.add.text(sx, 300, '\u2605', {
        fontFamily: 'Nunito', fontSize: '30px',
        color: filled ? PALETTE.accentGold : '#D4C0AB',
        stroke: filled ? PALETTE.primaryDark : 'transparent', strokeThickness: filled ? 1 : 0
      }).setOrigin(0.5).setDepth(10).setScale(0);
      this.tweens.add({
        targets: star, scaleX: 1, scaleY: 1, duration: 300,
        ease: 'Back.easeOut', delay: 200 + i * 80
      });
    }

    // Score
    this.add.text(W / 2, 350, 'Score ' + this.finalScore, {
      fontFamily: 'Nunito', fontSize: '28px', fontStyle: '900', color: PALETTE.textDark
    }).setOrigin(0.5).setDepth(10);

    // Attribute modifier
    this.add.text(W / 2, 388, DISPLAY_ATTRIBUTE + ' ' + modText, {
      fontFamily: 'Patrick Hand', fontSize: '22px', color: PALETTE.textMuted
    }).setOrigin(0.5).setDepth(10);

    // Stat cards — candy style with gold corners
    const statCardW = 140;
    const statCardH = 86;
    const statY = 465;

    drawCandyCard(this, W / 2 - statCardW / 2 - 12, statY, statCardW, statCardH, CC.white, 5);
    drawGoldCorners(this, W / 2 - statCardW / 2 - 12, statY, statCardW, statCardH, 5, 8);

    this.add.text(W / 2 - statCardW / 2 - 12, statY - 18, 'Max Combo', {
      fontFamily: 'Nunito', fontSize: '13px', fontStyle: '700', color: PALETTE.textMuted
    }).setOrigin(0.5).setDepth(8);
    this.add.text(W / 2 - statCardW / 2 - 12, statY + 14, String(this.maxCombo), {
      fontFamily: 'Nunito', fontSize: '28px', fontStyle: '900', color: PALETTE.textDark
    }).setOrigin(0.5).setDepth(8);

    drawCandyCard(this, W / 2 + statCardW / 2 + 12, statY, statCardW, statCardH, CC.white, 5);
    drawGoldCorners(this, W / 2 + statCardW / 2 + 12, statY, statCardW, statCardH, 5, 8);

    this.add.text(W / 2 + statCardW / 2 + 12, statY - 18, 'Escapes / Bumps', {
      fontFamily: 'Nunito', fontSize: '13px', fontStyle: '700', color: PALETTE.textMuted
    }).setOrigin(0.5).setDepth(8);
    this.add.text(W / 2 + statCardW / 2 + 12, statY + 14, this.hits + ' / ' + this.misses, {
      fontFamily: 'Nunito', fontSize: '26px', fontStyle: '900', color: PALETTE.textDark
    }).setOrigin(0.5).setDepth(8);

    // Continue button — puffy candy style
    makeButton(this, {
      x: W / 2, y: H - 110, w: 240, h: 66, label: 'Continue', fontSize: 24,
      onTap: () => {
        notifyGameComplete({
          rating: rating,
          score: this.finalScore,
          attribute: ATTRIBUTE,
          modifier: modifier,
          gameId: 'maze-escape',
          maxCombo: this.maxCombo,
          hits: this.hits,
          misses: this.misses
        });
        // Standalone: restart after settlement (host closes WebView)
        this.time.delayedCall(600, () => this.scene.start("BootScene"));
      }
    });
  }
}

  type: Phaser.AUTO,
