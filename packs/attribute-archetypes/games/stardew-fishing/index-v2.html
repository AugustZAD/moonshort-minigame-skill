<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Stardew Fishing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #38A169;
    --primary-light: #68D391;
    --primary-dark: #276749;
    --bg: #0A1628;
    --bg-light: #152238;
    --water-top: #4A90D9;
    --water-deep: #1A3A6B;
    --success: #4FECA2;
    --warning: #FFB347;
    --danger: #FF4D6A;
    --text-muted: #7A9BAA;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Montserrat', sans-serif; }

  #game-shell {
    position: relative;
    width: 393px; height: 852px;
    margin: 0 auto; overflow: hidden;
    background: var(--bg);
  }

  #phaser-container {
    position: absolute; top: 0; left: 0;
    width: 393px; height: 852px;
    z-index: 1;
  }
  #phaser-container canvas { display: block; }

  /* Title bar */
  .title-bar {
    position: absolute; top: 0; left: 0; width: 100%; height: 76px;
    background: var(--primary); z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  .title-bar::after {
    content: ''; position: absolute; bottom: -12px; left: 0;
    width: 100%; height: 12px;
    background-image: radial-gradient(circle at 12px 0px, var(--primary) 12px, transparent 12px);
    background-size: 24px 12px; background-repeat: repeat-x;
  }
  .title-text { font-weight: 900; font-size: 18px; color: #fff; }

  /* Catch counter row */
  .catch-row {
    position: absolute; top: 96px; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 24px; z-index: 11;
  }
  .catch-label { font-weight: 800; font-size: 16px; color: #fff; }
  .timer-label { font-weight: 700; font-size: 14px; color: var(--text-muted); }
  .timer-label.warn { color: var(--danger); }

  /* Water surface */
  .water-surface {
    position: absolute; top: 140px; left: 0; width: 100%; height: 24px;
    background: linear-gradient(to bottom, transparent, rgba(74,144,217,0.3), rgba(74,144,217,0.5));
    z-index: 9;
    overflow: hidden;
  }
  .water-surface::after {
    content: '';
    position: absolute; top: 14px; left: 0; width: 200%; height: 10px;
    background: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(255,255,255,0.15) 20px, rgba(255,255,255,0.15) 40px);
    animation: waveScroll 3s linear infinite;
  }
  @keyframes waveScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* Fishing scene area — Phaser renders the gauge here */

  /* Status text */
  .status-text {
    position: absolute; top: 600px; left: 0; width: 100%;
    text-align: center; font-weight: 700; font-size: 15px;
    color: var(--text-muted); z-index: 11;
  }

  /* Combo text */
  .combo-text {
    position: absolute; top: 624px; left: 0; width: 100%;
    text-align: center; font-weight: 900; font-size: 18px;
    color: var(--primary-light); z-index: 11;
    transition: transform 0.12s ease;
  }

  /* Score area */
  .score-display {
    position: absolute; top: 650px; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center; z-index: 11;
  }
  .score-display .label { font-weight: 700; font-size: 13px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
  .score-display .value-wrap { position: relative; display: inline-block; margin-top: 2px; }
  .score-display .value { font-weight: 900; font-size: 36px; color: #fff; line-height: 1; }
  .score-display .delta { position: absolute; top: -2px; right: -28px; font-weight: 900; font-size: 16px; opacity: 0; pointer-events: none; }
  .score-display .delta.pop { animation: deltaPop 0.8s ease-out forwards; }
  .score-display .delta.plus { color: var(--success); }
  .score-display .delta.minus { color: var(--danger); }
  @keyframes deltaPop { 0% { opacity: 1; transform: translateY(0); } 60% { opacity: 1; transform: translateY(-6px); } 100% { opacity: 0; transform: translateY(-14px); } }

  /* Reel button */
  .reel-btn {
    position: absolute; bottom: 30px; left: 24px; right: 24px; height: 72px;
    border-radius: 24px; border: 2px solid var(--primary);
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    cursor: pointer; z-index: 12;
    -webkit-tap-highlight-color: transparent; user-select: none;
    overflow: hidden; transition: box-shadow 0.2s;
  }
  .reel-btn .base { position: absolute; inset: 0; background: var(--primary); border-radius: 22px; }
  .reel-btn .glass { position: absolute; inset: 0; background: rgba(255,255,255,0.25); border-radius: 22px; }
  .reel-btn .highlight { position: absolute; left: 0; right: 0; top: 2px; height: 22px; background: rgba(255,255,255,0.3); border-radius: 20px 20px 0 0; }
  .reel-btn .reel-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 20px; color: #fff; z-index: 1;
    letter-spacing: 2px;
  }
  .reel-btn:active { transform: translateY(3px); box-shadow: none; }
  .reel-btn.holding { box-shadow: 0 0 16px var(--primary-light), 0 4px 0 rgba(0,0,0,0.2); }

  /* Stars row */
  .stars-row {
    position: absolute; top: 580px; left: 0; width: 100%;
    display: flex; justify-content: center; gap: 12px; z-index: 11;
  }
  .stars-row .star { font-size: 30px; opacity: 0; animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  .stars-row .star.filled { color: #F5C842; }
  .stars-row .star.empty { color: #555555; }
  @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

  /* Result info */
  .result-info {
    position: absolute; top: 626px; left: 0; width: 100%;
    text-align: center; z-index: 11;
  }
  .result-info .attr-mod { font-weight: 700; font-size: 16px; color: #aaa; margin-bottom: 12px; }
  .result-info .stats { display: flex; justify-content: center; gap: 40px; font-weight: 700; font-size: 14px; color: #fff; }

  /* Buttons */
  .btn-area {
    position: absolute; bottom: 20px; left: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 14px; z-index: 10;
  }
  .btn-candy {
    position: relative; height: 64px; border-radius: 24px;
    border: 2px solid var(--primary);
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    overflow: hidden; cursor: pointer; z-index: 10;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .btn-candy.full { width: 369px; }
  .btn-candy .base { position: absolute; inset: 0; background: var(--primary); border-radius: 22px; }
  .btn-candy .glass { position: absolute; inset: 0; background: rgba(255,255,255,0.3); border-radius: 22px; }
  .btn-candy .highlight { position: absolute; left: 0; right: 0; top: 2px; height: 20px; background: rgba(255,255,255,0.3); border-radius: 20px 20px 0 0; }
  .btn-candy .glow { position: absolute; inset: 0; box-shadow: inset 0 0 4px 4px rgba(255,255,255,0.5); border-radius: 22px; pointer-events: none; }
  .btn-candy .btn-candy-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; color: #fff; z-index: 1; }
  .btn-candy:active { transform: translateY(3px); box-shadow: none; }

  .hidden { display: none !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<div id="game-shell">
  <div id="phaser-container"></div>

  <div class="title-bar">
    <span class="title-text" id="title-text">Stardew Fishing</span>
  </div>

  <div class="catch-row" id="catch-row">
    <span class="catch-label" id="catch-label">Cast your line!</span>
    <span class="timer-label" id="timer-label">30s</span>
  </div>

  <div class="water-surface" id="water-surface"></div>

  <div class="status-text hidden" id="status-text">Track the fish!</div>
  <div class="combo-text hidden" id="combo-text"></div>

  <div class="score-display hidden" id="score-display">
    <span class="label">SCORE</span>
    <div class="value-wrap">
      <span class="value" id="score-value">0</span>
      <span class="delta" id="score-delta"></span>
    </div>
  </div>

  <!-- Reel button (game only) -->
  <div class="reel-btn hidden" id="reel-btn">
    <div class="base"></div>
    <div class="glass"></div>
    <div class="highlight"></div>
    <div class="reel-label">HOLD TO REEL</div>
  </div>

  <div class="stars-row hidden" id="stars-row"></div>
  <div class="result-info hidden" id="result-info">
    <div class="attr-mod" id="attr-mod"></div>
    <div class="stats">
      <span id="stat-combo"></span>
      <span id="stat-hits"></span>
    </div>
  </div>

  <div class="boot-card hidden" id="boot-card" style="position:absolute;top:380px;left:0;width:100%;text-align:center;z-index:12;">
    <div style="font-weight:900;font-size:28px;color:var(--primary,#38A169);margin-bottom:8px;">星露钓鱼</div>
    <div style="font-weight:700;font-size:14px;color:#64748B;margin-bottom:24px;" id="boot-subtitle">Challenge</div>
    <div style="font-weight:700;font-size:13px;color:#E2E8F0;line-height:2;">Hold to move the catch bar up.<br>Release to let it sink down.<br>Keep the bar on the fish to catch it!</div>
  </div>
  <div class="btn-area" id="btn-area"></div>
</div>

<script>
var CTX = window.__EPISODE_CTX__ || {};
var params = new URLSearchParams(window.location.search);
var ATTRIBUTE = CTX.attribute || params.get('attribute') || 'Charm';
var PRIMARY_COLOR = CTX.primaryColor || params.get('primaryColor') || '#38A169';
var DISPLAY_ATTRIBUTE = (CTX.character && CTX.character.name ? CTX.character.name + '\u7684' : '') + ATTRIBUTE;
var EPISODE_LABEL = CTX.episodeLabel || params.get('episodeLabel') || '';
var EPISODE_TITLE = CTX.episodeTitle || params.get('episodeTitle') || 'Stardew Fishing';

var W = 393, H = 852;
var ROUND_SECONDS = 30;
var RATING_THRESHOLDS = { S: 300, A: 230, B: 150, C: 90 };
var MODIFIER_BY_RATING = { S: 3, A: 1, B: 0, C: -1 };

function getRating(s) { if (s >= RATING_THRESHOLDS.S) return 'S'; if (s >= RATING_THRESHOLDS.A) return 'A'; if (s >= RATING_THRESHOLDS.B) return 'B'; return 'C'; }
function getModifier(r) { return MODIFIER_BY_RATING[r]; }
function notifyGameComplete(result) { var p = JSON.stringify(result); if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.jsBridge) { window.webkit.messageHandlers.jsBridge.postMessage(p); return; } if (window.jsBridge && window.jsBridge.postMessage) { window.jsBridge.postMessage(p); return; } if (window.parent !== window) { window.parent.postMessage(p, '*'); return; } console.log('[GameComplete]', result); }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function hexToInt(h) { return parseInt(h.replace('#', ''), 16); }
function blendHex(a, b, t) { function p(h) { var r = h.replace('#',''); if (r.length===3) r = r[0]+r[0]+r[1]+r[1]+r[2]+r[2]; var v = parseInt(r,16); return [(v>>16)&255,(v>>8)&255,v&255]; } var ca = p(a), cb = p(b); var R = Math.round(ca[0]+(cb[0]-ca[0])*t), G = Math.round(ca[1]+(cb[1]-ca[1])*t), B = Math.round(ca[2]+(cb[2]-ca[2])*t); return '#'+((1<<24)+(R<<16)+(G<<8)+B).toString(16).slice(1); }

function $(id) { return document.getElementById(id); }
function setVisible(id, v) { var el = $(id); if (!el) return; if (v) el.classList.remove('hidden'); else el.classList.add('hidden'); }
function makeCandyButton(label, cls, fs, onClick) { var b = document.createElement('div'); b.className = 'btn-candy '+(cls||'full'); b.innerHTML = '<div class="base"></div><div class="glass"></div><div class="highlight"></div><div class="glow"></div><div class="btn-candy-label" style="font-size:'+(fs||18)+'px">'+label+'</div>'; b.addEventListener('pointerdown', function(e) { e.preventDefault(); audio.tap(); }); b.addEventListener('pointerup', function(e) { e.preventDefault(); if (onClick) onClick(); }); return b; }
function clearBtnArea() { $('btn-area').innerHTML = ''; }
function addScoreDOM(d) { var el = $('score-delta'); el.classList.remove('pop','plus','minus'); el.textContent = (d>=0?'+':'')+d; el.classList.add(d>=0?'plus':'minus'); void el.offsetWidth; el.classList.add('pop'); }
function applyTheme() { document.documentElement.style.setProperty('--primary', PRIMARY_COLOR); $('title-text').textContent = EPISODE_LABEL ? EPISODE_LABEL+': '+EPISODE_TITLE : EPISODE_TITLE; }

// ── MoonAudio ────────────────────────────────────────────────────────────────
function MoonAudio() { this._ctx=null; this._master=null; this._bgmNodes=[]; this._unlocked=false; }
MoonAudio.prototype._ensure = function() { if(this._ctx) return this._ctx; this._ctx = new (window.AudioContext||window.webkitAudioContext)(); this._master = this._ctx.createGain(); this._master.gain.value = 0.5; this._master.connect(this._ctx.destination); return this._ctx; };
MoonAudio.prototype.unlock = function() { if(this._unlocked) return; this._ensure(); if(this._ctx.state==='suspended') this._ctx.resume(); this._unlocked=true; };
MoonAudio.prototype.tap = function() { var c=this._ensure(),t=c.currentTime; var o=c.createOscillator(),g=c.createGain(); o.type='sine'; o.frequency.setValueAtTime(1200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.08); g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1); o.connect(g).connect(this._master); o.start(t); o.stop(t+0.1); };
MoonAudio.prototype.success = function() { var c=this._ensure(),t=c.currentTime,s=this; [523,784].forEach(function(f,i) { var o=c.createOscillator(),g=c.createGain(); o.type='sine'; o.frequency.value=f; g.gain.setValueAtTime(0,t+i*0.12); g.gain.linearRampToValueAtTime(0.22,t+i*0.12+0.03); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.3); o.connect(g).connect(s._master); o.start(t+i*0.12); o.stop(t+i*0.12+0.3); }); };
MoonAudio.prototype.fail = function() { var c=this._ensure(),t=c.currentTime; var o=c.createOscillator(),g=c.createGain(); o.type='sawtooth'; o.frequency.setValueAtTime(150,t); o.frequency.linearRampToValueAtTime(80,t+0.25); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3); o.connect(g).connect(this._master); o.start(t); o.stop(t+0.3); };
MoonAudio.prototype.alert = function() { var c=this._ensure(),t=c.currentTime; var o=c.createOscillator(),g=c.createGain(); o.type='square'; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(220,t+0.15); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.connect(g).connect(this._master); o.start(t); o.stop(t+0.2); };
MoonAudio.prototype.heartbeat = function() { var c=this._ensure(),t=c.currentTime; [0,0.18].forEach(function(off) { var o=c.createOscillator(),g=c.createGain(); o.type='sine'; o.frequency.setValueAtTime(60,t+off); o.frequency.exponentialRampToValueAtTime(30,t+off+0.15); g.gain.setValueAtTime(0.3,t+off); g.gain.exponentialRampToValueAtTime(0.001,t+off+0.2); o.connect(g).connect(this._master); o.start(t+off); o.stop(t+off+0.2); }.bind(this)); };
MoonAudio.prototype.tick = function() { var c=this._ensure(),t=c.currentTime; var o=c.createOscillator(),g=c.createGain(); o.type='sine'; o.frequency.value=1000; g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05); o.connect(g).connect(this._master); o.start(t); o.stop(t+0.06); };
MoonAudio.prototype.bgm = function(style) { this.stopBgm(); var c=this._ensure(); var chords=[[146.83,174.61,220],[138.59,164.81,207.65],[130.81,155.56,196],[138.59,174.61,220]]; var beat=1.2; var loopLen=chords.length*beat; var mg=c.createGain(); mg.gain.value=0; mg.gain.linearRampToValueAtTime(0.1,c.currentTime+1); mg.connect(this._master); var sched=function() { var now=c.currentTime; chords.forEach(function(ch,ci) { var ct=now+ci*beat; ch.forEach(function(f) { var o=c.createOscillator(),e=c.createGain(); o.type='triangle'; o.frequency.value=f; e.gain.setValueAtTime(0,ct); e.gain.linearRampToValueAtTime(0.06,ct+0.05); e.gain.setValueAtTime(0.06,ct+beat*0.7); e.gain.linearRampToValueAtTime(0,ct+beat); o.connect(e).connect(mg); o.start(ct); o.stop(ct+beat); }); var b=c.createOscillator(),be=c.createGain(); b.type='sine'; b.frequency.value=ch[0]/2; be.gain.setValueAtTime(0,ct); be.gain.linearRampToValueAtTime(0.1,ct+0.03); be.gain.setValueAtTime(0.1,ct+beat*0.5); be.gain.linearRampToValueAtTime(0,ct+beat); b.connect(be).connect(mg); b.start(ct); b.stop(ct+beat); }); }; sched(); var self=this; var iid=setInterval(function() { if(!self._ctx||self._ctx.state==='closed') { clearInterval(iid); return; } sched(); }, loopLen*1000); this._bgmNodes.push({masterGain:mg,intervalId:iid}); };
MoonAudio.prototype.stopBgm = function(fadeMs) { var fade=(fadeMs||500)/1000; if(!this._ctx) return; var t=this._ctx.currentTime; for(var i=0;i<this._bgmNodes.length;i++) { var n=this._bgmNodes[i]; if(n.intervalId) clearInterval(n.intervalId); if(n.masterGain) n.masterGain.gain.linearRampToValueAtTime(0,t+fade); } this._bgmNodes=[]; };
MoonAudio.prototype.stopAll = function() { this.stopBgm(200); };
var audio = new MoonAudio();

// ── Phaser Helpers ───────────────────────────────────────────────────────────
function drawRRect(g,x,y,w,h,r) { g.beginPath(); g.moveTo(x+r,y); g.lineTo(x+w-r,y); g.arc(x+w-r,y+r,r,-Math.PI/2,0); g.lineTo(x+w,y+h-r); g.arc(x+w-r,y+h-r,r,0,Math.PI/2); g.lineTo(x+r,y+h); g.arc(x+r,y+h-r,r,Math.PI/2,Math.PI); g.lineTo(x,y+r); g.arc(x+r,y+r,r,Math.PI,-Math.PI/2); g.closePath(); }
function spawnParticles(sc,x,y,col,cnt,life) { for(var i=0;i<cnt;i++) { var a=(Math.PI*2*i)/cnt+Math.random()*0.3,sp=80+Math.random()*120,sz=3+Math.random()*4; var p=sc.add.circle(x,y,sz,col,1).setDepth(50); sc.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scaleX:0.2,scaleY:0.2,duration:life||400,ease:'Quad.easeOut',onComplete:function(){p.destroy();}}); } }
function showToast(sc,text,hex,x,y) { var t=sc.add.text(x,y,text,{fontFamily:'Montserrat',fontSize:'28px',fontStyle:'900',color:hex,stroke:'#ffffff',strokeThickness:4}).setOrigin(0.5).setDepth(60).setAlpha(0); sc.tweens.add({targets:t,y:y-30,alpha:1,duration:200,ease:'Back.easeOut',onComplete:function(){sc.time.delayedCall(600,function(){sc.tweens.add({targets:t,y:y-50,alpha:0,duration:200,onComplete:function(){t.destroy();}});});}}); }
function damageFlash(sc) { var f=sc.add.rectangle(W/2,H/2,W,H,0xff4d6a,0).setDepth(80); sc.tweens.add({targets:f,alpha:0.3,yoyo:true,duration:80,onComplete:function(){f.destroy();}}); }
function screenShake(sc,i) { sc.cameras.main.shake(150,i||0.008); }

// ══════════════════════════════════════════════════════════════════════════════
var BootScene = new Phaser.Class({
  Extends: Phaser.Scene,
  initialize: function() { Phaser.Scene.call(this, 'BootScene'); },
  create: function() {
    this.children.removeAll(true);
    setVisible('catch-row', true); setVisible('water-surface', true);
    setVisible('status-text', false); setVisible('combo-text', false);
    setVisible('score-display', false); setVisible('reel-btn', false);
    setVisible('stars-row', false); setVisible('result-info', false);

    $('catch-label').textContent = 'Cast your line!';
    $('timer-label').textContent = '';

    // Draw a static fishing rod + line
    var gfx = this.add.graphics().setDepth(3);
    // Rod
    gfx.lineStyle(4, 0x8B6914, 1);
    gfx.lineBetween(W/2+60, 100, W/2+20, 170);
    gfx.lineStyle(2, 0xaaaaaa, 0.6);
    gfx.lineBetween(W/2+20, 170, W/2, 400);
    // Bobber
    gfx.fillStyle(0xff4444, 1);
    gfx.fillCircle(W/2, 400, 8);
    gfx.fillStyle(0xffffff, 1);
    gfx.fillCircle(W/2, 396, 4);

    // Water depth gradient
    gfx.fillStyle(0x1A3A6B, 0.4);
    gfx.fillRect(0, 164, W, H - 164);

    // Underwater shimmer
    for (var i = 0; i < 8; i++) {
      gfx.fillStyle(0x4A90D9, 0.08);
      gfx.fillCircle(40 + Math.random() * (W - 80), 250 + Math.random() * 300, 20 + Math.random() * 30);
    }

    setVisible('boot-card',true);
    $('boot-subtitle').textContent=DISPLAY_ATTRIBUTE+' Challenge';

    clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('START', 'full', 18, function() { audio.unlock(); window.__game.scene.start('GameScene'); }));
  }
});

// ══════════════════════════════════════════════════════════════════════════════
var GameScene = new Phaser.Class({
  Extends: Phaser.Scene,
  initialize: function() { Phaser.Scene.call(this, 'GameScene'); },

  init: function() {
    this.score = 0; this.timeLeft = ROUND_SECONDS; this.isOver = false;
    this.trackX = W/2 - 10; this.trackW = 60; this.trackTop = 180; this.trackHeight = 380;
    this.fishY = this.trackTop + this.trackHeight * 0.45;
    this.fishV = 120;
    this.hookY = this.trackTop + this.trackHeight * 0.5;
    this.hookV = 0;
    this.holding = false;
    this.catchProgress = 0;
    this.combo = 0; this.maxCombo = 0;
    this.totalHits = 0; this.totalMiss = 0;
    this.lastTickSec = -1; this.audioStarted = false;
    this.difficulty = 1; this.fishCaught = 0;
    this.wasNear = false; this.nearStreakMs = 0;
  },

  create: function() {
    this.children.removeAll(true);
    var self = this; window.__activeGameScene = this;

    setVisible('boot-card', false);
    setVisible('catch-row', true); setVisible('water-surface', true);
    setVisible('status-text', true); setVisible('combo-text', true);
    setVisible('score-display', true); setVisible('reel-btn', true);
    setVisible('stars-row', false); setVisible('result-info', false);

    $('catch-label').textContent = '\uD83D\uDC1F Caught: 0';
    $('timer-label').textContent = ROUND_SECONDS + 's';
    $('timer-label').classList.remove('warn');
    $('status-text').textContent = 'Track the fish!';
    $('status-text').style.color = '';
    $('combo-text').textContent = '';
    $('score-value').textContent = '0';
    clearBtnArea();

    // Water background
    this.waterGfx = this.add.graphics().setDepth(0);
    this.waterGfx.fillGradientStyle(0x4A90D9, 0x4A90D9, 0x0A1628, 0x0A1628, 0.3, 0.3, 0.5, 0.5);
    this.waterGfx.fillRect(0, 164, W, H - 164);

    // Fishing track (vertical gauge)
    this.trackGfx = this.add.graphics().setDepth(2);
    // Track background gradient — drawn in update for depth coloring

    // Catch progress bar (right side)
    this.progBarX = this.trackX + this.trackW + 30;
    this.progBarW = 16;
    this.progBarH = this.trackHeight;

    // Fish icon
    this.fishIcon = this.add.text(this.trackX + this.trackW/2, this.fishY, '\uD83D\uDC1F', { fontSize: '20px' }).setOrigin(0.5).setDepth(10);

    // Fish preview
    this.fishPreview = this.add.text(this.progBarX + 30, this.trackTop + 20, '\uD83D\uDC1F', { fontSize: '16px' }).setOrigin(0.5).setDepth(10);

    // Difficulty label
    this.add.text(this.progBarX + 30, this.trackTop + this.trackHeight + 20, 'Speed', { fontFamily:'Montserrat', fontSize:'10px', fontStyle:'700', color:'#7A9BAA' }).setOrigin(0.5).setDepth(10);
    this.diffBarGfx = this.add.graphics().setDepth(10);
    this.add.graphics().setDepth(9).fillStyle(0xffffff, 0.08).fillRoundedRect(this.progBarX + 10, this.trackTop + this.trackHeight + 30, 40, 6, 3);

    // Depth indicator (left side)
    this.add.text(this.trackX - 30, this.trackTop, 'Shallow', { fontFamily:'Montserrat', fontSize:'9px', fontStyle:'700', color:'#4A90D9', angle:-90 }).setOrigin(0, 0.5).setDepth(10);
    this.add.text(this.trackX - 30, this.trackTop + this.trackHeight, 'Deep', { fontFamily:'Montserrat', fontSize:'9px', fontStyle:'700', color:'#1A3A6B', angle:-90 }).setOrigin(0, 0.5).setDepth(10);

    // Graphics objects for dynamic drawing
    this.fishGfx = this.add.graphics().setDepth(8);
    this.hookGfx = this.add.graphics().setDepth(7);
    this.progGfx = this.add.graphics().setDepth(8);

    // Reel button hold mechanic
    var reelBtn = $('reel-btn');
    reelBtn.addEventListener('pointerdown', function(e) {
      e.preventDefault(); self.holding = true; reelBtn.classList.add('holding'); audio.tap();
    });
    var release = function() { self.holding = false; reelBtn.classList.remove('holding'); };
    reelBtn.addEventListener('pointerup', release);
    reelBtn.addEventListener('pointerleave', release);
    reelBtn.addEventListener('pointercancel', release);

    this.input.once('pointerdown', function() { audio.unlock(); audio.bgm('romantic'); self.audioStarted = true; });
  },

  addScore: function(d) { this.score = Math.max(0, this.score + d); $('score-value').textContent = Math.round(this.score); addScoreDOM(Math.round(d)); },

  onFishCaught: function() {
    this.fishCaught += 1;
    $('catch-label').textContent = '\uD83D\uDC1F Caught: ' + this.fishCaught;
    var catchBonus = 50 + this.difficulty * 8 + Math.round(this.timeLeft * 1.5);
    this.addScore(catchBonus);
    showToast(this, '\uD83D\uDC1F Caught! +' + catchBonus, '#4FECA2', W/2, 350);
    spawnParticles(this, this.trackX + this.trackW/2, this.fishY, 0xF5C842, 10, 500);
    audio.success();
    this.difficulty = Math.min(12, this.difficulty + 1.5);
    this.catchProgress = 0;
    this.fishY = this.trackTop + this.trackHeight * (0.3 + Math.random() * 0.4);
    this.fishV = (120 + this.difficulty * 15) * (Math.random() > 0.5 ? 1 : -1);
    this.nearStreakMs = 0;
  },

  finishGame: function(reason) {
    if (this.isOver) return; this.isOver = true; window.__activeGameScene = null;
    audio.stopBgm(600);
    this.scene.start('ResultScene', { score:Math.round(this.score), maxCombo:this.maxCombo, hits:Math.round(this.totalHits), misses:Math.round(this.totalMiss), fishCaught:this.fishCaught, reason:reason||'time' });
  },

  update: function(time, delta) {
    if (this.isOver) return;

    this.timeLeft = Math.max(0, this.timeLeft - delta/1000);
    var sec = Math.ceil(this.timeLeft);
    $('timer-label').textContent = sec + 's';

    if (this.timeLeft <= 10 && sec !== this.lastTickSec && sec > 0) {
      this.lastTickSec = sec;
      if (this.timeLeft <= 5) audio.heartbeat(); else audio.tick();
    }
    if (this.timeLeft <= 10) $('timer-label').classList.add('warn');
    else $('timer-label').classList.remove('warn');

    var dt = delta / 1000;
    var tx = this.trackX, tw = this.trackW;

    // Fish movement
    var fishAccel = 360 + this.difficulty * 30;
    var fishMaxV = 210 + this.difficulty * 18;
    this.fishV += (Math.random() - 0.5) * fishAccel * dt;
    if (this.difficulty >= 4 && Math.random() < 0.008 * this.difficulty) this.fishV *= -1.2;
    this.fishV = clamp(this.fishV, -fishMaxV, fishMaxV);
    this.fishY += this.fishV * dt;
    if (this.fishY < this.trackTop + 16 || this.fishY > this.trackTop + this.trackHeight - 16) this.fishV *= -0.85;
    this.fishY = clamp(this.fishY, this.trackTop + 16, this.trackTop + this.trackHeight - 16);

    // Hook movement
    var hookUp = this.holding ? -620 : 500;
    this.hookV += hookUp * dt;
    this.hookV = clamp(this.hookV, -260, 300);
    this.hookY += this.hookV * dt;
    this.hookY = clamp(this.hookY, this.trackTop + 16, this.trackTop + this.trackHeight - 16);

    // Draw track
    this.trackGfx.clear();
    // Track bg with depth gradient
    this.trackGfx.fillGradientStyle(0x4A90D9, 0x4A90D9, 0x0A1628, 0x0A1628, 0.4, 0.4, 0.7, 0.7);
    this.trackGfx.fillRoundedRect(tx, this.trackTop, tw, this.trackHeight, 12);
    this.trackGfx.lineStyle(2, 0x4A90D9, 0.4);
    this.trackGfx.strokeRoundedRect(tx, this.trackTop, tw, this.trackHeight, 12);

    // Draw fish zone (highlight)
    this.fishGfx.clear();
    var fishZoneH = 24;
    this.fishGfx.fillStyle(hexToInt(PRIMARY_COLOR), 0.5);
    this.fishGfx.fillRoundedRect(tx + 4, this.fishY - fishZoneH/2, tw - 8, fishZoneH, 8);
    this.fishIcon.y = this.fishY;

    // Draw hook
    this.hookGfx.clear();
    var hookH = 32;
    this.hookGfx.fillStyle(0xffffff, 0.85);
    this.hookGfx.fillRoundedRect(tx + 6, this.hookY - hookH/2, tw - 12, hookH, 8);
    this.hookGfx.lineStyle(2, 0x4A90D9, 0.6);
    this.hookGfx.strokeRoundedRect(tx + 6, this.hookY - hookH/2, tw - 12, hookH, 8);

    // Catch logic
    var near = Math.abs(this.fishY - this.hookY) < 28;
    if (near) {
      var gainRate = Math.max(0.5, 0.85 - this.difficulty * 0.025);
      this.catchProgress = clamp(this.catchProgress + dt * gainRate, 0, 1);
      this.addScore(dt * (6 + this.difficulty));
      this.totalHits += dt * 0.4;
      this.nearStreakMs += delta;
      if (this.nearStreakMs > 2000 && !this.wasNear) {
        this.combo += 1; this.maxCombo = Math.max(this.maxCombo, this.combo);
        $('combo-text').textContent = 'Streak x' + this.combo;
      }
      $('status-text').textContent = 'Hook on fish!';
      $('status-text').style.color = '#4FECA2';
      // Glow on hook
      this.hookGfx.fillStyle(hexToInt('#4FECA2'), 0.3);
      this.hookGfx.fillRoundedRect(tx + 6, this.hookY - hookH/2, tw - 12, hookH, 8);
    } else {
      var drainRate = 0.42 + this.difficulty * 0.03;
      this.catchProgress = clamp(this.catchProgress - dt * drainRate, 0, 1);
      this.totalMiss += dt * 0.2;
      this.nearStreakMs = 0;
      $('status-text').textContent = 'Track the fish!';
      $('status-text').style.color = '#7A9BAA';
      if (this.catchProgress <= 0.05 && this.wasNear) {
        damageFlash(this); audio.fail();
        this.combo = 0; $('combo-text').textContent = '';
      }
    }
    this.wasNear = near;

    // Draw catch progress bar
    this.progGfx.clear();
    // Track
    this.progGfx.fillStyle(0xffffff, 0.08);
    this.progGfx.fillRoundedRect(this.progBarX, this.trackTop, this.progBarW, this.progBarH, 8);
    // Fill (from bottom up)
    var fillH = this.progBarH * this.catchProgress;
    if (fillH > 2) {
      var progCol = this.catchProgress > 0.7 ? 0x4FECA2 : this.catchProgress > 0.3 ? hexToInt('#FFB347') : hexToInt(PRIMARY_COLOR);
      this.progGfx.fillStyle(progCol, 0.9);
      this.progGfx.fillRoundedRect(this.progBarX + 2, this.trackTop + this.progBarH - fillH, this.progBarW - 4, fillH, 6);
    }
    // Percentage text
    // (done via Phaser text, but we reuse existing)

    // Difficulty bar
    this.diffBarGfx.clear();
    var diffR = clamp(this.difficulty/12, 0, 1);
    var diffC = diffR > 0.7 ? 0xFF4D6A : diffR > 0.4 ? 0xFFB347 : 0x4FECA2;
    this.diffBarGfx.fillStyle(diffC, 1);
    this.diffBarGfx.fillRoundedRect(this.progBarX + 10, this.trackTop + this.trackHeight + 30, 40 * diffR, 6, 3);

    if (this.catchProgress >= 1) this.onFishCaught();
    if (this.timeLeft <= 0) this.finishGame('time');
  }
});

// ══════════════════════════════════════════════════════════════════════════════
var ResultScene = new Phaser.Class({
  Extends: Phaser.Scene,
  initialize: function() { Phaser.Scene.call(this, 'ResultScene'); },
  init: function(data) { this.finalScore = data.score||0; this.maxCombo = data.maxCombo||0; this.hits = data.hits||0; this.misses = data.misses||0; this.fishCaught = data.fishCaught||0; },
  create: function() {
    this.children.removeAll(true);
    var self = this; var rating = getRating(this.finalScore); var modifier = getModifier(rating);
    var modText = modifier > 0 ? '+'+modifier : String(modifier);
    var GC = { S:'#F5C842', A:'#38A169', B:'#68D391', C:'#888' };

    setVisible('boot-card', false);
    setVisible('catch-row', false); setVisible('water-surface', false);
    setVisible('status-text', false); setVisible('combo-text', false);
    setVisible('score-display', true); setVisible('reel-btn', false);
    setVisible('stars-row', true); setVisible('result-info', true);

    $('score-value').textContent = this.finalScore;

    // Water bg for result
    this.add.graphics().setDepth(0).fillStyle(0x0A1628, 1).fillRect(0, 0, W, H);

    var gt = this.add.text(W/2, 360, rating, { fontFamily:'Montserrat', fontSize:'96px', fontStyle:'900', color:GC[rating], stroke:'#000', strokeThickness:4 }).setOrigin(0.5).setDepth(10).setScale(0);
    this.tweens.add({ targets:gt, scaleX:1, scaleY:1, duration:400, ease:'Back.easeOut', delay:100 });

    this.add.text(W/2, 440, 'Great catch!', { fontFamily:'Montserrat', fontSize:'18px', fontStyle:'700', color:'#7A9BAA' }).setOrigin(0.5).setDepth(10);
    this.add.text(W/2, 470, '\uD83D\uDC1F Fish: ' + this.fishCaught, { fontFamily:'Montserrat', fontSize:'16px', fontStyle:'900', color:'#fff' }).setOrigin(0.5).setDepth(10);

    if (rating === 'S') { spawnParticles(this, W/2, 360, 0xF5C842, 16, 600); audio.success(); setTimeout(function(){audio.success();}, 100); }
    else if (rating === 'A') { audio.success(); }

    var sr = $('stars-row'); sr.innerHTML = ''; var sc = {S:4,A:3,B:2,C:1}[rating];
    for (var i = 0; i < 4; i++) { var s = document.createElement('span'); s.className = 'star '+(i<sc?'filled':'empty'); s.textContent = '\u2605'; s.style.animationDelay = (0.2+i*0.08)+'s'; sr.appendChild(s); }

    $('attr-mod').textContent = DISPLAY_ATTRIBUTE+' '+modText;
    $('stat-combo').textContent = 'Streak: '+this.maxCombo;
    $('stat-hits').textContent = 'Fish: '+this.fishCaught;

    clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('CONTINUE', 'full', 18, function() {
      notifyGameComplete({ rating:rating, score:self.finalScore, attribute:ATTRIBUTE, modifier:modifier, gameId:'stardew-fishing', maxCombo:self.maxCombo, hits:self.hits, misses:self.misses, fishCaught:self.fishCaught });
      setTimeout(function() { window.__game.scene.start('BootScene'); }, 600);
    }));
    $('btn-area').appendChild(makeCandyButton('REPLAY', 'full', 18, function() { window.__game.scene.start('GameScene'); }));
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────
applyTheme();
var DPR = Math.min(window.devicePixelRatio||1, 3);
var config = { type:Phaser.CANVAS, parent:'phaser-container', width:W, height:H, resolution:DPR, transparent:true, fps:{forceSetTimeOut:true}, scale:{mode:Phaser.Scale.NONE}, render:{antialias:true}, scene:[BootScene, GameScene, ResultScene] };
window.__game = new Phaser.Game(config);

function fitShell() { var s=$('game-shell'),sw=window.innerWidth,sh=window.innerHeight,sx=sw/W,sy=sh/H,sc=Math.min(sx,sy,1); s.style.transform='scale('+sc+')'; s.style.transformOrigin='top center'; if(sy<sx) s.style.marginTop='0px'; else s.style.marginTop=Math.max(0,(sh-H*sc)/2)+'px'; }
window.addEventListener('resize', fitShell); fitShell();
</script>
