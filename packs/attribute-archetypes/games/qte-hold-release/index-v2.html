<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>QTE Hold Release</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; }

  :root {
    --bg: #1A1221;
    --primary: #EC4F99;
    --primary-light: #F5A0C8;
    --primary-dark: #A5366B;
    --secondary: #FF9B5E;
    --accent-gold: #FFD76E;
    --accent-red: #E53E3E;
    --success: #38C97A;
    --warning: #FFB347;
    --danger: #FF4D6A;
    --text-muted: #7A7A8E;
    --track-bg: #2A1E33;
    --track-border: #3D2E4A;
  }

  body { background: var(--bg); }

  #game-shell {
    position: relative;
    width: 393px; height: 852px;
    margin: 0 auto; overflow: hidden;
    background: var(--bg);
  }

  #phaser-container {
    position: absolute; top: 0; left: 0;
    width: 393px; height: 852px;
    z-index: 1;
  }
  #phaser-container canvas { display: block; }

  .title-bar {
    position: absolute; top: 0; left: 0; width: 100%; height: 76px;
    background: var(--primary); z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  .title-bar::after {
    content: ''; position: absolute; bottom: -12px; left: 0;
    width: 100%; height: 12px;
    background-image: radial-gradient(circle at 12px 0px, var(--primary) 12px, transparent 12px);
    background-size: 24px 12px; background-repeat: repeat-x;
  }
  .title-text { font-weight: 900; font-size: 18px; color: #fff; }

  .portrait {
    position: absolute; top: 100px; width: 72px; height: 72px;
    border-radius: 100px; background: #fff;
    display: flex; justify-content: center; align-items: center;
    font-weight: 900; font-size: 28px; color: var(--primary); z-index: 11;
  }
  .portrait.left { left: 24px; }
  .portrait.right { right: 24px; }

  .vs-text {
    position: absolute; top: 116px; left: 0; width: 100%;
    text-align: center; font-weight: 800; font-size: 40px;
    color: var(--primary); z-index: 11;
  }

  .name {
    position: absolute; top: 180px; width: 72px;
    text-align: center; font-weight: 700; font-size: 14px;
    color: #fff; z-index: 11;
  }
  .name.left { left: 24px; }
  .name.right { right: 24px; }

  .hp-bar {
    position: absolute; top: 206px; width: 163px; height: 24px;
    border-radius: 100px; border: 2px solid #fff;
    overflow: hidden; z-index: 11;
  }
  .hp-bar.left { left: 24px; }
  .hp-bar.right { right: 24px; }
  .hp-fill { position: absolute; top: 0; bottom: 0; transition: width 0.3s ease; }
  .hp-bar.left .hp-fill {
    left: 0; background: linear-gradient(to right, rgba(79,236,162,0.3), var(--success));
    border-radius: 100px 0 0 100px;
  }
  .hp-bar.right .hp-fill {
    right: 0; background: linear-gradient(to left, rgba(236,79,153,0.3), var(--primary));
    border-radius: 0 100px 100px 0;
  }
  .hp-bar .pct {
    position: absolute; top: 0; bottom: 0;
    display: flex; align-items: center;
    font-weight: 700; font-size: 12px; color: #fff;
  }
  .hp-bar.left .pct { right: 8px; }
  .hp-bar.right .pct { left: 8px; }

  .dialogue {
    position: absolute; top: 240px; right: 24px;
    width: 228px; min-height: 50px;
    background: #fff; border-radius: 12px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    padding: 10px 16px; z-index: 11;
    font-weight: 700; font-size: 14px; color: #1A1221;
    text-align: center; line-height: 1.4;
  }
  .dialogue::before {
    content: ''; position: absolute; top: -8px; right: 40px;
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid #fff;
  }

  /* ── Power Gauge DOM overlay ── */
  .gauge-area {
    position: absolute; top: 310px; left: 50%;
    transform: translateX(-50%);
    width: 260px; height: 260px;
    z-index: 12;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .gauge-center {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .gauge-pct {
    font-weight: 900; font-size: 52px; color: #fff;
    line-height: 1; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .gauge-label {
    font-weight: 700; font-size: 14px; color: rgba(255,255,255,0.6);
    letter-spacing: 3px; text-transform: uppercase; margin-top: 4px;
  }
  .gauge-status {
    font-weight: 800; font-size: 15px; margin-top: 8px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .gauge-grade {
    font-weight: 900; font-size: 80px; line-height: 1;
    text-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .gauge-grade.pop-in { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .gauge-grade-score {
    font-weight: 700; font-size: 16px; color: rgba(255,255,255,0.8); margin-top: 4px;
  }

  .score-display {
    position: absolute; top: 590px; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center; z-index: 11;
  }
  .score-display .label {
    font-weight: 700; font-size: 13px; color: #888;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .score-display .value-wrap { position: relative; display: inline-block; margin-top: 2px; }
  .score-display .value { font-weight: 900; font-size: 42px; color: #fff; line-height: 1; }
  .score-display .delta {
    position: absolute; top: -2px; right: -28px;
    font-weight: 900; font-size: 18px; opacity: 0; pointer-events: none;
  }
  .score-display .delta.pop { animation: deltaPop 0.8s ease-out forwards; }
  .score-display .delta.plus { color: var(--success); }
  .score-display .delta.minus { color: var(--danger); }
  @keyframes deltaPop {
    0%   { opacity:1; transform:translateY(0); }
    60%  { opacity:1; transform:translateY(-6px); }
    100% { opacity:0; transform:translateY(-14px); }
  }

  .timer-text {
    position: absolute; top: 650px; left: 0; width: 100%;
    text-align: center; font-weight: 700; font-size: 13px; color: #888; z-index: 11;
  }
  .timer-text.warn { color: var(--danger); }

  .combo-text {
    position: absolute; top: 578px; left: 0; width: 100%;
    text-align: center; font-weight: 900; font-size: 18px;
    color: var(--accent-gold); z-index: 11;
    text-shadow: 0 0 4px rgba(255,255,255,0.5);
    transition: transform 0.12s ease;
  }

  .stars-row {
    position: absolute; top: 580px; left: 0; width: 100%;
    display: flex; justify-content: center; gap: 12px; z-index: 11;
  }
  .stars-row .star {
    font-size: 30px; opacity: 0;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .stars-row .star.filled { color: #F5C842; }
  .stars-row .star.empty { color: #555555; }

  .result-info {
    position: absolute; top: 626px; left: 0; width: 100%;
    text-align: center; z-index: 11;
  }
  .result-info .attr-mod { font-weight: 700; font-size: 16px; color: #AAAAAA; margin-bottom: 12px; }
  .result-info .stats {
    display: flex; justify-content: center; gap: 40px;
    font-weight: 700; font-size: 14px; color: #fff;
  }

  .btn-area {
    position: absolute; bottom: 20px; left: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 14px; z-index: 10;
  }
  .btn-candy {
    position: relative; height: 64px; border-radius: 24px;
    border: 2px solid var(--primary);
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    overflow: hidden; cursor: pointer; z-index: 10;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .btn-candy.full { width: 369px; }
  .btn-candy .base { position: absolute; inset: 0; background: var(--primary); border-radius: 22px; }
  .btn-candy .glass { position: absolute; inset: 0; background: rgba(255,255,255,0.3); border-radius: 22px; }
  .btn-candy .highlight {
    position: absolute; left: 0; right: 0; top: 2px; height: 20px;
    background: rgba(255,255,255,0.3); border-radius: 20px 20px 0 0;
  }
  .btn-candy .glow {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 4px 4px rgba(255,255,255,0.5);
    border-radius: 22px; pointer-events: none;
  }
  .btn-candy .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; color: #fff; z-index: 1; gap: 8px;
  }
  .btn-candy:active { transform: translateY(3px); box-shadow: none; }
  .btn-candy.holding {
    animation: holdPulse 0.3s infinite alternate;
    border-color: var(--accent-gold);
  }
  .btn-candy.holding .base { background: linear-gradient(135deg, var(--accent-gold), var(--warning)); }
  .btn-candy.holding .label { color: #1A1221; }
  @keyframes holdPulse {
    0% { transform: scale(1); box-shadow: 0 4px 0 rgba(0,0,0,0.15), 0 0 12px var(--accent-gold); }
    100% { transform: scale(1.02); box-shadow: 0 4px 0 rgba(0,0,0,0.15), 0 0 24px var(--accent-gold); }
  }

  .hidden { display: none !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="game-shell">
  <div id="phaser-container"></div>

  <div class="title-bar">
    <span class="title-text" id="title-text">EP 8: Hold Release</span>
  </div>

  <div class="portrait left" id="portrait-left">P</div>
  <div class="portrait right" id="portrait-right">B</div>
  <div class="vs-text">VS</div>
  <div class="name left" id="name-left">Player</div>
  <div class="name right" id="name-right">Boss</div>

  <div class="hp-bar left" id="hp-left">
    <div class="hp-fill" id="hp-fill-left" style="width:100%;"></div>
    <span class="pct" id="hp-pct-left">100%</span>
  </div>
  <div class="hp-bar right" id="hp-right">
    <div class="hp-fill" id="hp-fill-right" style="width:100%;"></div>
    <span class="pct" id="hp-pct-right">100%</span>
  </div>

  <div class="dialogue" id="dialogue">Charge your attack to full power!</div>

  <div class="gauge-area" id="gauge-area">
    <div class="gauge-center" id="gauge-center">
      <div class="gauge-pct" id="gauge-pct">0%</div>
      <div class="gauge-label">POWER</div>
      <div class="gauge-status" id="gauge-status">HOLD TO CHARGE</div>
    </div>
  </div>

  <div class="score-display hidden" id="score-display">
    <span class="label">SCORE</span>
    <div class="value-wrap">
      <span class="value" id="score-value">0</span>
      <span class="delta" id="score-delta"></span>
    </div>
  </div>
  <div class="timer-text hidden" id="timer-text">30s</div>
  <div class="combo-text hidden" id="combo-text"></div>
  <div class="stars-row hidden" id="stars-row"></div>
  <div class="result-info hidden" id="result-info">
    <div class="attr-mod" id="attr-mod"></div>
    <div class="stats"><span id="stat-combo"></span><span id="stat-hits"></span></div>
  </div>

  <div class="btn-area" id="btn-area"></div>
</div>

<script>
// ── Host context ─────────────────────────────────────────────────────────────
var CTX = window.__EPISODE_CTX__ || {};
var params = new URLSearchParams(window.location.search);
var ATTRIBUTE = CTX.attribute || params.get('attribute') || 'Willpower';
var PRIMARY_COLOR = CTX.primaryColor || params.get('primaryColor') || '#EC4F99';
var DISPLAY_ATTRIBUTE = (CTX.character && CTX.character.name ? CTX.character.name + '\u7684' : '') + ATTRIBUTE;
var EPISODE_LABEL = CTX.episodeLabel || params.get('episodeLabel') || 'EP 8';
var EPISODE_TITLE = CTX.episodeTitle || params.get('episodeTitle') || 'Hold Release';

var W = 393, H = 852;
var ROUND_SECONDS = 30;
var RATING_THRESHOLDS = { S: 280, A: 210, B: 150, C: 90 };
var MODIFIER_BY_RATING = { S: 3, A: 1, B: 0, C: -1 };

function getRating(s) { if(s>=RATING_THRESHOLDS.S)return'S'; if(s>=RATING_THRESHOLDS.A)return'A'; if(s>=RATING_THRESHOLDS.B)return'B'; return'C'; }
function getModifier(r) { return MODIFIER_BY_RATING[r]; }

function notifyGameComplete(result) {
  var p = JSON.stringify(result);
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.jsBridge) { window.webkit.messageHandlers.jsBridge.postMessage(p); return; }
  if (window.jsBridge && window.jsBridge.postMessage) { window.jsBridge.postMessage(p); return; }
  if (window.parent !== window) { window.parent.postMessage(p, '*'); return; }
  console.log('[GameComplete]', result);
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function hexToInt(h) { return parseInt(h.replace('#',''),16); }

// ── DOM Helpers ──────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function setVisible(id, v) { var e=$(id); if(!e)return; if(v)e.classList.remove('hidden'); else e.classList.add('hidden'); }

function makeCandyButton(label, cls, fs, onClick) {
  var b = document.createElement('div');
  b.className = 'btn-candy ' + (cls||'full');
  b.innerHTML = '<div class="base"></div><div class="glass"></div><div class="highlight"></div><div class="glow"></div><div class="label" style="font-size:'+(fs||18)+'px">'+label+'</div>';
  b.addEventListener('pointerdown', function(e) { e.preventDefault(); audio.tap(); });
  b.addEventListener('pointerup', function(e) { e.preventDefault(); if(onClick)onClick(); });
  return b;
}

function makeHoldButton(label, fs, onDown, onUp) {
  var b = document.createElement('div');
  b.className = 'btn-candy full'; b.id = 'hold-btn';
  b.innerHTML = '<div class="base"></div><div class="glass"></div><div class="highlight"></div><div class="glow"></div><div class="label" style="font-size:'+(fs||18)+'px">'+label+'</div>';
  function hd(e) { e.preventDefault(); b.classList.add('holding'); b.querySelector('.label').textContent='CHARGING... \u26A1'; audio.tap(); if(onDown)onDown(); }
  function hu(e) { e.preventDefault(); b.classList.remove('holding'); b.querySelector('.label').textContent=label; if(onUp)onUp(); }
  b.addEventListener('pointerdown',hd);
  b.addEventListener('pointerup',hu);
  b.addEventListener('pointerleave',hu);
  b.addEventListener('pointercancel',hu);
  return b;
}

function clearBtnArea() { $('btn-area').innerHTML=''; }

function updateHpBar(side, ratio) {
  var pct = Math.round(clamp(ratio,0,1)*100);
  $(side==='left'?'hp-fill-left':'hp-fill-right').style.width = pct+'%';
  $(side==='left'?'hp-pct-left':'hp-pct-right').textContent = pct+'%';
}

// ── Theme System ─────────────────────────────────────────────────────────────
var THEMES = {
  combat: { bg:'#1A1221', primary:'#EC4F99', primaryLight:'#F5A0C8', primaryDark:'#A5366B', secondary:'#FF9B5E', accentGold:'#FFD76E', accentRed:'#E53E3E', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textMuted:'#7A7A8E', trackBg:'#2A1E33', trackBorder:'#3D2E4A', bgmStyle:'action' },
  dark:   { bg:'#0D0D1A', primary:'#8B5CF6', primaryLight:'#B794F6', primaryDark:'#5B3AA0', secondary:'#6D28D9', accentGold:'#C084FC', accentRed:'#DC2626', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textMuted:'#6E6A80', trackBg:'#1A1028', trackBorder:'#2D2040', bgmStyle:'tense' },
  ocean:  { bg:'#0A1628', primary:'#3B82F6', primaryLight:'#7CB3F6', primaryDark:'#1E4FAA', secondary:'#0EA5E9', accentGold:'#67E8F9', accentRed:'#EF4444', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textMuted:'#64748B', trackBg:'#0F2040', trackBorder:'#1A3058', bgmStyle:'mystery' },
  rose:   { bg:'#1A0A14', primary:'#F472B6', primaryLight:'#F9A8D4', primaryDark:'#BE185D', secondary:'#EC4899', accentGold:'#FBCFE8', accentRed:'#E11D48', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textMuted:'#7A6B80', trackBg:'#2A1020', trackBorder:'#3D1830', bgmStyle:'romantic' }
};

function resolveThemeName() {
  var a=(ATTRIBUTE||'').toLowerCase();
  if(/\u8eab\u624b|atk|attack|agility/i.test(a))return'combat';
  if(/\u610f\u5fd7|wil/i.test(a))return'dark';
  if(/\u667a\u6167|int|wisdom/i.test(a))return'ocean';
  if(/\u9b45\u529b|cha|charm/i.test(a))return'rose';
  return'combat';
}

var THEME = THEMES[resolveThemeName()];

(function applyCSS(t){
  var r=document.documentElement.style;
  r.setProperty('--bg',t.bg); r.setProperty('--primary',t.primary);
  r.setProperty('--primary-light',t.primaryLight); r.setProperty('--primary-dark',t.primaryDark);
  r.setProperty('--secondary',t.secondary); r.setProperty('--accent-gold',t.accentGold);
  r.setProperty('--accent-red',t.accentRed); r.setProperty('--success',t.success);
  r.setProperty('--warning',t.warning); r.setProperty('--danger',t.danger);
  r.setProperty('--text-muted',t.textMuted); r.setProperty('--track-bg',t.trackBg);
  r.setProperty('--track-border',t.trackBorder);
})(THEME);

function initShellDOM() {
  $('title-text').textContent = EPISODE_LABEL+': '+EPISODE_TITLE;
  $('portrait-left').textContent = (CTX.character&&CTX.character.name)?CTX.character.name.charAt(0):'P';
}

// ── MoonAudio ────────────────────────────────────────────────────────────────
class MoonAudio {
  constructor(){this._ctx=null;this._master=null;this._bgmNodes=[];this._unlocked=false;}
  _ensure(){if(this._ctx)return this._ctx;this._ctx=new(window.AudioContext||window.webkitAudioContext)();this._master=this._ctx.createGain();this._master.gain.value=0.5;this._master.connect(this._ctx.destination);return this._ctx;}
  unlock(){if(this._unlocked)return;this._ensure();if(this._ctx.state==='suspended')this._ctx.resume();this._unlocked=true;}
  tap(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.08);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.1);}
  success(){var c=this._ensure(),t=c.currentTime,m=this._master;[523,784].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.12);g.gain.linearRampToValueAtTime(0.22,t+i*0.12+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.3);o.connect(g).connect(m);o.start(t+i*0.12);o.stop(t+i*0.12+0.3);});}
  fail(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.linearRampToValueAtTime(80,t+0.25);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.3);}
  alert(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(220,t+0.15);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.2);}
  heartbeat(){var c=this._ensure(),t=c.currentTime,m=this._master;[0,0.18].forEach(function(off){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(60,t+off);o.frequency.exponentialRampToValueAtTime(30,t+off+0.15);g.gain.setValueAtTime(0.3,t+off);g.gain.exponentialRampToValueAtTime(0.001,t+off+0.2);o.connect(g).connect(m);o.start(t+off);o.stop(t+off+0.2);});}
  tick(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=1000;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.06);}

// ── Phaser Helpers ───────────────────────────────────────────────────────────
function spawnParticles(sc,x,y,col,cnt,life){for(var i=0;i<cnt;i++){var a=(Math.PI*2*i)/cnt+Math.random()*0.3,sp=80+Math.random()*120,sz=3+Math.random()*4;var p=sc.add.circle(x,y,sz,col,1).setDepth(50);sc.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scaleX:0.2,scaleY:0.2,duration:life||400,ease:'Quad.easeOut',onComplete:function(){p.destroy();}});}}
function showToast(sc,txt,hex,x,y){var t=sc.add.text(x,y,txt,{fontFamily:'Montserrat',fontSize:'28px',fontStyle:'900',color:hex,stroke:'#ffffff',strokeThickness:4}).setOrigin(0.5).setDepth(60).setAlpha(0);sc.tweens.add({targets:t,y:y-30,alpha:1,duration:200,ease:'Back.easeOut',onComplete:function(){sc.time.delayedCall(600,function(){sc.tweens.add({targets:t,y:y-50,alpha:0,duration:200,onComplete:function(){t.destroy();}});});}});}
function damageFlash(sc){var f=sc.add.rectangle(W/2,H/2,W,H,0xff4d6a,0).setDepth(80);sc.tweens.add({targets:f,alpha:0.3,yoyo:true,duration:80,onComplete:function(){f.destroy();}});}
function screenShake(sc,i){sc.cameras.main.shake(150,i||0.008);}

//  BOOT SCENE
// ══════════════════════════════════════════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor(){super('BootScene');}

  create(){
    this.children.removeAll(true);
    setVisible('dialogue',true);
    setVisible('score-display',false);
    setVisible('timer-text',false);
    setVisible('combo-text',false);
    setVisible('stars-row',false);
    setVisible('result-info',false);
    setVisible('gauge-area',true);

    updateHpBar('left',1); updateHpBar('right',1);
    $('dialogue').textContent='Charge your attack. Release in the target zone!';

    // Show rules in gauge center
    $('gauge-center').innerHTML =
      '<div style="font-weight:900;font-size:20px;color:'+THEME.primary+';margin-bottom:8px;">GAME RULE</div>'+
      '<div style="font-weight:700;font-size:14px;color:#ccc;line-height:1.8;text-align:center">Hold to charge power<br>Watch for target zone<br>Release at right moment!</div>';

    // Draw preview ring in Phaser
    var gfx=this.add.graphics().setDepth(3);

    gfx.lineStyle(12,hexToInt(THEME.trackBg),0.6);
    gfx.beginPath(); gfx.arc(cx,cy,r,0,Math.PI*2); gfx.strokePath();
    // Target zone preview
    gfx.lineStyle(14,hexToInt(THEME.success),0.35);
    gfx.beginPath(); gfx.arc(cx,cy,r,-Math.PI*0.3,Math.PI*0.1); gfx.strokePath();
    // Inner dark circle
    this.add.circle(cx,cy,95,hexToInt(THEME.bg),0.85).setDepth(2);

    clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('START','full',18,function(){
      audio.unlock(); window.__game.scene.start('GameScene');
    }));
    $('btn-area').appendChild(makeCandyButton('UNLOCK S TIER \uD83C\uDF19 50','full',16,function(){ audio.unlock(); }));
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  GAME SCENE — Power Gauge
// ══════════════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor(){super('GameScene');}

  init(){
    this.score=0; this.timeLeft=ROUND_SECONDS; this.isOver=false;
    this.charge=0; this.charging=false;
    this.targetCenter=50; this.targetWidth=22; this.targetDriftMs=1800;
    this.overheatMs=0; this.combo=0; this.maxCombo=0;
    this.totalHits=0; this.totalMiss=0;
    this.lastTickSec=-1; this.audioStarted=false;
    this.difficulty=1; this.consecutiveMiss=0;
    this.bossHp=100; this.playerHp=3;
  }

  create(){
    this.children.removeAll(true);
    var self=this;
    window.__activeGameScene=this;

    setVisible('dialogue',false);
    setVisible('score-display',true);
    setVisible('timer-text',true);
    setVisible('combo-text',true);
    setVisible('stars-row',false);
    setVisible('result-info',false);
    setVisible('gauge-area',true);

    $('score-value').textContent='0';
    $('score-delta').classList.remove('pop','plus','minus');
    $('timer-text').textContent=ROUND_SECONDS+'s';
    $('timer-text').classList.remove('warn');
    $('combo-text').textContent='';

    $('gauge-center').innerHTML =
      '<div class="gauge-pct" id="gauge-pct">0%</div>'+
      '<div class="gauge-label">POWER</div>'+
      '<div class="gauge-status" id="gauge-status" style="color:'+THEME.textMuted+'">HOLD TO CHARGE</div>';

    updateHpBar('left',1); updateHpBar('right',1);

    // Phaser gauge elements
    var cx=W/2, cy=440;
    this.gR=120; this.gCx=cx; this.gCy=cy;

    this.add.circle(cx,cy,95,hexToInt(THEME.bg),0.85).setDepth(2);
    this.trackGfx=this.add.graphics().setDepth(3);
    this.targetGfx=this.add.graphics().setDepth(4);
    this.chargeGfx=this.add.graphics().setDepth(5);
    this.glowGfx=this.add.graphics().setDepth(6);
    // Tick marks around ring
    this.tickGfx=this.add.graphics().setDepth(3);
    this.drawTrack();
    this.drawTicks();
    this.refreshTargetZone();

    // Hold button
    clearBtnArea();
    $('btn-area').appendChild(makeHoldButton('HOLD TO CHARGE \u26A1',18,
      function(){ if(!self.isOver) self.charging=true; },
      function(){ if(!self.isOver) self.releaseHold(); }
    ));

    this.input.once('pointerdown',function(){
      audio.unlock(); audio.bgm(THEME.bgmStyle); self.audioStarted=true;
    });
  }

  drawTrack(){
    this.trackGfx.clear();
    this.trackGfx.lineStyle(14,hexToInt(THEME.trackBg),0.7);
    this.trackGfx.beginPath(); this.trackGfx.arc(this.gCx,this.gCy,this.gR,0,Math.PI*2); this.trackGfx.strokePath();
    this.trackGfx.lineStyle(2,hexToInt(THEME.trackBorder),0.4);
    this.trackGfx.beginPath(); this.trackGfx.arc(this.gCx,this.gCy,this.gR+8,0,Math.PI*2); this.trackGfx.strokePath();
    this.trackGfx.beginPath(); this.trackGfx.arc(this.gCx,this.gCy,this.gR-8,0,Math.PI*2); this.trackGfx.strokePath();
  }

  drawTicks(){
    this.tickGfx.clear();
    this.tickGfx.lineStyle(1.5,hexToInt(THEME.trackBorder),0.3);
    for(var i=0;i<20;i++){
      var a=-Math.PI/2+(i/20)*Math.PI*2;
      var ix=this.gCx+Math.cos(a)*(this.gR-9);
      var iy=this.gCy+Math.sin(a)*(this.gR-9);
      var ox=this.gCx+Math.cos(a)*(this.gR+9);
      var oy=this.gCy+Math.sin(a)*(this.gR+9);
      this.tickGfx.beginPath(); this.tickGfx.moveTo(ix,iy); this.tickGfx.lineTo(ox,oy); this.tickGfx.strokePath();
    }
  }

  refreshTargetZone(){
    this.targetGfx.clear();
    var startA=-Math.PI/2+(this.targetCenter-this.targetWidth/2)/100*Math.PI*2;
    var endA=-Math.PI/2+(this.targetCenter+this.targetWidth/2)/100*Math.PI*2;
    this.targetGfx.lineStyle(16,hexToInt(THEME.success),0.45);
    this.targetGfx.beginPath(); this.targetGfx.arc(this.gCx,this.gCy,this.gR,startA,endA); this.targetGfx.strokePath();
    // Gold markers at edges
    this.targetGfx.lineStyle(3,hexToInt(THEME.accentGold),0.9);
    for(var i=0;i<2;i++){
      var a=i===0?startA:endA;
      var ix=this.gCx+Math.cos(a)*(this.gR-12), iy=this.gCy+Math.sin(a)*(this.gR-12);
      var ox=this.gCx+Math.cos(a)*(this.gR+12), oy=this.gCy+Math.sin(a)*(this.gR+12);
      this.targetGfx.beginPath(); this.targetGfx.moveTo(ix,iy); this.targetGfx.lineTo(ox,oy); this.targetGfx.strokePath();
    }
  }

  releaseHold(){
    if(this.isOver||!this.charging)return;
    this.charging=false;
    var lo=this.targetCenter-this.targetWidth/2, hi=this.targetCenter+this.targetWidth/2;

    if(this.charge>=lo&&this.charge<=hi){
      var cb=Math.min(this.combo,5)*4, gain=18+cb;
      this.combo+=1; this.maxCombo=Math.max(this.maxCombo,this.combo);
      this.totalHits+=1; this.consecutiveMiss=0;
      this.addScore(gain);
      this.difficulty=Math.min(12,this.difficulty+0.5);

      var dmg=6+Math.min(this.combo,5)*2;
      this.bossHp=clamp(this.bossHp-dmg,0,100); this.updateHpBars();

      var isPerfect=Math.abs(this.charge-this.targetCenter)<this.targetWidth*0.25;
      if(isPerfect){
        showToast(this,'\u2726 Perfect! +'+gain,THEME.success,W/2,360);
        spawnParticles(this,this.gCx,this.gCy,hexToInt(THEME.accentGold),10,400);
        $('gauge-status').textContent='\u2726 PERFECT!'; $('gauge-status').style.color=THEME.accentGold;
      } else {
        showToast(this,'Good! +'+gain,THEME.primary,W/2,360);
        $('gauge-status').textContent='GOOD HIT!'; $('gauge-status').style.color=THEME.success;
      }
      audio.success();
      $('combo-text').textContent='Combo x'+this.combo;
      $('combo-text').style.transform='scale(1.3)';
      setTimeout(function(){$('combo-text').style.transform='scale(1)';},120);

      this.targetCenter=clamp(this.targetCenter+(Math.random()-0.5)*36,16,84);
      this.targetWidth=clamp(22-this.difficulty*0.8,10,22);
      this.refreshTargetZone();

      if(this.bossHp<=0){ this.addScore(80+Math.round(this.timeLeft*2)); this.finishGame('clear'); }
      return;
    }

    // Miss
    this.consecutiveMiss++;
    var pen=6+Math.min(this.consecutiveMiss,4)*2;
    this.combo=0; this.totalMiss+=1; this.addScore(-pen);
    $('gauge-status').textContent='MISS!'; $('gauge-status').style.color=THEME.danger;
    showToast(this,'Miss! -'+pen,THEME.danger,W/2,360);
    audio.fail(); damageFlash(this); screenShake(this,0.008);
    $('combo-text').textContent='';

    this.targetCenter=20+Math.random()*60;
    this.targetWidth=clamp(20-this.difficulty*0.5,12,20);
    this.refreshTargetZone();
  }

  updateHpBars(){ updateHpBar('left',this.playerHp/3); updateHpBar('right',this.bossHp/100); }

  addScore(d){
    this.score=Math.max(0,this.score+d);
    $('score-value').textContent=Math.round(this.score);
    var el=$('score-delta'); el.classList.remove('pop','plus','minus');
    el.textContent=(d>=0?'+':'')+d; el.classList.add(d>=0?'plus':'minus');
    void el.offsetWidth; el.classList.add('pop');
  }

  finishGame(reason){
    if(this.isOver)return; this.isOver=true;
    window.__activeGameScene=null; audio.stopBgm(600);
    this.scene.start('ResultScene',{score:Math.round(this.score),maxCombo:this.maxCombo,hits:this.totalHits,misses:this.totalMiss,reason:reason||'time'});
  }

  update(time,delta){
    if(this.isOver)return;
    var dt=delta/1000;
    this.timeLeft=Math.max(0,this.timeLeft-dt);
    var sec=Math.ceil(this.timeLeft);
    $('timer-text').textContent=sec+'s';

    if(this.timeLeft<=10&&sec!==this.lastTickSec&&sec>0){
      this.lastTickSec=sec;
      if(this.timeLeft<=5)audio.heartbeat(); else audio.tick();
    }
    if(this.timeLeft<=10)$('timer-text').classList.add('warn');
    else $('timer-text').classList.remove('warn');

    var elapsed=ROUND_SECONDS-this.timeLeft;
    this.difficulty=Math.max(this.difficulty,1+elapsed*0.2);

    var chargeSpeed=0.085+this.difficulty*0.004;
    if(this.charging){
      this.charge=clamp(this.charge+delta*chargeSpeed,0,100);
      this.overheatMs=this.charge>=100?this.overheatMs+delta:0;

      if(this.charge>=90&&this.charge<100){
        $('gauge-status').textContent='\u26A0 OVERHEATING!'; $('gauge-status').style.color=THEME.danger;
      } else if(this.charge>=100){
        $('gauge-status').textContent='\u26A0\u26A0 OVERHEAT! \u26A0\u26A0'; $('gauge-status').style.color=THEME.danger;
      } else if(this.charge>0){
        $('gauge-status').textContent='CHARGING...'; $('gauge-status').style.color=THEME.primary;
      }

      if(this.overheatMs>380){
        this.charging=false; this.consecutiveMiss++;
        var pen=8+Math.min(this.consecutiveMiss,3)*2;
        this.combo=0; this.totalMiss+=1; this.addScore(-pen);
        this.charge=0; this.overheatMs=0;
        $('gauge-status').textContent='OVERCHARGED!'; $('gauge-status').style.color=THEME.danger;
        showToast(this,'Overcharged! -'+pen,THEME.danger,W/2,360);
        audio.fail(); damageFlash(this); screenShake(this,0.012);
        $('combo-text').textContent='';
        var hb=$('hold-btn');
        if(hb){hb.classList.remove('holding');hb.querySelector('.label').textContent='HOLD TO CHARGE \u26A1';}
      }
    } else {
      this.charge=clamp(this.charge-delta*0.04,0,100);
      this.overheatMs=0;
      if(this.charge<=1){$('gauge-status').textContent='HOLD TO CHARGE';$('gauge-status').style.color=THEME.textMuted;}
    }

    $('gauge-pct').textContent=Math.round(this.charge)+'%';

    // Draw charge arc
    this.chargeGfx.clear(); this.glowGfx.clear();
    if(this.charge>0){
      var fillA=-Math.PI/2+(this.charge/100)*Math.PI*2;
      var fc; if(this.charge>=90)fc=hexToInt(THEME.danger); else if(this.charge>=70)fc=hexToInt(THEME.warning); else fc=hexToInt(THEME.primary);
      this.chargeGfx.lineStyle(14,fc,0.9);
      this.chargeGfx.beginPath(); this.chargeGfx.arc(this.gCx,this.gCy,this.gR,-Math.PI/2,fillA); this.chargeGfx.strokePath();
      // Head dot
      var hx=this.gCx+Math.cos(fillA)*this.gR, hy=this.gCy+Math.sin(fillA)*this.gR;
      this.chargeGfx.fillStyle(0xffffff,0.9); this.chargeGfx.fillCircle(hx,hy,6);

      if(this.charge>=85){
        var pulse=0.15+Math.sin(time/100)*0.1;
        this.glowGfx.lineStyle(24,hexToInt(THEME.danger),pulse);
        this.glowGfx.beginPath(); this.glowGfx.arc(this.gCx,this.gCy,this.gR,0,Math.PI*2); this.glowGfx.strokePath();
      }
    }

    // Target drift
    this.targetDriftMs-=delta;
    if(this.targetDriftMs<=0){
      this.targetDriftMs=Math.max(800,1400-this.difficulty*40)+Math.random()*600;
      this.targetCenter=clamp(this.targetCenter+(Math.random()-0.5)*(26+this.difficulty*2),16,84);
      this.refreshTargetZone();
    }

    if(this.timeLeft<=0)this.finishGame('time');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  RESULT SCENE
// ══════════════════════════════════════════════════════════════════════════════
class ResultScene extends Phaser.Scene {
  constructor(){super('ResultScene');}
  init(data){this.finalScore=data.score||0;this.maxCombo=data.maxCombo||0;this.hits=data.hits||0;this.misses=data.misses||0;this.reason=data.reason||'time';}

  create(){
    this.children.removeAll(true);
    var rating=getRating(this.finalScore), modifier=getModifier(rating);
    var modText=modifier>0?'+'+modifier:String(modifier);
    var self=this;
    var rHex={S:'#F5C842',A:THEME.primary,B:'#9B7DB8',C:THEME.textMuted};
    var rColor=rHex[rating];

    setVisible('dialogue',false); setVisible('score-display',false);
    setVisible('timer-text',false); setVisible('combo-text',false);
    setVisible('stars-row',true); setVisible('result-info',true);
    setVisible('gauge-area',true);

    updateHpBar('left',1); updateHpBar('right',1);

    $('gauge-center').innerHTML =
      '<div class="gauge-grade pop-in" style="color:'+rColor+'">'+rating+'</div>'+
      '<div class="gauge-grade-score">Score '+this.finalScore+'</div>';

    // Result ring
    var gfx=this.add.graphics().setDepth(3);
    var cx=W/2,cy=440,r=120;
    this.add.circle(cx,cy,95,hexToInt(THEME.bg),0.85).setDepth(2);
    gfx.lineStyle(14,hexToInt(rColor),0.6);
    gfx.beginPath(); gfx.arc(cx,cy,r,0,Math.PI*2); gfx.strokePath();

    if(rating==='S'){
      spawnParticles(this,cx,cy,hexToInt('#F5C842'),16,600);
      var g1=this.add.circle(cx,cy,80,hexToInt('#F5C842'),0.2).setDepth(2).setScale(0);
      this.tweens.add({targets:g1,scaleX:2,scaleY:2,alpha:0,duration:900});
      audio.success(); setTimeout(function(){audio.success();},100);
    } else if(rating==='A'){
      var g2=this.add.circle(cx,cy,60,hexToInt(THEME.primary),0.15).setDepth(2).setScale(0);
      this.tweens.add({targets:g2,scaleX:1.5,scaleY:1.5,alpha:0,duration:700});
      audio.success();
    }

    var starsRow=$('stars-row'); starsRow.innerHTML='';
    var sc={S:4,A:3,B:2,C:1}[rating];
    for(var i=0;i<4;i++){
      var s=document.createElement('span');
      s.className='star '+(i<sc?'filled':'empty');
      s.textContent='\u2605'; s.style.animationDelay=(0.2+i*0.08)+'s';
      starsRow.appendChild(s);
    }

    $('attr-mod').textContent=DISPLAY_ATTRIBUTE+' '+modText;
    $('stat-combo').textContent='Combo: '+this.maxCombo;
    $('stat-hits').textContent='Hits: '+this.hits+'/'+this.misses;

    clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('CONTINUE','full',18,function(){
      notifyGameComplete({rating:rating,score:self.finalScore,attribute:ATTRIBUTE,modifier:modifier,gameId:'qte-hold-release',maxCombo:self.maxCombo,hits:self.hits,misses:self.misses});
      setTimeout(function(){window.__game.scene.start('BootScene');},600);
    }));
    $('btn-area').appendChild(makeCandyButton('REPLAY','full',18,function(){window.__game.scene.start('GameScene');}));
  }
}

initShellDOM();
var DPR=Math.min(window.devicePixelRatio||1,3);
var config={type:Phaser.CANVAS,parent:'phaser-container',width:W,height:H,resolution:DPR,transparent:true,fps:{forceSetTimeOut:true},scale:{mode:Phaser.Scale.NONE},render:{antialias:true},scene:[BootScene,GameScene,ResultScene]};
window.__game=new Phaser.Game(config);

function fitShell(){
  var s=$('game-shell'),sw=window.innerWidth,sh=window.innerHeight;
  var sx=sw/W,sy=sh/H,sc=Math.min(sx,sy,1);
  s.style.transform='scale('+sc+')'; s.style.transformOrigin='top center';
  s.style.marginTop=(sy<sx?'0':Math.max(0,(sh-H*sc)/2)+'px');
}
window.addEventListener('resize',fitShell); fitShell();
</script>
