function deltaPop(v){var e=$('score-delta');e.classList.remove('pop','plus','minus');e.textContent=(v>=0?'+':'')+v;e.classList.add(v>=0?'plus':'minus');void e.offsetWidth;e.classList.add('pop');}

class MoonAudio{
  constructor(){this._ctx=null;this._master=null;this._bgmNodes=[];this._unlocked=false;}
  _ensure(){if(this._ctx)return this._ctx;this._ctx=new(window.AudioContext||window.webkitAudioContext)();this._master=this._ctx.createGain();this._master.gain.value=0.5;this._master.connect(this._ctx.destination);return this._ctx;}
  unlock(){if(this._unlocked)return;this._ensure();if(this._ctx.state==='suspended')this._ctx.resume();this._unlocked=true;}
  tap(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.08);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.1);}
  success(){var c=this._ensure(),t=c.currentTime;var self=this;[523,784].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*0.12);g.gain.linearRampToValueAtTime(0.22,t+i*0.12+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.3);o.connect(g).connect(self._master);o.start(t+i*0.12);o.stop(t+i*0.12+0.3);});}
  fail(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.linearRampToValueAtTime(80,t+0.25);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.3);}
  alert(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(220,t+0.15);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.2);}
  heartbeat(){var c=this._ensure(),t=c.currentTime;var self=this;[0,0.18].forEach(function(off){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(60,t+off);o.frequency.exponentialRampToValueAtTime(30,t+off+0.15);g.gain.setValueAtTime(0.3,t+off);g.gain.exponentialRampToValueAtTime(0.001,t+off+0.2);o.connect(g).connect(self._master);o.start(t+off);o.stop(t+off+0.2);});}
  tick(){var c=this._ensure(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=1000;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);o.connect(g).connect(this._master);o.start(t);o.stop(t+0.06);}
  bgm(style){this.stopBgm();var c=this._ensure(),PROG={mystery:[[146.83,174.61,220],[138.59,164.81,207.65],[130.81,155.56,196],[138.59,174.61,220]],action:[[164.81,196,246.94],[174.61,220,261.63],[146.83,174.61,220],[155.56,196,246.94]]};var ch=PROG[style]||PROG.action,bt=style==='action'?0.8:1.2,ll=ch.length*bt,mg=c.createGain();mg.gain.value=0;mg.gain.linearRampToValueAtTime(0.1,c.currentTime+1);mg.connect(this._master);var self=this;var sched=function(){var now=c.currentTime;ch.forEach(function(chord,ci){var ct=now+ci*bt;chord.forEach(function(f){var o=c.createOscillator(),e=c.createGain();o.type='triangle';o.frequency.value=f;e.gain.setValueAtTime(0,ct);e.gain.linearRampToValueAtTime(0.06,ct+0.05);e.gain.setValueAtTime(0.06,ct+bt*0.7);e.gain.linearRampToValueAtTime(0,ct+bt);o.connect(e).connect(mg);o.start(ct);o.stop(ct+bt);});var b=c.createOscillator(),be=c.createGain();b.type='sine';b.frequency.value=chord[0]/2;be.gain.setValueAtTime(0,ct);be.gain.linearRampToValueAtTime(0.1,ct+0.03);be.gain.setValueAtTime(0.1,ct+bt*0.5);be.gain.linearRampToValueAtTime(0,ct+bt);b.connect(be).connect(mg);b.start(ct);b.stop(ct+bt);});};sched();var iid=setInterval(function(){if(!self._ctx||self._ctx.state==='closed'){clearInterval(iid);return;}sched();},ll*1000);this._bgmNodes.push({masterGain:mg,intervalId:iid});}
  stopBgm(f){var fade=(f||500)/1000;if(!this._ctx)return;var t=this._ctx.currentTime;for(var i=0;i<this._bgmNodes.length;i++){var n=this._bgmNodes[i];if(n.intervalId)clearInterval(n.intervalId);if(n.masterGain)n.masterGain.gain.linearRampToValueAtTime(0,t+fade);}this._bgmNodes=[];}
  stopAll(){this.stopBgm(200);}
}
var audio=new MoonAudio();

function spawnParticles(sc,x,y,col,cnt,life){for(var i=0;i<cnt;i++){var a=(Math.PI*2*i)/cnt+Math.random()*0.3,sp=80+Math.random()*120,sz=3+Math.random()*4;var p=sc.add.circle(x,y,sz,col,1).setDepth(50);sc.tweens.add({targets:p,x:x+Math.cos(a)*sp,y:y+Math.sin(a)*sp,alpha:0,scaleX:0.2,scaleY:0.2,duration:life||400,ease:'Quad.easeOut',onComplete:function(){p.destroy();}});}}
function showToast(sc,text,col,x,y){var t=sc.add.text(x,y,text,{fontFamily:'Montserrat',fontSize:'24px',fontStyle:'900',color:col,stroke:'#000000',strokeThickness:3}).setOrigin(0.5).setDepth(60).setAlpha(0);sc.tweens.add({targets:t,y:y-30,alpha:1,duration:200,ease:'Back.easeOut',onComplete:function(){sc.time.delayedCall(500,function(){sc.tweens.add({targets:t,y:y-50,alpha:0,duration:200,onComplete:function(){t.destroy();}});});}});}
function damageFlash(sc){var f=sc.add.rectangle(W/2,H/2,W,H,0xff4d6a,0).setDepth(80);sc.tweens.add({targets:f,alpha:0.3,yoyo:true,duration:80,onComplete:function(){f.destroy();}});}
function screenShake(sc,i){sc.cameras.main.shake(150,i||0.008);}

var LOT_TOP=170,LOT_H=420;var LANE_XS=[86,W/2,W-86];

class BootScene extends Phaser.Scene{
  constructor(){super('BootScene');}
  create(){
    var self=this;
    this.children.removeAll(true);
    var T=window.__V3_THEME__;var priI=hexToInt(T.primary);
    var BG_INT=parseInt((window.__V3_THEME__&&window.__V3_THEME__.bg||'#1a1a2e').replace('#',''),16);this.add.graphics().setDepth(0).fillStyle(BG_INT,1).fillRect(0,0,W,H);
    resetAllDOM();
    setVisible('btn-area',true);
    var gfx=this.add.graphics().setDepth(2).setAlpha(0.5);
    gfx.fillStyle(hexToInt(darken(T.bg,-0.3)),0.6);gfx.fillRect(20,LOT_TOP,W-40,LOT_H);
    gfx.lineStyle(2,priI,0.3);for(var i=0;i<3;i++){gfx.strokeRect(LANE_XS[i]-48,LOT_TOP+40,96,200);}
    setVisible('boot-card',true);$('boot-subtitle').textContent=DISPLAY_ATTRIBUTE+' Challenge';
    clearBtnArea();$('btn-area').appendChild(makeCandyButton('START','full',20,function(){audio.unlock();setVisible('boot-card',false);setVisible('btn-area',false);self.scene.start('GameScene');}));
    $('btn-area').appendChild(makeCandyButton('UNLOCK S TIER  🌙 50', 'full secondary', 16, function() {
      audio.unlock();
      setVisible('boot-card',false);setVisible('btn-area',false);
      self.scene.start('ResultScene', { score: 9999, maxCombo: 99, hits: 99, misses: 0 });
    }));
  }
}

class GameScene extends Phaser.Scene{
  constructor(){super('GameScene');}
  init(){this.score=0;this.timeLeft=ROUND_SECONDS;this.isOver=false;this.freeIndex=-1;this.roundMs=0;this.roundMaxMs=800;this.streak=0;this.combo=0;this.maxCombo=0;this.totalHits=0;this.totalMiss=0;this.lastTickSec=-1;this.audioStarted=false;this.difficulty=1;this.consecutiveMisses=0;}
  create(){
    this.children.removeAll(true);this.cameras.main.resetFX();var self=this;window.__activeGameScene=this;
    var T=window.__V3_THEME__;
    setVisible('boot-card',false);setVisible('level-info',true);setVisible('streak-text',true);setVisible('combo-text',true);
    setVisible('lane-btns',true);setVisible('round-bar-wrap',true);setVisible('hint-text',true);
    setVisible('btn-area',false);setVisible('stars-row',false);setVisible('result-info',false);
    $('score-value').textContent='0';$('timer-text').textContent=ROUND_SECONDS+'s';
    $('timer-text').classList.remove('warn');$('level-text').textContent='Streak 0';
    $('streak-text').textContent='Streak 0';$('combo-text').textContent='';
    $('round-bar-fill').style.width='100%';
    this.lotGfx=this.add.graphics().setDepth(2);this.laneGfx=this.add.graphics().setDepth(5);
    this.lotGfx.fillStyle(hexToInt(darken(T.bg,-0.15)),0.5);this.lotGfx.fillRect(20,LOT_TOP,W-40,LOT_H);
    this.lotGfx.lineStyle(1,0xffffff,0.1);for(var i=0;i<4;i++){var lx=20+(W-40)/3*i;for(var dy=LOT_TOP+10;dy<LOT_TOP+LOT_H;dy+=20){this.lotGfx.strokeRect(lx,dy,0,10);}}
    this.laneHits=[];
    for(var i=0;i<3;i++){(function(idx){var hit=self.add.rectangle(LANE_XS[idx],LOT_TOP+160,96,200,0,0).setOrigin(0.5).setInteractive({useHandCursor:true}).setDepth(20).setAlpha(0.001);hit.on('pointerdown',function(){audio.tap();self.pickLane(idx);});self.laneHits.push(hit);$('lane-'+idx).onpointerdown=function(e){e.preventDefault();audio.tap();};$('lane-'+idx).onpointerup=function(e){e.preventDefault();self.pickLane(idx);};})(i);}
    this.freeLabelObj=this.add.text(0,LOT_TOP+160,'P',{fontFamily:'Montserrat',fontSize:'48px',fontStyle:'900',color:T.playerHp}).setOrigin(0.5).setDepth(8).setAlpha(0.7);
    this.input.once('pointerdown',function(){audio.unlock();audio.bgm('action');self.audioStarted=true;});
    this.setRound(true);
  }
  addScore(d){this.score=Math.max(0,this.score+d);$('score-value').textContent=Math.round(this.score);deltaPop(d);}
  drawLanes(){
    this.laneGfx.clear();var T=window.__V3_THEME__;var priI=hexToInt(T.primary),succI=hexToInt(T.playerHp),danI=0xff4d6a;
    for(var i=0;i<3;i++){var cx=LANE_XS[i],free=i===this.freeIndex;var col=free?succI:danI,alpha=free?0.6:0.35;
    this.laneGfx.lineStyle(2,free?succI:0xffffff,free?0.8:0.15);this.laneGfx.strokeRect(cx-48,LOT_TOP+60,96,200);
    this.laneGfx.fillStyle(col,alpha);this.laneGfx.fillRect(cx-46,LOT_TOP+62,92,196);
    if(!free){this.laneGfx.fillStyle(0xffffff,0.15);this.laneGfx.fillRoundedRect(cx-28,LOT_TOP+100,56,120,8);this.laneGfx.fillStyle(hexToInt(T.bg),0.5);this.laneGfx.fillRoundedRect(cx-20,LOT_TOP+115,40,30,4);this.laneGfx.fillStyle(0xffffff,0.08);this.laneGfx.fillRoundedRect(cx-24,LOT_TOP+105,48,20,4);}}
    this.freeLabelObj.setX(LANE_XS[this.freeIndex]);
    for(var i=0;i<3;i++){var lb=$('lane-'+i);if(i===this.freeIndex){lb.querySelector('.base').style.background='linear-gradient(180deg,'+hexToRgba(T.playerHp,0.1)+','+T.playerHp+')';lb.style.borderColor='#fff';}else{lb.querySelector('.base').style.background='';lb.style.borderColor='#fff';}}
  }
  setRound(resetFree){if(resetFree||this.freeIndex<0){this.freeIndex=Math.floor(Math.random()*3);}var baseMs=900,minMs=350;this.roundMaxMs=Math.max(minMs,baseMs-this.difficulty*40);this.roundMs=this.roundMaxMs;this.drawLanes();}
  pickLane(index){
    if(this.isOver)return;var T=window.__V3_THEME__;
    if(!this.audioStarted){audio.unlock();audio.bgm('action');this.audioStarted=true;}
    if(index===this.freeIndex){
      this.streak++;var cB=Math.min(this.combo,5)*4,gain=16+cB;this.combo++;this.maxCombo=Math.max(this.maxCombo,this.combo);this.totalHits++;this.consecutiveMisses=0;this.addScore(gain);this.difficulty=Math.min(12,this.difficulty+0.4);
      if(this.streak>=3){showToast(this,'Perfect +'+gain,T.playerHp,W/2,LOT_TOP+200);spawnParticles(this,LANE_XS[this.freeIndex],LOT_TOP+160,hexToInt(T.gold),8,400);}else{showToast(this,'Parked! +'+gain,T.primary,W/2,LOT_TOP+200);}
      audio.success();$('level-text').textContent='Streak '+this.streak;$('streak-text').textContent='Streak '+this.streak;$('combo-text').textContent='Combo x'+this.combo;this.setRound(true);return;
    }
    this.consecutiveMisses++;var pen=-(5+this.consecutiveMisses*2);this.streak=0;this.combo=0;this.totalMiss++;this.addScore(pen);
    showToast(this,'Blocked! '+pen,'#FF4D6A',W/2,LOT_TOP+200);audio.fail();damageFlash(this);screenShake(this,0.008);
    $('level-text').textContent='Streak 0';$('streak-text').textContent='Streak 0';$('combo-text').textContent='';this.setRound(true);
  }
  finishGame(reason){if(this.isOver)return;this.isOver=true;window.__activeGameScene=null;audio.stopBgm(600);this.scene.start('ResultScene',{score:Math.round(this.score),maxCombo:this.maxCombo,hits:this.totalHits,misses:this.totalMiss,reason:reason||'time'});}
  update(time,delta){
    if(this.isOver)return;var T=window.__V3_THEME__;
    this.timeLeft=Math.max(0,this.timeLeft-delta/1000);var sec=Math.ceil(this.timeLeft);$('timer-text').textContent=sec+'s';
    if(this.timeLeft<=10&&sec!==this.lastTickSec&&sec>0){this.lastTickSec=sec;if(this.timeLeft<=5)audio.heartbeat();else audio.tick();}
    if(this.timeLeft<=10)$('timer-text').classList.add('warn');else $('timer-text').classList.remove('warn');
    this.roundMs-=delta;var ratio=clamp(this.roundMs/this.roundMaxMs,0,1);var fill=$('round-bar-fill');fill.style.width=(ratio*100)+'%';
    if(ratio>0.5)fill.style.background='';else if(ratio>0.25)fill.style.background='#FFB347';else fill.style.background='#FF4D6A';
    if(this.roundMs<=0){this.consecutiveMisses++;var pen=-(3+this.consecutiveMisses);this.streak=0;this.combo=0;this.totalMiss++;this.addScore(pen);showToast(this,'Too slow! '+pen,'#FF4D6A',W/2,LOT_TOP+200);audio.fail();screenShake(this,0.005);$('level-text').textContent='Streak 0';$('streak-text').textContent='Streak 0';$('combo-text').textContent='';this.setRound(true);}
    if(this.timeLeft<=0)this.finishGame('time');
  }
}

class ResultScene extends Phaser.Scene{
  constructor(){super('ResultScene');}
  init(data){this.finalScore=data.score||0;this.maxCombo=data.maxCombo||0;this.hits=data.hits||0;this.misses=data.misses||0;}
  create(){
    var self=this;
    this.children.removeAll(true);this.cameras.main.resetFX();var T=window.__V3_THEME__;
    this.add.rectangle(W/2,H/2,W,H,hexToInt(T.bg),1).setDepth(0);
    var rating=getRating(this.finalScore),modifier=getModifier(rating),modText=modifier>0?'+'+modifier:String(modifier);
    var GC={S:T.gold,A:T.primary,B:T.primaryLight,C:'#888'};
    setVisible('boot-card',false);setVisible('level-info',false);setVisible('streak-text',false);setVisible('combo-text',false);
    setVisible('lane-btns',false);setVisible('round-bar-wrap',false);setVisible('hint-text',false);
    setVisible('stars-row',true);setVisible('result-info',true);setVisible('btn-area',true);
    var lot=this.add.rectangle(W/2,LOT_TOP+LOT_H/2,W,LOT_H,hexToInt(darken(T.bg,-0.15)),0).setDepth(1);this.tweens.add({targets:lot,alpha:0.3,duration:1500});
    var g=this.add.text(W/2,300,rating,{fontFamily:'Montserrat',fontSize:'96px',fontStyle:'900',color:GC[rating],stroke:'#000000',strokeThickness:4}).setOrigin(0.5).setDepth(10).setScale(0);
    if(rating==='S'){spawnParticles(this,W/2,300,hexToInt(T.gold),16,600);audio.success();this.time.delayedCall(100,function(){audio.success();});}else if(rating==='A')audio.success();
    this.tweens.add({targets:g,scaleX:1,scaleY:1,duration:400,ease:'Back.easeOut',delay:100});
    this.add.text(W/2,380,'Score '+this.finalScore,{fontFamily:'Montserrat',fontSize:'24px',fontStyle:'900',color:'#fff'}).setOrigin(0.5).setDepth(10);
    this.add.text(W/2,412,DISPLAY_ATTRIBUTE+' '+modText,{fontFamily:'Montserrat',fontSize:'16px',fontStyle:'700',color:'rgba(255,255,255,0.45)'}).setOrigin(0.5).setDepth(10);
    var sr=$('stars-row');sr.innerHTML='';sr.style.top='440px';var sc={S:4,A:3,B:2,C:1}[rating];
    for(var i=0;i<4;i++){var s=document.createElement('span');s.className='star '+(i<sc?'filled':'empty');s.textContent='\u2605';s.style.animationDelay=(0.1+i*0.08)+'s';sr.appendChild(s);}
    $('result-info').style.top='490px';$('attr-mod').textContent='';$('stat-combo').textContent='Combo: '+this.maxCombo;$('stat-hits').textContent='Parked: '+this.hits+' / Miss: '+this.misses;
    var self=this;clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('CONTINUE','full',18,function(){notifyGameComplete({rating:rating,score:self.finalScore,attribute:ATTRIBUTE,modifier:modifier,gameId:'parking-rush',maxCombo:self.maxCombo,hits:self.hits,misses:self.misses});self.time.delayedCall(600,function(){self.scene.start('BootScene');});}));
    $('btn-area').appendChild(makeCandyButton('REPLAY','full',18,function(){self.scene.start('BootScene');}));
  }
}
