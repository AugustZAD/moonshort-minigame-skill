<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── V3 Animation tokens ── */
  :root {
    --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
    --ease-out: cubic-bezier(.25, 1, .5, 1);
    --ease-in: cubic-bezier(.5, 0, 1, .75);
    --duration-fast: 150ms;
    --duration-normal: 280ms;
    --duration-slow: 450ms;
  }
  @keyframes pop-in { from { opacity:0; transform:scale(.85) } to { opacity:1; transform:scale(1) } }
  @keyframes float-up { 0% { opacity:0; transform:translateY(0) } 30% { opacity:1 } 100% { opacity:0; transform:translateY(-40px) } }
  @keyframes glow-pulse { 0%,100% { box-shadow:0 0 12px 2px var(--primary-20) } 50% { box-shadow:0 0 28px 6px var(--primary-30) } }
  @keyframes deltaPop {
    0%   { opacity: 1; transform: translateY(0); }
    60%  { opacity: 1; transform: translateY(-6px); }
    100% { opacity: 0; transform: translateY(-14px); }
  }
  @keyframes waveScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* ── Cover layer for Episode scenes ── */
  #cover-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0.20; z-index: 0; display: none;
    pointer-events: none;
  }

  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Montserrat', sans-serif; }

  #game-shell {
    position: relative;
    width: 393px; height: 852px;
    margin: 0 auto; overflow: hidden;
    background: var(--bg);
  }

  #phaser-container {
    position: absolute; top: 0; left: 0;
    width: 393px; height: 852px;
    z-index: 1;
  }
  #phaser-container canvas { display: block; }

  /* ── Title bar ── */
  .title-bar {
    position: absolute; top: 0; left: 0; width: 100%; height: 76px;
    background: var(--primary);
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  .title-bar::after {
    content: ''; position: absolute; bottom: -12px; left: 0;
    width: 100%; height: 12px;
    background-image: radial-gradient(circle at 12px 0px, var(--primary) 12px, transparent 12px);
    background-size: 24px 12px; background-repeat: repeat-x;
  }
  .title-text {
    font-weight: 900; font-size: 18px; color: #fff;
    text-shadow:
      -1px -1px 0 var(--stroke-dark),  1px -1px 0 var(--stroke-dark),
      -1px  1px 0 var(--stroke-dark),  1px  1px 0 var(--stroke-dark),
       0   -1px 0 var(--stroke-dark),  0    1px 0 var(--stroke-dark),
      -1px  0   0 var(--stroke-dark),  1px  0   0 var(--stroke-dark);
  }

  /* Catch counter row */
  .catch-row {
    position: absolute; top: 96px; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 24px; z-index: 11;
  }
  .catch-label { font-weight: 800; font-size: 16px; color: #fff; }
  .timer-label { font-weight: 700; font-size: 14px; color: rgba(255,255,255,0.45); }
  .timer-label.warn { color: #FF4D6A; }

  /* Water surface */
  .water-surface {
    position: absolute; top: 140px; left: 0; width: 100%; height: 24px;
    background: linear-gradient(to bottom, transparent, var(--primary-20), var(--primary-30));
    z-index: 9; overflow: hidden;
  }
  .water-surface::after {
    content: '';
    position: absolute; top: 14px; left: 0; width: 200%; height: 10px;
    background: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(255,255,255,0.15) 20px, rgba(255,255,255,0.15) 40px);
    animation: waveScroll 3s linear infinite;
  }

  /* Status text */
  .status-text {
    position: absolute; top: 600px; left: 0; width: 100%;
    text-align: center; font-weight: 700; font-size: 15px;
    color: rgba(255,255,255,0.45); z-index: 11;
  }

  /* Combo text */
  .combo-text {
    position: absolute; top: 624px; left: 0; width: 100%;
    text-align: center; font-weight: 900; font-size: 18px;
    color: var(--primary-light); z-index: 11;
    transition: transform 0.12s ease;
  }

  /* Score area */
  .score-display {
    position: absolute; top: 650px; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center; z-index: 11;
  }
  .score-display .label { font-weight: 700; font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 2px; text-transform: uppercase; }
  .score-display .value-wrap { position: relative; display: inline-block; margin-top: 2px; }
  .score-display .value { font-weight: 900; font-size: 36px; color: #fff; line-height: 1; }
  .score-display .delta { position: absolute; top: -2px; right: -28px; font-weight: 900; font-size: 16px; opacity: 0; pointer-events: none; }
  .score-display .delta.pop { animation: deltaPop 0.8s var(--ease-out) forwards; }
  .score-display .delta.plus { color: var(--player-hp); }
  .score-display .delta.minus { color: #FF4D6A; }

  /* Reel button */
  .reel-btn {
    position: absolute; bottom: 30px; left: 24px; right: 24px; height: 72px;
    border-radius: 24px; border: 2px solid rgba(255,255,255,0.25);
    box-shadow: 0 4px 0 0 var(--black-25), inset 0 0 4px 4px var(--white-50);
    cursor: pointer; z-index: 12;
    -webkit-tap-highlight-color: transparent; user-select: none;
    overflow: hidden; transition: box-shadow 0.2s;
  }
  .reel-btn .base {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, var(--primary) 0%, color-mix(in srgb, var(--primary), #000 40%) 100%);
    border-radius: 22px;
  }
  .reel-btn .glass { position: absolute; inset: 0; background: rgba(255,255,255,0.25); border-radius: 22px; }
  .reel-btn .highlight { position: absolute; left: 0; right: 0; top: 2px; height: 22px; background: rgba(255,255,255,0.3); border-radius: 20px 20px 0 0; }
  .reel-btn .glow { position: absolute; inset: 0; box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.3); border-radius: 22px; pointer-events: none; }
  .reel-btn .reel-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 20px; color: #fff; z-index: 1;
    letter-spacing: 2px; text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  .reel-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 0 var(--black-15), inset 0 0 4px 4px var(--white-50);
  }
  .reel-btn.holding { box-shadow: 0 0 16px var(--primary-30), 0 4px 0 0 var(--black-15); }

  /* Stars row */
  .stars-row {
    position: absolute; top: 580px; left: 0; width: 100%;
    display: flex; justify-content: center; gap: 12px; z-index: 11;
  }
  .stars-row .star {
    font-size: 30px; opacity: 0;
    animation: pop-in 0.3s var(--ease-spring) forwards;
  }
  .stars-row .star.filled { color: var(--gold); }
  .stars-row .star.empty { color: #555; }

  /* Result info */
  .result-info {
    position: absolute; top: 626px; left: 0; width: 100%;
    text-align: center; z-index: 11;
  }
  .result-info .attr-mod { font-weight: 700; font-size: 16px; color: #aaa; margin-bottom: 12px; }
  .result-info .stats { display: flex; justify-content: center; gap: 40px; font-weight: 700; font-size: 14px; color: #fff; }

  /* Buttons */
  .btn-area {
    position: absolute; bottom: 20px; left: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 14px; z-index: 10;
  }
  .btn-candy {
    position: relative; height: 64px; border-radius: 24px;
    border: 2px solid rgba(255,255,255,0.25);
    box-shadow: 0 4px 0 0 var(--black-25);
    overflow: hidden; cursor: pointer; z-index: 10;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn-candy.full { width: 369px; }
  .btn-candy.third { width: 115px; height: 56px; }
  .btn-candy .base {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, var(--primary) 0%, color-mix(in srgb, var(--primary), #000 40%) 100%);
    border-radius: 22px;
  }
  .btn-candy .glass {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 50%);
    border-radius: 22px;
  }
  .btn-candy .highlight {
    position: absolute; left: 8px; right: 8px; top: 3px; height: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.05) 100%);
    border-radius: 20px 20px 12px 12px;
  }
  .btn-candy .glow {
    position: absolute; inset: 0;
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.3);
    border-radius: 22px; pointer-events: none;
  }
  .btn-candy .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; color: #fff; z-index: 1; gap: 8px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .btn-candy.third .label { font-size: 15px; }
  .btn-candy:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 0 var(--black-25);
  }
  .btn-candy.secondary .base {
    background: linear-gradient(180deg, #F5C842 0%, #B8860B 100%);
  }

  .hidden { display: none !important; }

  .narrative-overlay { position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:50;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 32px;cursor:pointer; }
  .narrative-overlay .narrator { font-weight:800;font-size:14px;color:var(--primary-light,#C4B5FD);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px; }
  .narrative-overlay .line { font-weight:700;font-size:16px;color:#fff;text-align:center;line-height:1.6;max-width:320px; }
  .narrative-overlay .tap-hint { position:absolute;bottom:60px;font-weight:700;font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px; }
</style>

class NarrativeScene extends Phaser.Scene {
  constructor() { super('NarrativeScene'); }
  preload() {
    if (CTX.coverImage) {
      this.load.image('ep_bg_narrative', CTX.coverImage);
    }
  }
  create() {
    var self = this;
    var lines = CTX.narrative || [];
    if (!lines.length) { this.scene.start('BootScene'); return; }
    var idx = 0;
    var shell = document.getElementById('game-shell');
    var bridgeSubtitle = (CTX.copy && CTX.copy.bootSubtitle) || '';
    var charName = (CTX.character && CTX.character.name) || '';
    var attrName = CTX.attribute || '';

    function showLine() {
      var old = document.getElementById('narrative-overlay');
      if (old) old.remove();

      // After all dialogue lines: show bridge card
      if (idx >= lines.length) {
        if (bridgeSubtitle) {
          idx = -1; // mark bridge shown
          var overlay = document.createElement('div');
          overlay.className = 'narrative-overlay';
          overlay.id = 'narrative-overlay';
          overlay.style.background = 'rgba(0,0,0,0.92)';
          overlay.innerHTML =
            '<div style="font-size:12px;letter-spacing:3px;color:rgba(255,255,255,0.5);margin-bottom:12px;">—— ' + (charName ? charName + '的' : '') + attrName + '考验 ——</div>' +
            '<div style="font-size:22px;font-weight:900;color:#fff;text-align:center;line-height:1.5;margin-bottom:20px;">' + bridgeSubtitle + '</div>' +
            '<div class="tap-hint">点击开始考验</div>';
          overlay.addEventListener('pointerup', function() {
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.5s';
            setTimeout(function() { overlay.remove(); self.scene.start('BootScene'); }, 500);
          });
          shell.appendChild(overlay);
          return;
        }
        self.scene.start('BootScene');
        return;
      }
      if (idx < 0) { self.scene.start('BootScene'); return; }

      var line = lines[idx];
      var overlay = document.createElement('div');
      overlay.className = 'narrative-overlay';
      overlay.id = 'narrative-overlay';
      var speakerHtml = line.speaker ? '<div class="narrator">' + line.speaker + '</div>' : '';
      overlay.innerHTML = speakerHtml +
        '<div class="line">' + line.text.replace(/\n/g, '<br>') + '</div>' +
        '<div class="tap-hint">点击继续</div>';
      overlay.addEventListener('pointerup', function() { idx++; showLine(); });
      shell.appendChild(overlay);
    }

    // Draw background image in Phaser canvas for narrative
    var T = window.__V3_THEME__;
    if (T) {
      this.add.rectangle(W/2, H/2, W, H, parseInt((T.bg||'#000000').replace('#',''),16), 1).setDepth(0);
    }
    if (this.textures.exists('ep_bg_narrative')) {
      var bg = this.add.image(W/2, H/2, 'ep_bg_narrative');
      var _t = bg.texture.getSourceImage();
      var _s = Math.max(W/_t.width, H/_t.height);
      bg.setScale(_s);
      bg.setAlpha(0.12);
      bg.setDepth(1);
    }

    showLine();
  }
}

    window.__activeGameScene = this;
    setVisible('boot-card', false);
    setVisible('catch-row', true); setVisible('water-surface', true);
    setVisible('status-text', true); setVisible('combo-text', true);
    setVisible('score-display', true); setVisible('reel-btn', true);
    setVisible('stars-row', false); setVisible('result-info', false);
    $('catch-label').textContent = '🐟 捕获: 0';
    $('timer-label').textContent = ROUND_SECONDS + 's'; $('timer-label').classList.remove('warn');
    $('status-text').textContent = '追踪节奏！'; $('status-text').style.color = '';
    $('combo-text').textContent = ''; $('score-value').textContent = '0';
    clearBtnArea();

    this.fishPreview = this.add.text(this.progBarX + 30, this.trackTop + 20, '🐟', { fontSize: '16px' }).setOrigin(0.5).setDepth(10);
    this.add.text(this.progBarX + 30, this.trackTop + this.trackHeight + 20, 'Speed', { fontFamily:'Montserrat', fontSize:'10px', fontStyle:'700', color:'rgba(255,255,255,0.45)' }).setOrigin(0.5).setDepth(10);
    this.diffBarGfx = this.add.graphics().setDepth(10);
    this.add.graphics().setDepth(9).fillStyle(0xffffff, 0.08).fillRoundedRect(this.progBarX + 10, this.trackTop + this.trackHeight + 30, 40, 6, 3);
    this.add.text(this.trackX - 30, this.trackTop, 'Shallow', { fontFamily:'Montserrat', fontSize:'9px', fontStyle:'700', color:T.primaryLight, angle:-90 }).setOrigin(0, 0.5).setDepth(10);
    this.add.text(this.trackX - 30, this.trackTop + this.trackHeight, 'Deep', { fontFamily:'Montserrat', fontSize:'9px', fontStyle:'700', color:T.primary, angle:-90 }).setOrigin(0, 0.5).setDepth(10);
    this.fishGfx = this.add.graphics().setDepth(8); this.hookGfx = this.add.graphics().setDepth(7); this.progGfx = this.add.graphics().setDepth(8);
    var reelBtn = $('reel-btn');
    reelBtn.addEventListener('pointerdown', function(e) { e.preventDefault(); self.holding = true; reelBtn.classList.add('holding'); audio.tap(); });
    var release = function() { self.holding = false; reelBtn.classList.remove('holding'); };
    reelBtn.addEventListener('pointerup', release); reelBtn.addEventListener('pointerleave', release); reelBtn.addEventListener('pointercancel', release);

  },
  addScore: function(d) { this.score = Math.max(0, this.score + d); $('score-value').textContent = Math.round(this.score); addScoreDOM(Math.round(d)); },
  onFishCaught: function() {
    var T = window.__V3_THEME__;
    this.fishCaught += 1; $('catch-label').textContent = '🐟 捕获: ' + this.fishCaught;
    var catchBonus = 50 + this.difficulty * 8 + Math.round(this.timeLeft * 1.5); this.addScore(catchBonus);
    showToast(this, '🐟 Caught! +' + catchBonus, T.playerHp, W/2, 350);
    spawnParticles(this, this.trackX + this.trackW/2, this.fishY, hexToInt(T.gold), 10, 500);
    audio.success(); this.difficulty = Math.min(12, this.difficulty + 1.5);
    this.catchProgress = 0; this.fishY = this.trackTop + this.trackHeight * (0.3 + Math.random() * 0.4);
    this.fishV = (120 + this.difficulty * 15) * (Math.random() > 0.5 ? 1 : -1); this.nearStreakMs = 0;
  },
  finishGame: function(reason) {
    if (this.isOver) return; this.isOver = true; window.__activeGameScene = null; audio.stopBgm(600);
    this.scene.start('ResultScene', { score:Math.round(this.score), maxCombo:this.maxCombo, hits:Math.round(this.totalHits), misses:Math.round(this.totalMiss), fishCaught:this.fishCaught, reason:reason||'time' });
  },
  update: function(time, delta) {
    if (this.isOver) return;
    var T = window.__V3_THEME__; var PRIMARY_INT = hexToInt(T.primary);
    this.timeLeft = Math.max(0, this.timeLeft - delta/1000); var sec = Math.ceil(this.timeLeft);
    $('timer-label').textContent = sec + 's';
    if (this.timeLeft <= 10 && sec !== this.lastTickSec && sec > 0) { this.lastTickSec = sec; if (this.timeLeft <= 5) audio.heartbeat(); else audio.tick(); }
    if (this.timeLeft <= 10) $('timer-label').classList.add('warn'); else $('timer-label').classList.remove('warn');
    var dt = delta / 1000; var tx = this.trackX, tw = this.trackW;
    var fishAccel = 360 + this.difficulty * 30; var fishMaxV = 210 + this.difficulty * 18;
    this.fishV += (Math.random() - 0.5) * fishAccel * dt;
    if (this.difficulty >= 4 && Math.random() < 0.008 * this.difficulty) this.fishV *= -1.2;
    this.fishV = clamp(this.fishV, -fishMaxV, fishMaxV);
    this.fishY += this.fishV * dt;
    if (this.fishY < this.trackTop + 16 || this.fishY > this.trackTop + this.trackHeight - 16) this.fishV *= -0.85;
    this.fishY = clamp(this.fishY, this.trackTop + 16, this.trackTop + this.trackHeight - 16);
    var hookUp = this.holding ? -620 : 500;
    this.hookV += hookUp * dt; this.hookV = clamp(this.hookV, -260, 300);
    this.hookY += this.hookV * dt; this.hookY = clamp(this.hookY, this.trackTop + 16, this.trackTop + this.trackHeight - 16);
    this.trackGfx.clear();
    var BG_INT = hexToInt(T.bg);
    this.trackGfx.fillGradientStyle(PRIMARY_INT, PRIMARY_INT, BG_INT, BG_INT, 0.4, 0.4, 0.7, 0.7);
    this.trackGfx.fillRoundedRect(tx, this.trackTop, tw, this.trackHeight, 12);
    this.trackGfx.lineStyle(2, PRIMARY_INT, 0.4); this.trackGfx.strokeRoundedRect(tx, this.trackTop, tw, this.trackHeight, 12);
    this.fishGfx.clear(); var fishZoneH = 24;
    this.fishGfx.fillStyle(PRIMARY_INT, 0.5); this.fishGfx.fillRoundedRect(tx + 4, this.fishY - fishZoneH/2, tw - 8, fishZoneH, 8);
    this.fishIcon.y = this.fishY;
    this.hookGfx.clear(); var hookH = 32;
    this.hookGfx.fillStyle(0xffffff, 0.85); this.hookGfx.fillRoundedRect(tx + 6, this.hookY - hookH/2, tw - 12, hookH, 8);
    this.hookGfx.lineStyle(2, PRIMARY_INT, 0.6); this.hookGfx.strokeRoundedRect(tx + 6, this.hookY - hookH/2, tw - 12, hookH, 8);
    var near = Math.abs(this.fishY - this.hookY) < 28;
    if (near) {
      var gainRate = Math.max(0.5, 0.85 - this.difficulty * 0.025);
      this.catchProgress = clamp(this.catchProgress + dt * gainRate, 0, 1);
      this.addScore(dt * (6 + this.difficulty)); this.totalHits += dt * 0.4; this.nearStreakMs += delta;
      if (this.nearStreakMs > 2000 && !this.comboAwarded) { this.combo += 1; this.maxCombo = Math.max(this.maxCombo, this.combo); $('combo-text').textContent = 'Streak x' + this.combo; this.comboAwarded = true; }
      $('status-text').textContent = 'Hook on fish!'; $('status-text').style.color = T.playerHp;
      this.hookGfx.fillStyle(hexToInt(T.playerHp), 0.3); this.hookGfx.fillRoundedRect(tx + 6, this.hookY - hookH/2, tw - 12, hookH, 8);
    } else {
      var drainRate = 0.42 + this.difficulty * 0.03;
      this.catchProgress = clamp(this.catchProgress - dt * drainRate, 0, 1);
      this.totalMiss += dt * 0.2; this.nearStreakMs = 0; this.comboAwarded = false;
      $('status-text').textContent = '追踪节奏！'; $('status-text').style.color = 'rgba(255,255,255,0.45)';
      if (this.catchProgress <= 0.05 && this.wasNear) { damageFlash(this); audio.fail(); this.combo = 0; $('combo-text').textContent = ''; }
    }
    this.wasNear = near;
    this.progGfx.clear();
    this.progGfx.fillStyle(0xffffff, 0.08); this.progGfx.fillRoundedRect(this.progBarX, this.trackTop, this.progBarW, this.progBarH, 8);
    var fillH = this.progBarH * this.catchProgress;
    if (fillH > 2) { var progCol = this.catchProgress > 0.7 ? hexToInt(T.playerHp) : this.catchProgress > 0.3 ? hexToInt(T.gold) : PRIMARY_INT; this.progGfx.fillStyle(progCol, 0.9); this.progGfx.fillRoundedRect(this.progBarX + 2, this.trackTop + this.progBarH - fillH, this.progBarW - 4, fillH, 6); }
    this.diffBarGfx.clear(); var diffR = clamp(this.difficulty/12, 0, 1);
    var diffC = diffR > 0.7 ? 0xFF4D6A : diffR > 0.4 ? hexToInt(T.gold) : hexToInt(T.playerHp);
    this.diffBarGfx.fillStyle(diffC, 1); this.diffBarGfx.fillRoundedRect(this.progBarX + 10, this.trackTop + this.trackHeight + 30, 40 * diffR, 6, 3);
    if (this.catchProgress >= 1) this.onFishCaught();
    if (this.timeLeft <= 0) this.finishGame('time');
  }
});

var ResultScene = new Phaser.Class({
  Extends: Phaser.Scene,
  initialize: function() { Phaser.Scene.call(this, 'ResultScene'); },
  init: function(data) { this.finalScore = data.score||0; this.maxCombo = data.maxCombo||0; this.hits = data.hits||0; this.misses = data.misses||0; this.fishCaught = data.fishCaught||0; },
  create: function() {
    this.children.removeAll(true);
    this.cameras.main.resetFX();
    var self = this; var T = window.__V3_THEME__;
    var rating = getRating(this.finalScore); var modifier = getModifier(rating);
    var modText = modifier > 0 ? '+'+modifier : String(modifier);
    var GC = { S: T.gold, A: T.primary, B: T.primaryLight, C: '#7A7A8E' };
    setVisible('boot-card', false);
    setVisible('catch-row', false); setVisible('water-surface', false);
    setVisible('status-text', false); setVisible('combo-text', false);
    setVisible('score-display', true); setVisible('reel-btn', false);
    setVisible('stars-row', true); setVisible('result-info', true);
    ['grade-letter','grade-score','attr-mod','stat-combo','stat-hits'].forEach(function(id){setVisible(id,true);});
    $('score-value').textContent = this.finalScore;
    this.add.graphics().setDepth(0).fillStyle(hexToInt(T.bg), 1).fillRect(0, 0, W, H);
    var gt = this.add.text(W/2, 360, rating, { fontFamily:'Montserrat', fontSize:'96px', fontStyle:'900', color:GC[rating], stroke:'#000', strokeThickness:4 }).setOrigin(0.5).setDepth(10).setScale(0);
    this.tweens.add({ targets:gt, scaleX:1, scaleY:1, duration:400, ease:'Back.easeOut', delay:100 });
    this.add.text(W/2, 440, '完美！', { fontFamily:'Montserrat', fontSize:'18px', fontStyle:'700', color:'rgba(255,255,255,0.45)' }).setOrigin(0.5).setDepth(10);
    this.add.text(W/2, 470, '🐟 Fish: ' + this.fishCaught, { fontFamily:'Montserrat', fontSize:'16px', fontStyle:'900', color:'#fff' }).setOrigin(0.5).setDepth(10);
    if (rating === 'S') { spawnParticles(this, W/2, 360, hexToInt(T.gold), 16, 600); audio.success(); setTimeout(function(){audio.success();}, 100); }
    else if (rating === 'A') { audio.success(); }
    var sr = $('stars-row'); sr.innerHTML = ''; var sc = {S:4,A:3,B:2,C:1}[rating];
    for (var i = 0; i < 4; i++) { var s = document.createElement('span'); s.className = 'star '+(i<sc?'filled':'empty'); s.textContent = '\u2605'; s.style.animationDelay = (0.2+i*0.08)+'s'; sr.appendChild(s); }
    $('attr-mod').textContent = DISPLAY_ATTRIBUTE+' '+modText;
    $('stat-combo').textContent = 'Streak: '+this.maxCombo;
    $('stat-hits').textContent = 'Fish: '+this.fishCaught;
    clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('继续', 'full', 18, function() {
      notifyGameComplete({ rating:rating, score:self.finalScore, attribute:ATTRIBUTE, modifier:modifier, gameId:'stardew-fishing', maxCombo:self.maxCombo, hits:self.hits, misses:self.misses, fishCaught:self.fishCaught });
      self.time.delayedCall(600, function() { self.scene.start('BootScene'); });
    }));
    $('btn-area').appendChild(makeCandyButton('再来一次', 'full', 18, function() { self.scene.start('BootScene'); }));
  }
});

initShellDOM();

  resolveTheme('dark').then(function(theme) {
    applyTheme(theme);
    if (CTX.coverImage) { var coverEl = document.getElementById('cover-layer'); if (coverEl) { coverEl.src = CTX.coverImage; coverEl.style.display = 'block'; } }

function fitShell() { var s=$('game-shell'),sw=window.innerWidth,sh=window.innerHeight,sx=sw/W,sy=sh/H,sc=Math.min(sx,sy,1); s.style.transform='scale('+sc+')'; s.style.transformOrigin='top center'; if(sy<sx) s.style.marginTop='0px'; else s.style.marginTop=Math.max(0,(sh-H*sc)/2)+'px'; }

(function() {
  var gs = GameScene.prototype || GameScene;
  var origPre = gs.preload;
  gs.preload = function() { if (origPre) origPre.call(this);
    this.load.image('ep_sprite_catch', 'sprite-catch.png');
    this.load.image('ep_sprite_hook', 'sprite-hook.png');
  };

(function() {
  var gs = GameScene.prototype || GameScene;
  var origCreate = gs.create;

//  BOOT SCENE BG PATCH: preload coverImage + draw in canvas
// ══════════════════════════════════════════════════════════════════════════════
(function() {
  var proto = BootScene.prototype || BootScene;
  // Add preload to load coverImage as Phaser texture
  var origPreload = proto.preload;
  proto.preload = function() {
    if (origPreload) origPreload.call(this);
    if (CTX.coverImage) {
      this.load.image('ep_bg_boot', CTX.coverImage);
      this.load.image('ep_bg_game', CTX.coverImage);
    }
  };
  // Wrap create to draw bg image after the solid fillRect
  var origBootCreate = proto.create;
  proto.create = function() {
    origBootCreate.call(this);
    // Draw bg image on top of the solid bg, with visible opacity
    if (this.textures.exists('ep_bg_boot')) {
      var bg = this.add.image(W/2, H/2, 'ep_bg_boot');
      var _t = bg.texture.getSourceImage();
      var _s = Math.max(W/_t.width, H/_t.height);
      bg.setScale(_s);
      bg.setAlpha(0.15);
      bg.setDepth(0);
    }
  };
})();

// ══════════════════════════════════════════════════════════════════════════════
//  COMPONENT C: ResultScene narrative overlay (monkey-patch)
// ══════════════════════════════════════════════════════════════════════════════
(function() {
  var proto = ResultScene.prototype || ResultScene;
  var origCreate = proto.create;
  proto.create = function() {
    var self = this;
    var rating = getRating(this.finalScore || 0);
    if (CTX.resultTexts && CTX.resultTexts[rating]) {
      // Hide all UI first
      ['dialogue','score-display','timer-text','combo-text','hint-text',
       'stars-row','result-info','gauge-area','boot-card','hud-row',
       'sort-legend','btn-area'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      var shell = document.getElementById('game-shell');
      var ov = document.createElement('div');
      ov.className = 'narrative-overlay';
      ov.id = 'narrative-overlay';
      ov.innerHTML =
        '<div class="narrator">' + rating + ' 级评价</div>' +
        '<div class="line">' + CTX.resultTexts[rating].replace(/\n/g, '<br>') + '</div>' +
        '<div class="tap-hint">点击继续</div>';
      ov.addEventListener('pointerup', function() {
        ov.style.opacity = '0';
        ov.style.transition = 'opacity 0.4s';
        setTimeout(function() {
          ov.remove();
          // Restore display defaults
          ['dialogue','score-display','timer-text','combo-text','hint-text',
           'stars-row','result-info','gauge-area','boot-card','hud-row',
           'sort-legend','btn-area'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.style.display = '';
          });
          origCreate.call(self);
        }, 400);
      });
      shell.appendChild(ov);
      return;
    }
    origCreate.call(self);
  };
})();
