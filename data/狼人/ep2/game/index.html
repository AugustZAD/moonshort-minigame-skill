<html lang="en">
<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── V3 Animation tokens ── */
  :root {
    --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
    --ease-out: cubic-bezier(.25, 1, .5, 1);
    --ease-in: cubic-bezier(.5, 0, 1, .75);
    --duration-fast: 150ms;
    --duration-normal: 280ms;
    --duration-slow: 450ms;
  }
  @keyframes pop-in { from { opacity:0; transform:scale(.85) } to { opacity:1; transform:scale(1) } }
  @keyframes float-up { 0% { opacity:0; transform:translateY(0) } 30% { opacity:1 } 100% { opacity:0; transform:translateY(-40px) } }
  @keyframes glow-pulse { 0%,100% { box-shadow:0 0 12px 2px var(--primary-20) } 50% { box-shadow:0 0 28px 6px var(--primary-30) } }
  @keyframes deltaPop {
    0%   { opacity: 1; transform: translateY(0); }
    60%  { opacity: 1; transform: translateY(-6px); }
    100% { opacity: 0; transform: translateY(-14px); }
  }

  /* ── Cover layer for Episode scenes ── */
  #cover-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0.20; z-index: 0; display: none;
    pointer-events: none;
  }

  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Montserrat', sans-serif; }

  #game-shell {
    position: relative;
    width: 393px; height: 852px;
    margin: 0 auto; overflow: hidden;
    background: var(--bg);
  }

  #phaser-container {
    position: absolute; top: 0; left: 0;
    width: 393px; height: 852px;
    z-index: 1;
  }
  #phaser-container canvas { display: block; }

  /* ── Title bar ── */
  .title-bar {
    position: absolute; top: 0; left: 0; width: 100%; height: 76px;
    background: var(--primary);
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }
  .title-bar::after {
    content: ''; position: absolute; bottom: -12px; left: 0;
    width: 100%; height: 12px;
    background-image: radial-gradient(circle at 12px 0px, var(--primary) 12px, transparent 12px);
    background-size: 24px 12px; background-repeat: repeat-x;
  }
  .title-text {
    font-weight: 900; font-size: 18px; color: #fff;
    text-shadow:
      -1px -1px 0 var(--stroke-dark),  1px -1px 0 var(--stroke-dark),
      -1px  1px 0 var(--stroke-dark),  1px  1px 0 var(--stroke-dark),
       0   -1px 0 var(--stroke-dark),  0    1px 0 var(--stroke-dark),
      -1px  0   0 var(--stroke-dark),  1px  0   0 var(--stroke-dark);
  }

  /* ── Info strip ── */
  .info-strip {
    position: absolute; top: 96px; left: 0; width: 100%; height: 24px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; z-index: 10;
  }
  .info-strip .score-label { font-weight: 700; font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 1px; text-transform: uppercase; }
  .info-strip .score-val { font-weight: 900; font-size: 14px; color: #fff; margin-left: 4px; }
  .info-strip .timer-val { font-weight: 900; font-size: 14px; color: #fff; }
  .info-strip .timer-val.warn { color: #FF4D6A; }
  .info-strip .left, .info-strip .right { display: flex; align-items: center; }
  .score-delta { font-weight: 900; font-size: 12px; opacity: 0; pointer-events: none; margin-left: 4px; }
  .score-delta.pop { animation: deltaPop 0.8s var(--ease-out) forwards; }
  .score-delta.plus { color: var(--player-hp); }
  .score-delta.minus { color: #FF4D6A; }

  /* ── Traffic light ── */
  .traffic-light {
    position: absolute; top: 128px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 180px; background: #2A2A2A; border-radius: 16px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-evenly; padding: 12px 0; z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .traffic-light .light {
    width: 44px; height: 44px; border-radius: 50%;
    background: #444; transition: all 0.3s ease;
  }
  .traffic-light .light.red.active { background: #FF4D6A; box-shadow: 0 0 20px 6px rgba(255,77,106,0.5); }
  .traffic-light .light.yellow.active { background: #FFB347; box-shadow: 0 0 20px 6px rgba(255,179,71,0.5); }
  .traffic-light .light.green.active { background: #4FECA2; box-shadow: 0 0 20px 6px rgba(79,236,162,0.5); }

  .light-label {
    position: absolute; top: 316px; left: 50%; transform: translateX(-50%);
    font-weight: 900; font-size: 28px; z-index: 10;
    transition: color 0.3s ease;
  }

  /* ── Progress track ── */
  .progress-track { position: absolute; top: 360px; left: 16px; right: 16px; height: 40px; z-index: 10; }
  .track-bg { position: absolute; top: 16px; left: 0; right: 0; height: 8px; background: var(--white-20); border-radius: 4px; }
  .track-fill {
    position: absolute; top: 16px; left: 0; height: 8px;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 4px; transition: width 0.1s linear;
  }
  .track-runner { position: absolute; top: 4px; font-size: 24px; transition: left 0.1s linear; }
  .track-finish { position: absolute; top: 4px; right: 0; font-size: 24px; }
  .track-dist { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); font-weight: 700; font-size: 12px; color: rgba(255,255,255,0.45); }

  /* ── Sprint Speed ── */
  .stamina-area { position: absolute; top: 406px; left: 24px; right: 24px; height: 20px; z-index: 10; }
  .stamina-label { font-weight: 700; font-size: 11px; color: rgba(255,255,255,0.60); letter-spacing: 1px; text-transform: uppercase; }
  .stamina-track { position: absolute; top: 0; left: 70px; right: 0; height: 10px; background: var(--white-20); border-radius: 5px; overflow: hidden; }
  .stamina-fill {
    height: 100%; border-radius: 5px; background: #4FECA2;
    transition: width 0.15s linear, background 0.3s ease;
    box-shadow: 0 0 8px rgba(79, 236, 162, 0.3);
  }
  .speed-text {
    position: absolute; top: -2px; right: 0; font-weight: 900; font-size: 13px;
    color: #4FECA2; letter-spacing: 0.5px;
    transition: color 0.3s ease;
    text-shadow: 0 0 8px rgba(79, 236, 162, 0.4);
  }

  .combo-text {
    position: absolute; top: 434px; left: 50%; transform: translateX(-50%);
    font-weight: 900; font-size: 16px; color: var(--primary);
    z-index: 10; text-shadow: 0 0 6px var(--primary-30);
  }

  /* ── Switch bar ── */
  .switch-bar-area { position: absolute; top: 460px; left: 40px; right: 40px; height: 12px; z-index: 10; }
  .switch-bar-track { width: 100%; height: 8px; background: var(--white-20); border-radius: 4px; overflow: hidden; }
  .switch-bar-fill { height: 100%; border-radius: 4px; transition: width 0.05s linear; }

  /* ── Grade overlay ── */
  .grade-overlay {
    position: absolute; top: 260px; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center; z-index: 11;
  }
  .grade-letter { font-weight: 900; font-size: 96px; line-height: 1; }
  .grade-letter.pop-in { animation: pop-in 0.4s var(--ease-spring) forwards; }
  .grade-score { font-weight: 700; font-size: 16px; color: #aaa; margin-top: 4px; }

  .stars-row {
    position: absolute; top: 420px; left: 0; width: 100%;
    display: flex; justify-content: center; gap: 12px; z-index: 11;
  }
  .stars-row .star {
    font-size: 30px; opacity: 0;
    animation: pop-in 0.3s var(--ease-spring) forwards;
  }
  .stars-row .star.filled { color: var(--gold); }
  .stars-row .star.empty { color: #555; }

  .result-info {
    position: absolute; top: 470px; left: 0; width: 100%;
    text-align: center; z-index: 11;
  }
  .result-info .attr-mod { font-weight: 700; font-size: 16px; color: #aaa; margin-bottom: 12px; }
  .result-info .stats { display: flex; justify-content: center; gap: 40px; font-weight: 700; font-size: 14px; color: #fff; }

  /* ── Rules overlay card ── */
  .rules-card {
    position: absolute; top: 260px; left: 50%; transform: translateX(-50%);
    width: 310px; padding: 24px 20px;
    background: rgba(255,255,255,0.95); border-radius: 20px;
    z-index: 15; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .rules-card h2 { font-weight: 900; font-size: 20px; color: var(--primary); margin-bottom: 10px; }
  .rules-card p { font-weight: 700; font-size: 14px; color: #333; line-height: 1.8; }

  /* ── Buttons - candy material (V3) ── */
  .btn-area {
    position: absolute; bottom: 20px; left: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 14px; z-index: 10;
  }
  .btn-candy {
    position: relative; height: 64px; border-radius: 24px;
    border: 2px solid rgba(255,255,255,0.25);
    box-shadow: 0 4px 0 0 var(--black-25);
    overflow: hidden; cursor: pointer; z-index: 10;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn-candy.full { width: 369px; }
  .btn-candy.third { width: 115px; height: 56px; }
  .btn-candy .base {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, var(--primary) 0%, color-mix(in srgb, var(--primary), #000 40%) 100%);
    border-radius: 22px;
  }
  .btn-candy .glass {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 50%);
    border-radius: 22px;
  }
  .btn-candy .highlight {
    position: absolute; left: 8px; right: 8px; top: 3px; height: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.05) 100%);
    border-radius: 20px 20px 12px 12px;
  }
  .btn-candy .glow {
    position: absolute; inset: 0;
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.3);
    border-radius: 22px; pointer-events: none;
  }
  .btn-candy .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; color: #fff; z-index: 1; gap: 8px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .btn-candy.third .label { font-size: 15px; }
  .btn-candy:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 0 var(--black-25);
  }
  .btn-candy.secondary .base {
    background: linear-gradient(180deg, #F5C842 0%, #B8860B 100%);
  }
  .btn-candy.holding .base { background: linear-gradient(180deg, rgba(79,236,162,0.3), #4FECA2); }
  .btn-candy.holding { border-color: #3BC98A; }

  .hidden { display: none !important; }

  .narrative-overlay { position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:50;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 32px;cursor:pointer; }
  .narrative-overlay .narrator { font-weight:800;font-size:14px;color:var(--primary-light,#C4B5FD);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px; }
  .narrative-overlay .line { font-weight:700;font-size:16px;color:#fff;text-align:center;line-height:1.6;max-width:320px; }
  .narrative-overlay .tap-hint { position:absolute;bottom:60px;font-weight:700;font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px; }
</style>

class NarrativeScene extends Phaser.Scene {
  constructor() { super('NarrativeScene'); }
  preload() {
    if (CTX.coverImage) {
      this.load.image('ep_bg_narrative', CTX.coverImage);
    }
  }
  create() {
    var self = this;
    var lines = CTX.narrative || [];
    if (!lines.length) { this.scene.start('BootScene'); return; }
    var idx = 0;
    var shell = document.getElementById('game-shell');
    var bridgeSubtitle = (CTX.copy && CTX.copy.bootSubtitle) || '';
    var charName = (CTX.character && CTX.character.name) || '';
    var attrName = CTX.attribute || '';

    function showLine() {
      var old = document.getElementById('narrative-overlay');
      if (old) old.remove();

      // After all dialogue lines: show bridge card
      if (idx >= lines.length) {
        if (bridgeSubtitle) {
          idx = -1; // mark bridge shown
          var overlay = document.createElement('div');
          overlay.className = 'narrative-overlay';
          overlay.id = 'narrative-overlay';
          overlay.style.background = 'rgba(0,0,0,0.92)';
          overlay.innerHTML =
            '<div style="font-size:12px;letter-spacing:3px;color:rgba(255,255,255,0.5);margin-bottom:12px;">—— ' + (charName ? charName + '的' : '') + attrName + '考验 ——</div>' +
            '<div style="font-size:22px;font-weight:900;color:#fff;text-align:center;line-height:1.5;margin-bottom:20px;">' + bridgeSubtitle + '</div>' +
            '<div class="tap-hint">点击开始考验</div>';
          overlay.addEventListener('pointerup', function() {
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.5s';
            setTimeout(function() { overlay.remove(); self.scene.start('BootScene'); }, 500);
          });
          shell.appendChild(overlay);
          return;
        }
        self.scene.start('BootScene');
        return;
      }
      if (idx < 0) { self.scene.start('BootScene'); return; }

      var line = lines[idx];
      var overlay = document.createElement('div');
      overlay.className = 'narrative-overlay';
      overlay.id = 'narrative-overlay';
      var speakerHtml = line.speaker ? '<div class="narrator">' + line.speaker + '</div>' : '';
      overlay.innerHTML = speakerHtml +
        '<div class="line">' + line.text.replace(/\n/g, '<br>') + '</div>' +
        '<div class="tap-hint">点击继续</div>';
      overlay.addEventListener('pointerup', function() { idx++; showLine(); });
      shell.appendChild(overlay);
    }

    // Draw background image in Phaser canvas for narrative
    var T = window.__V3_THEME__;
    if (T) {
      this.add.rectangle(W/2, H/2, W, H, parseInt((T.bg||'#000000').replace('#',''),16), 1).setDepth(0);
    }
    if (this.textures.exists('ep_bg_narrative')) {
      var bg = this.add.image(W/2, H/2, 'ep_bg_narrative');
      var _t = bg.texture.getSourceImage();
      var _s = Math.max(W/_t.width, H/_t.height);
      bg.setScale(_s);
      bg.setAlpha(0.12);
      bg.setDepth(1);
    }

    showLine();
  }
}

    setVisible('grade-overlay', false); setVisible('stars-row', false); setVisible('result-info', false);
    $('score-value').textContent = '0m'; $('timer-value').textContent = ROUND_SECONDS + 's'; $('timer-value').classList.remove('warn'); $('combo-text').textContent = '';
    setTrafficLight('green'); updateProgress(0, 100); updateSpeedBar(1.0);
    this.switchTimer = this.greenDurationBase + Math.random() * 1000; this.switchTimerMax = this.switchTimer;
    clearBtnArea();
    var runBtn = document.createElement('div'); runBtn.className = 'btn-candy full';
    runBtn.innerHTML = '<div class="base"></div><div class="glass"></div><div class="highlight"></div><div class="glow"></div><div class="label" style="font-size:20px">&#127939; HOLD TO 前进</div>';
    this._runBtn = runBtn;
    runBtn.addEventListener('pointerdown', function(e) { e.preventDefault(); audio.tap(); if (self.isOver) return; if (!self.audioStarted) { audio.unlock(); audio.bgm('action'); self.audioStarted = true; } self._holding = true; self.running = true; runBtn.classList.add('holding'); });
    runBtn.addEventListener('pointerup', function(e) { e.preventDefault(); if (self.running && self.light === 'green' && self.switchTimer <= 400 && !self.fakeOutActive) { self.applyDistance(3); showToast(self, 'Quick! +3m', '#4FECA2', W / 2, 480); audio.tick(); } self._holding = false; self.running = false; runBtn.classList.remove('holding'); });
    runBtn.addEventListener('pointerout', function() { self._holding = false; self.running = false; runBtn.classList.remove('holding'); });
    runBtn.addEventListener('pointercancel', function() { self._holding = false; self.running = false; runBtn.classList.remove('holding'); });

  }
  toggleLight() {
    var T = window.__V3_THEME__;
    var ds = Math.min(this.difficulty, 10);
    if (this.light === 'green') {
      this.light = 'red'; setTrafficLight('red');
      var rt = 600 + Math.random() * Math.max(300, 1400 - ds * 80);
      this.switchTimer = rt; this.switchTimerMax = rt; audio.alert();
    } else {
      this.light = 'green'; this.penaltyStack = 0; setTrafficLight('green');
      if (this.difficulty >= 6 && Math.random() < 0.20) {
        var trapGt = 400 + Math.random() * 200;
        this.switchTimer = trapGt; this.switchTimerMax = trapGt;
      } else {
        var gt = 800 + Math.random() * Math.max(400, 2200 - ds * 100);
        this.switchTimer = gt; this.switchTimerMax = gt;
      }
      audio.swoosh();
    }
  }
  applyDistance(d) { this.distance = Math.max(0, Math.min(100, this.distance + d)); $('score-value').textContent = Math.floor(this.distance) + 'm'; var r = Math.round(d); if (r !== 0) deltaPop(r); }
  finishGame(reason) { if (this.isOver) return; this.isOver = true; audio.stopBgm(600); this.scene.start('ResultScene', { score: Math.floor(this.distance), maxCombo: this.maxCombo, hits: Math.round(this.totalHits), misses: this.totalMiss, distance: Math.floor(this.distance), reason: reason || 'time' }); }
  update(time, delta) {
    if (this.isOver) return; var dt = delta / 1000;
    var T = window.__V3_THEME__;
    this.timeLeft = Math.max(0, this.timeLeft - dt); var sec = Math.ceil(this.timeLeft);
    $('timer-value').textContent = sec + 's'; if (this.timeLeft <= 10) $('timer-value').classList.add('warn'); else $('timer-value').classList.remove('warn');
    if (this.timeLeft <= 10 && sec !== this.lastTickSec && sec > 0) { this.lastTickSec = sec; if (this.timeLeft <= 5) audio.heartbeat(); else audio.tick(); }
    this.switchTimer -= delta; var sr = clamp(this.switchTimer / this.switchTimerMax, 0, 1);
    var bc; if (sr > 0.5) bc = this.light === 'green' ? '#4FECA2' : '#FF4D6A'; else if (sr > 0.25) bc = '#FFB347'; else bc = this.light === 'green' ? '#FFB347' : '#4FECA2';
    $('switch-bar-fill').style.width = (sr * 100) + '%'; $('switch-bar-fill').style.background = bc;
    if (this.switchTimer <= 0) { this.toggleLight(); this.difficulty = Math.min(12, this.difficulty + 0.3); }
    if (this.light === 'green' && !this.fakeOutActive && this.fakeOutCooldown <= 0) {
      var fakeChance = Math.min(0.40, 0.15 + this.difficulty * 0.025) * dt;
      if (Math.random() < fakeChance) { this.fakeOutActive = true; this.fakeOutTimer = 300; setTrafficLight('yellow'); $('light-label').textContent = '\u26A0\uFE0F'; audio.alert(); }
    }
    if (this.fakeOutActive) {
      this.fakeOutTimer -= delta;
      if (this.fakeOutTimer <= 0) { this.fakeOutActive = false; this.fakeOutCooldown = 3000; setTrafficLight('green'); $('light-label').textContent = '站起来！'; $('light-label').style.color = '#4FECA2'; }
    }
    if (this.fakeOutCooldown > 0) this.fakeOutCooldown -= delta;
    if (!this.running) { this.speed = Math.max(1.0, this.speed - 1.5 * dt); }
    if (this.light === 'green' && this.running) {
      this.speed = Math.min(2.0, this.speed + 0.35 * dt);
      var moveSpeed = 5 * this.speed;
      this.distance = Math.min(100, this.distance + moveSpeed * dt); this.comboRunTime += dt; this.totalHits += dt * 0.5;
      $('score-value').textContent = Math.floor(this.distance) + 'm';
      if (this.comboRunTime - this.lastComboMilestone >= 1.5) { this.lastComboMilestone = this.comboRunTime; this.combo += 1; this.maxCombo = Math.max(this.maxCombo, this.combo); $('combo-text').textContent = '连击 x' + this.combo; if (this.combo % 6 === 0) { audio.success(); spawnParticles(this, W / 2, 500, hexToInt(T.gold), 8, 400); this.applyDistance(10); showToast(this, '连击 x' + this.combo + '! +10m', T.gold, W / 2, 480); } else if (this.combo % 3 === 0) { audio.success(); spawnParticles(this, W / 2, 500, hexToInt(T.gold), 6, 350); this.applyDistance(5); showToast(this, '连击 x' + this.combo + '! +5m', T.primary, W / 2, 480); } }
    } else if (this.light === 'red' && this.running && !this.fakeOutActive) {
      this.penaltyStack += 1; var distPen = this.penaltyStack === 1 ? 5 : (this.penaltyStack === 2 ? 8 : 12); this.totalMiss += 1; this.combo = 0; this.comboRunTime = 0; this.lastComboMilestone = 0; $('combo-text').textContent = '';
      this.speed = 1.0;
      this.applyDistance(-distPen); showToast(this, 'RED! -' + distPen + 'm', '#FF4D6A', W / 2, 480); audio.fail(); damageFlash(this); screenShake(this, 0.012);
      this.running = false; this._holding = false; if (this._runBtn) this._runBtn.classList.remove('holding');
    }
    updateSpeedBar(this.speed); updateProgress(this.distance, 100);
    if (this.distance >= 100) this.finishGame('finish');
    if (this.timeLeft <= 0) this.finishGame('time');
  }
}

class ResultScene extends Phaser.Scene {
  constructor() { super('ResultScene'); }
  init(data) { this.finalScore = data.score || 0; this.maxCombo = data.maxCombo || 0; this.hits = data.hits || 0; this.misses = data.misses || 0; this.distance = data.distance || 0; }
  create() {
    this.children.removeAll(true);
    this.cameras.main.resetFX();
    var self = this; var T = window.__V3_THEME__;
    var rating = getRating(this.finalScore); var modifier = getModifier(rating); var modText = modifier > 0 ? '+' + modifier : String(modifier);
    setVisible('info-strip', false); setVisible('traffic-light', false); setVisible('light-label', false);
    setVisible('progress-track', false); setVisible('stamina-area', false); setVisible('combo-text', false); setVisible('switch-bar-area', false);
    setVisible('rules-card', false); setVisible('grade-overlay', true); setVisible('stars-row', true); setVisible('result-info', true);
    ['grade-letter','grade-score','attr-mod','stat-combo','stat-hits'].forEach(function(id){setVisible(id,true);});
    var rH = { S: T.gold, A: T.primary, B: '#9B7DB8', C: '#7A7A8E' };
    $('grade-letter').textContent = rating; $('grade-letter').style.color = rH[rating]; $('grade-score').textContent = this.finalScore + 'm / 100m';
    var sc = { S: 4, A: 3, B: 2, C: 1 }[rating]; var sr = $('stars-row'); sr.innerHTML = '';
    for (var i = 0; i < 4; i++) { var star = document.createElement('span'); star.className = 'star ' + (i < sc ? 'filled' : 'empty'); star.textContent = '\u2605'; star.style.animationDelay = (0.2 + i * 0.08) + 's'; sr.appendChild(star); }
    $('attr-mod').textContent = DISPLAY_ATTRIBUTE + ' ' + modText; $('stat-combo').textContent = '连击 ' + this.maxCombo; $('stat-hits').textContent = 'Penalties ' + this.misses;
    if (rating === 'S') { spawnParticles(this, W / 2, 330, hexToInt(T.gold), 16, 600); audio.success(); setTimeout(function() { audio.success(); }, 100); } else if (rating === 'A') { audio.success(); }
    this.add.rectangle(W / 2, H / 2, W, H, hexToInt(T.bg), 1).setDepth(0);
    clearBtnArea();
    $('btn-area').appendChild(makeCandyButton('继续', 'full', 18, function() { notifyGameComplete({ rating: rating, score: self.finalScore, attribute: ATTRIBUTE, modifier: modifier, gameId: 'red-light-green-light', maxCombo: self.maxCombo, hits: self.hits, misses: self.misses }); self.time.delayedCall(600, function() { self.scene.start('BootScene'); }); }));
    $('btn-area').appendChild(makeCandyButton('再来一次', 'full', 18, function() { self.scene.start('BootScene'); }));
  }
}

// ── Initialize ───────────────────────────────────────────────────────────────
initShellDOM();
var DPR = Math.min(window.devicePixelRatio || 1, 3);
var config = { type: Phaser.CANVAS, parent: 'phaser-container', width: W, height: H, resolution: DPR, transparent: true, fps: { forceSetTimeOut: true }, scale: { mode: Phaser.Scale.NONE }, render: { antialias: true }, scene: [NarrativeScene, BootScene, GameScene, ResultScene] };

(function() {
  resolveTheme('dark').then(function(theme) {
    applyTheme(theme);
    if (CTX.coverImage) { var coverEl = document.getElementById('cover-layer'); if (coverEl) { coverEl.src = CTX.coverImage; coverEl.style.display = 'block'; } }
    window.__V3_THEME__ = theme;
    window.__game = new Phaser.Game(config);
  });

function fitShell() { var shell = $('game-shell'), sw = window.innerWidth, sh = window.innerHeight, sx = sw / W, sy = sh / H, sc = Math.min(sx, sy, 1); shell.style.transform = 'scale(' + sc + ')'; shell.style.transformOrigin = 'top center'; if (sy < sx) shell.style.marginTop = '0px'; else shell.style.marginTop = Math.max(0, (sh - H * sc) / 2) + 'px'; }
window.addEventListener('resize', fitShell); fitShell();

(function() {
  var gs = GameScene.prototype || GameScene;
  var origPre = gs.preload;
  gs.preload = function() { if (origPre) origPre.call(this);
    this.load.image('ep_sprite_runner', 'sprite-runner.png');
    this.load.image('ep_sprite_signal', 'sprite-signal.png');
  };
})();
(function() {
  // Replace runner emoji with sprite image (DOM-based template)
  function replaceRunner() {
    var runner = document.getElementById('track-runner');
    if (!runner) return;
    var ctx = window.__EPISODE_CTX__;
    if (ctx && ctx.sprites && ctx.sprites.runner) {
      runner.innerHTML = '';
      runner.style.fontSize = '0';
      var img = document.createElement('img');
      img.src = ctx.sprites.runner;
      img.style.width = '32px'; img.style.height = '32px';
      img.style.objectFit = 'contain';
      img.style.filter = 'invert(1) drop-shadow(0 0 6px rgba(255,255,255,0.8))';
      runner.appendChild(img);
    }
  }
  // Replace traffic light with signal sprite overlay
  function replaceSignal() {
    var tl = document.getElementById('traffic-light');
    if (!tl) return;
    var ctx = window.__EPISODE_CTX__;
    if (ctx && ctx.sprites && ctx.sprites.signal) {
      var img = document.createElement('img');
      img.src = ctx.sprites.signal;
      img.style.width = '48px'; img.style.height = '48px';
      img.style.objectFit = 'contain';
      img.style.position = 'absolute'; img.style.top = '-8px'; img.style.right = '-56px';
      img.style.filter = 'drop-shadow(0 0 6px rgba(255,255,255,0.3))';
      img.style.pointerEvents = 'none';
      tl.style.position = 'relative';
      tl.appendChild(img);
    }
  }
  // Run after DOM is ready and game starts
  var origBoot = BootScene.prototype.create;
  BootScene.prototype.create = function() {
    origBoot.call(this);
    setTimeout(function() { replaceRunner(); replaceSignal(); }, 100);
  };
  // Also patch GameScene in case runner gets reset
  var gs = GameScene.prototype || GameScene;
  var origGCreate = gs.create;
  gs.create = function() {
    origGCreate.call(this);
    setTimeout(function() { replaceRunner(); replaceSignal(); }, 50);
  };
})();


// ══════════════════════════════════════════════════════════════════════════════
//  BOOT SCENE BG PATCH: preload coverImage + draw in canvas
// ══════════════════════════════════════════════════════════════════════════════
(function() {
  var proto = BootScene.prototype || BootScene;
  // Add preload to load coverImage as Phaser texture
  var origPreload = proto.preload;
  proto.preload = function() {
    if (origPreload) origPreload.call(this);
    if (CTX.coverImage) {
      this.load.image('ep_bg_boot', CTX.coverImage);
      this.load.image('ep_bg_game', CTX.coverImage);
    }
  };
  // Wrap create to draw bg image after the solid fillRect
  var origBootCreate = proto.create;
  proto.create = function() {
    origBootCreate.call(this);
    // Draw bg image on top of the solid bg, with visible opacity
    if (this.textures.exists('ep_bg_boot')) {
      var bg = this.add.image(W/2, H/2, 'ep_bg_boot');
      var _t = bg.texture.getSourceImage();
      var _s = Math.max(W/_t.width, H/_t.height);
      bg.setScale(_s);
      bg.setAlpha(0.15);
      bg.setDepth(0);
    }
  };
})();

// ══════════════════════════════════════════════════════════════════════════════
//  COMPONENT C: ResultScene narrative overlay (monkey-patch)
// ══════════════════════════════════════════════════════════════════════════════
(function() {
  var proto = ResultScene.prototype || ResultScene;
  var origCreate = proto.create;
  proto.create = function() {
    var self = this;
    var rating = getRating(this.finalScore || 0);
    if (CTX.resultTexts && CTX.resultTexts[rating]) {
      // Hide all UI first (use classList to preserve inline styles on btn-area etc.)
      ['dialogue','score-display','timer-text','combo-text','hint-text',
       'stars-row','result-info','gauge-area','boot-card','hud-row',
       'sort-legend','btn-area'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.classList.add('hidden');
      });
      var shell = document.getElementById('game-shell');
      var ov = document.createElement('div');
      ov.className = 'narrative-overlay';
      ov.id = 'narrative-overlay';
      ov.innerHTML =
        '<div class="narrator">' + rating + ' 级评价</div>' +
        '<div class="line">' + CTX.resultTexts[rating].replace(/\n/g, '<br>') + '</div>' +
        '<div class="tap-hint">点击继续</div>';
      ov.addEventListener('pointerup', function() {
        ov.style.opacity = '0';
        ov.style.transition = 'opacity 0.4s';
        setTimeout(function() {
          ov.remove();
          // Restore display defaults (use classList to preserve inline styles)
          ['dialogue','score-display','timer-text','combo-text','hint-text',
           'stars-row','result-info','gauge-area','boot-card','hud-row',
           'sort-legend','btn-area'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.classList.remove('hidden');
          });
          origCreate.call(self);
        }, 400);
      });
      shell.appendChild(ov);
      return;
    }
    origCreate.call(self);
  };
})();
