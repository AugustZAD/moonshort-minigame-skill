<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Conveyor Sort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #172033; overflow: hidden; }
  canvas { display: block; margin: 0 auto; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const ATTRIBUTE = params.get('attribute') || 'Wisdom';
const PRIMARY_COLOR = params.get('primaryColor') || '#ff6b9d';

const W = 393;
const H = 736;
const ROUND_SECONDS = 50;
const RATING_THRESHOLDS = { S: 360, A: 275, B: 190, C: 110 };
const MODIFIER_BY_RATING = { S: 3, A: 1, B: 0, C: -1 };

function getRating(score) {
  if (score >= RATING_THRESHOLDS.S) return 'S';
  if (score >= RATING_THRESHOLDS.A) return 'A';
  if (score >= RATING_THRESHOLDS.B) return 'B';
  if (score >= RATING_THRESHOLDS.C) return 'C';
  return 'C';
}

function getModifier(rating) {
  return MODIFIER_BY_RATING[rating];
}

function notifyGameComplete(result) {
  const payload = JSON.stringify(result);
  if (window.webkit?.messageHandlers?.jsBridge) {
    window.webkit.messageHandlers.jsBridge.postMessage(payload);
    return;
  }
  if (window.jsBridge?.postMessage) {
    window.jsBridge.postMessage(payload);
    return;
  }
  if (window.parent !== window) {
    window.parent.postMessage(payload, '*');
    return;
  }
  console.log('[GameComplete]', result);
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function hexToRgb(hex) {
  const raw = hex.replace('#', '');
  const full = raw.length === 3 ? raw.split('').map((c) => c + c).join('') : raw;
  const value = parseInt(full, 16);
  return {
    r: (value >> 16) & 255,
    g: (value >> 8) & 255,
    b: value & 255
  };
}

function rgbToHex(r, g, b) {
  const toHex = (n) => clamp(Math.round(n), 0, 255).toString(16).padStart(2, '0');
  return '#' + toHex(r) + toHex(g) + toHex(b);
}

function blendHex(a, b, t) {
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);
  return rgbToHex(
    ca.r + (cb.r - ca.r) * t,
    ca.g + (cb.g - ca.g) * t,
    ca.b + (cb.b - ca.b) * t
  );
}

function colorSet(primaryColor) {
  const palette = {
    primary: primaryColor,
    light: blendHex(primaryColor, '#f8fafc', 0.88),
    accent: blendHex(primaryColor, '#111827', 0.62),
    neutral: blendHex(primaryColor, '#1f2937', 0.76)
  };
  return {
    primaryHex: palette.primary,
    lightHex: palette.light,
    accentHex: palette.accent,
    neutralHex: palette.neutral,
    primary: Phaser.Display.Color.HexStringToColor(palette.primary).color,
    light: Phaser.Display.Color.HexStringToColor(palette.light).color,
    accent: Phaser.Display.Color.HexStringToColor(palette.accent).color,
    neutral: Phaser.Display.Color.HexStringToColor(palette.neutral).color,
    white: 0xffffff,
    dark: 0x111827,
    success: 0x22c55e,
    danger: 0xef4444,
    gold: 0xffd700,
    blue: 0x38bdf8
  };
}

const C = colorSet(PRIMARY_COLOR);

function makeButton(scene, cfg) {
  const shadow = scene.add.rectangle(cfg.x + 3, cfg.y + 3, cfg.w, cfg.h, C.accent, 1).setDepth(20);
  const body = scene.add.rectangle(cfg.x, cfg.y, cfg.w, cfg.h, cfg.fill || C.primary, 1)
    .setStrokeStyle(2.5, C.accent)
    .setInteractive({ useHandCursor: true })
    .setDepth(21);
  const label = scene.add.text(cfg.x, cfg.y, cfg.label, {
    fontFamily: 'Nunito',
    fontSize: (cfg.fontSize || 22) + 'px',
    fontStyle: '900',
    color: cfg.textColor || '#ffffff'
  }).setOrigin(0.5).setDepth(22);

  const release = (emitTap) => {
    body.setPosition(cfg.x, cfg.y);
    label.setPosition(cfg.x, cfg.y);
    shadow.setVisible(true);
    if (emitTap && cfg.onTap) cfg.onTap();
  };

  body.on('pointerdown', () => {
    body.setPosition(cfg.x + 2, cfg.y + 2);
    label.setPosition(cfg.x + 2, cfg.y + 2);
    shadow.setVisible(false);
  });
  body.on('pointerup', () => release(true));
  body.on('pointerout', () => release(false));
}

class GameScene extends Phaser.Scene {
  constructor() {
    super('GameScene');
  }

  init() {
    this.score = 0;
    this.timeLeft = ROUND_SECONDS;
    this.isOver = false;
    this.combo = 0;
    this.maxCombo = 0;
    this.sorted = 0;
    this.missed = 0;
    this.spawnMs = 0;
    this.items = [];
  }

  create() {
    this.cameras.main.setBackgroundColor(C.lightHex);

    const dots = this.add.graphics();
    dots.fillStyle(C.primary, 0.08);
    for (let x = 16; x < W; x += 26) {
      for (let y = 12; y < H; y += 28) {
        dots.fillCircle(x + ((y / 28) % 2 ? 4 : -2), y, 2);
      }
    }

    this.add.rectangle(W / 2, 82, 350, 118, C.white, 1).setStrokeStyle(2.5, C.accent);
    this.add.text(W / 2, 46, 'Conveyor Sort', {
      fontFamily: 'Nunito',
      fontSize: '30px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 78, 'Drag falling packages into the matching bins.', {
      fontFamily: 'Patrick Hand',
      fontSize: '19px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.rectangle(24, 112, 142, 34, C.light, 1).setOrigin(0, 0.5).setStrokeStyle(2, C.accent);
    this.scoreText = this.add.text(36, 112, 'Score 0', {
      fontFamily: 'Nunito',
      fontSize: '16px',
      fontStyle: '700',
      color: C.accentHex
    }).setOrigin(0, 0.5);

    this.add.rectangle(W - 24, 112, 126, 34, C.light, 1).setOrigin(1, 0.5).setStrokeStyle(2, C.accent);
    this.timerText = this.add.text(W - 36, 112, 'Time ' + this.timeLeft, {
      fontFamily: 'Nunito',
      fontSize: '16px',
      fontStyle: '700',
      color: C.accentHex
    }).setOrigin(1, 0.5);

    this.add.rectangle(W / 2, 390, 322, 404, C.white, 0.96).setStrokeStyle(2.5, C.accent);
    this.playLeft = 42;
    this.playRight = 351;
    this.playTop = 188;
    this.playBottom = 548;
    this.graphics = this.add.graphics();

    this.binDefs = [
      { x: 98, key: 'warm', label: 'Warm', fill: C.primary },
      { x: 196, key: 'gold', label: 'Gold', fill: C.gold },
      { x: 294, key: 'cool', label: 'Cool', fill: C.blue }
    ];
    this.binLabels = this.binDefs.map((bin) => this.add.text(bin.x, 510, bin.label, {
      fontFamily: 'Nunito',
      fontSize: '16px',
      fontStyle: '900',
      color: bin.key === 'gold' ? '#111827' : '#ffffff'
    }).setOrigin(0.5));

    this.statusText = this.add.text(W / 2, 602, 'Items keep falling while you drag them sideways', {
      fontFamily: 'Patrick Hand',
      fontSize: '20px',
      color: C.neutralHex,
      wordWrap: { width: 304 },
      align: 'center'
    }).setOrigin(0.5);
    this.comboText = this.add.text(W / 2, 634, 'Combo x0', {
      fontFamily: 'Nunito',
      fontSize: '20px',
      fontStyle: '700',
      color: C.accentHex
    }).setOrigin(0.5);
  }

  addScore(delta) {
    this.score = Math.max(0, this.score + delta);
    this.scoreText.setText('Score ' + Math.round(this.score));
    this.tweens.add({
      targets: this.scoreText,
      scaleX: 1.12,
      scaleY: 1.12,
      yoyo: true,
      duration: 110
    });
  }

  setStatus(text, color) {
    this.statusText.setText(text);
    this.statusText.setColor(color || C.neutralHex);
    this.comboText.setText('Combo x' + this.combo);
  }

  spawnItem() {
    const bin = Phaser.Utils.Array.GetRandom(this.binDefs);
    const x = Phaser.Math.Between(76, 316);
    const container = this.add.container(x, this.playTop + 10);
    const box = this.add.rectangle(0, 0, 44, 34, bin.fill, 1).setStrokeStyle(2, C.accent);
    const label = this.add.text(0, 0, bin.label[0], {
      fontFamily: 'Nunito',
      fontSize: '22px',
      fontStyle: '900',
      color: bin.key === 'gold' ? '#111827' : '#ffffff'
    }).setOrigin(0.5);
    container.add([box, label]);
    container.setSize(44, 34);
    container.setInteractive({ draggable: true, useHandCursor: true });
    this.input.setDraggable(container);

    const item = {
      container,
      box,
      label,
      targetKey: bin.key,
      speed: Phaser.Math.Between(88, 118),
      dragging: false
    };

    container.on('dragstart', () => {
      item.dragging = true;
      container.setDepth(30);
    });
    container.on('drag', (pointer, dragX, dragY) => {
      container.x = clamp(dragX, this.playLeft + 22, this.playRight - 22);
      container.y = clamp(dragY, this.playTop + 10, this.playBottom - 24);
    });
    container.on('dragend', () => {
      item.dragging = false;
      container.setDepth(0);
    });

    this.items.push(item);
  }

  resolveItem(item, success) {
    const idx = this.items.indexOf(item);
    if (idx !== -1) this.items.splice(idx, 1);
    item.container.destroy();
    if (success) {
      this.sorted += 1;
      this.combo += 1;
      this.maxCombo = Math.max(this.maxCombo, this.combo);
      const gain = 14 + Math.min(this.combo, 4) * 2;
      this.addScore(gain);
      this.setStatus('Sorted +' + gain, '#059669');
    } else {
      this.missed += 1;
      this.combo = 0;
      this.addScore(-8);
      this.setStatus('Wrong bin -8', '#dc2626');
    }
  }

  drawPlayfield() {
    this.graphics.clear();
    this.graphics.fillStyle(C.light, 1);
    this.graphics.fillRect(this.playLeft, this.playTop, this.playRight - this.playLeft, this.playBottom - this.playTop);

    this.graphics.fillStyle(C.accent, 0.08);
    for (let x = 56; x < 340; x += 32) {
      this.graphics.fillRoundedRect(x, 210, 18, 260, 5);
    }

    for (const bin of this.binDefs) {
      this.graphics.fillStyle(bin.fill, 1);
      this.graphics.fillRoundedRect(bin.x - 42, 486, 84, 50, 10);
      this.graphics.lineStyle(2, C.accent, 1);
      this.graphics.strokeRoundedRect(bin.x - 42, 486, 84, 50, 10);
    }
  }

  finishGame() {
    if (this.isOver) return;
    this.isOver = true;
    this.scene.start('ResultScene', {
      score: Math.round(this.score),
      maxCombo: this.maxCombo,
      hits: this.sorted,
      misses: this.missed
    });
  }

  update(time, delta) {
    if (this.isOver) return;

    this.timeLeft = Math.max(0, this.timeLeft - delta / 1000);
    this.timerText.setText('Time ' + Math.ceil(this.timeLeft));

    this.spawnMs -= delta;
    if (this.spawnMs <= 0 && this.items.length < 4) {
      this.spawnMs = Phaser.Math.Between(620, 940);
      this.spawnItem();
    }

    for (let i = this.items.length - 1; i >= 0; i -= 1) {
      const item = this.items[i];
      if (!item.dragging) item.container.y += item.speed * (delta / 1000);
      if (item.container.y >= 500) {
        const nearest = this.binDefs.reduce((best, bin) => Math.abs(bin.x - item.container.x) < Math.abs(best.x - item.container.x) ? bin : best, this.binDefs[0]);
        this.resolveItem(item, nearest.key === item.targetKey);
      }
    }

    this.drawPlayfield();
    if (this.timeLeft <= 0) this.finishGame();
  }
}

class ResultScene extends Phaser.Scene {
  constructor() {
    super('ResultScene');
  }

  init(data) {
    this.finalScore = data.score || 0;
    this.maxCombo = data.maxCombo || 0;
    this.hits = data.hits || 0;
    this.misses = data.misses || 0;
  }

  create() {
    this.cameras.main.setBackgroundColor(C.lightHex);
    const rating = getRating(this.finalScore);
    const modifier = getModifier(rating);
    const modText = modifier > 0 ? '+' + modifier : String(modifier);
    const ratingColor = { S: '#ffd700', A: C.primaryHex, B: '#9ca3af', C: '#fb7185' }[rating];

    this.add.rectangle(W / 2, 94, 350, 116, C.white, 1).setStrokeStyle(2.5, C.accent);
    this.add.text(W / 2, 50, 'Settlement', {
      fontFamily: 'Nunito',
      fontSize: '32px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 86, 'Conveyor Sort', {
      fontFamily: 'Patrick Hand',
      fontSize: '21px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.text(W / 2, 252, rating, {
      fontFamily: 'Nunito',
      fontSize: '108px',
      fontStyle: '900',
      color: ratingColor,
      stroke: '#111827',
      strokeThickness: 4
    }).setOrigin(0.5);

    this.add.text(W / 2, 336, 'Score ' + this.finalScore, {
      fontFamily: 'Nunito',
      fontSize: '28px',
      fontStyle: '800',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 372, ATTRIBUTE + ' ' + modText, {
      fontFamily: 'Patrick Hand',
      fontSize: '24px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.rectangle(110, 448, 130, 78, C.white, 1).setStrokeStyle(2, C.accent);
    this.add.text(110, 432, 'Max Combo', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: C.neutralHex
    }).setOrigin(0.5);
    this.add.text(110, 463, String(this.maxCombo), {
      fontFamily: 'Nunito',
      fontSize: '30px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);

    this.add.rectangle(282, 448, 130, 78, C.white, 1).setStrokeStyle(2, C.accent);
    this.add.text(282, 432, 'Sorted / Miss', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: C.neutralHex
    }).setOrigin(0.5);
    this.add.text(282, 463, this.hits + ' / ' + this.misses, {
      fontFamily: 'Nunito',
      fontSize: '28px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);

    makeButton(this, {
      x: W / 2,
      y: H - 132,
      w: 234,
      h: 58,
      label: 'Continue',
      fontSize: 26,
      onTap: () => {
        notifyGameComplete({
          rating: rating,
          score: this.finalScore,
          attribute: ATTRIBUTE,
          modifier: modifier,
          gameId: 'conveyor-sort',
          maxCombo: this.maxCombo,
          hits: this.hits,
          misses: this.misses
        });
      }
    });
  }
}

const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  backgroundColor: C.lightHex,
  scene: [GameScene, ResultScene]
};

window.__game = new Phaser.Game(config);
</script>
</body>
</html>
