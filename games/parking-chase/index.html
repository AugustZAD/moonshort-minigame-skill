<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>暗中藏匿</title>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e141c;
      --surface: #1b2029;
      --surface-high: #252a33;
      --surface-highest: #30353e;
      --surface-lowest: #090e17;
      --primary: #aec6ff;
      --primary-ctr: #508eff;
      --secondary: #ffb4a4;
      --secondary-ctr: #ff5633;
      --tertiary: #e5c191;
      --tertiary-ctr: #ab8b60;
      --on-surface: #dee2ef;
      --outline: #8c909f;
      --outline-var: #424754;
      --error: #ffb4ab;
      --error-ctr: #93000a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Manrope', sans-serif;
      color: var(--on-surface);
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* ── Game wrapper ── */
    #game-wrap {
      position: relative;
      width: 393px; height: 736px;
      overflow: hidden;
    }
    #game-wrap canvas { display: block; }

    /* ── HUD Overlay ── */
    #hud {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 20;
      display: flex; flex-direction: column;
      padding: 0 20px;
    }
    #hud * { pointer-events: none; }

    /* Top bar */
    .hud-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 4px 8px;
      background: linear-gradient(to bottom, rgba(14,20,28,0.9), transparent);
    }
    .hud-timer {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Manrope', sans-serif; font-weight: 700;
      color: var(--primary); font-size: 16px;
    }
    .hud-title {
      font-family: 'Epilogue', sans-serif;
      font-weight: 800; font-size: 18px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--on-surface);
      text-shadow: 0 0 10px rgba(222,226,239,0.5);
    }

    /* Status & hint */
    .hud-status {
      text-align: center; margin-top: 4px;
    }
    .hud-status-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.15em; color: rgba(174,198,255,0.7);
      margin-bottom: 2px;
    }
    .hud-status-text {
      font-family: 'Epilogue', sans-serif;
      font-weight: 700; font-size: 15px;
      color: var(--on-surface);
    }

    /* Bars */
    .hud-bars { margin-top: 10px; }
    .bar-row { margin-bottom: 8px; }
    .bar-label {
      display: flex; justify-content: space-between;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: -0.02em;
      margin-bottom: 3px;
    }
    .bar-label.escape { color: var(--primary); }
    .bar-label.tension { color: var(--secondary-ctr); }
    .bar-track {
      height: 6px; width: 100%;
      background: var(--surface-lowest);
      border-radius: 99px; overflow: hidden;
      border: 1px solid rgba(66,71,84,0.1);
    }
    .bar-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.12s ease-out;
    }
    .bar-fill.escape {
      background: linear-gradient(90deg, var(--primary), var(--primary-ctr));
      box-shadow: 0 0 10px rgba(174,198,255,0.4);
    }
    .bar-fill.tension {
      background: var(--secondary-ctr);
      box-shadow: 0 0 15px rgba(255,86,51,0.5);
    }

    /* Action button */
    .hud-bottom {
      margin-top: auto;
      display: flex; flex-direction: column; align-items: center;
      padding-bottom: 22px;
      pointer-events: auto !important;
    }
    .btn-action {
      position: relative;
      width: 96px; height: 96px;
      border-radius: 50%; border: 4px solid var(--primary);
      background: var(--primary-ctr);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(80,142,255,0.4);
      transition: transform 0.08s ease;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto !important;
    }
    .btn-action:active { transform: scale(0.88); }
    .btn-action .material-symbols-outlined {
      font-size: 36px; color: #00275e;
      font-variation-settings: 'FILL' 1;
    }
    .btn-action-label {
      font-family: 'Epilogue', sans-serif;
      font-weight: 800; font-size: 13px;
      color: #00275e; text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .btn-action.hide-mode {
      background: var(--error-ctr);
      border-color: var(--secondary-ctr);
      box-shadow: 0 0 30px rgba(255,86,51,0.4);
    }
    .btn-action.hide-mode .material-symbols-outlined,
    .btn-action.hide-mode .btn-action-label { color: #ffdad6; }
    .btn-ring {
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      opacity: 0.5;
      animation: pulse-ring 1.2s ease-out infinite;
    }
    .btn-action.hide-mode .btn-ring {
      border-color: var(--secondary-ctr);
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* ── Romantic Moment Overlay ── */
    #moment-overlay {
      position: absolute; inset: 0; z-index: 30;
      display: none;
      align-items: center; justify-content: center;
      padding: 0 28px;
      background: rgba(14,20,28,0.4);
    }
    #moment-overlay.active { display: flex; }
    .moment-panel {
      background: rgba(37,42,51,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 28px 24px;
      border-radius: 12px;
      border-left: 4px solid var(--tertiary);
      box-shadow: 0 0 30px rgba(229,193,145,0.15);
      max-width: 340px; width: 100%;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #moment-overlay.active .moment-panel {
      opacity: 1; transform: translateY(0);
    }
    .moment-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .moment-meta span {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.2em; color: var(--outline);
    }
    .moment-dots { display: flex; gap: 4px; }
    .moment-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--secondary-ctr);
    }
    .moment-dot.dim { opacity: 0.3; }
    .moment-text {
      font-size: 18px; line-height: 1.6;
      color: var(--tertiary); font-style: italic;
      letter-spacing: 0.02em;
    }

    /* ── Result Overlay ── */
    #result-overlay {
      position: absolute; inset: 0; z-index: 40;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(14,20,28,0.92);
      text-align: center;
    }
    #result-overlay.active { display: flex; }
    .result-bg-text {
      position: absolute; top: 60px; right: -40px;
      font-family: 'Epilogue', sans-serif;
      font-weight: 900; font-size: 180px;
      color: rgba(48,53,62,0.15);
      letter-spacing: -0.04em;
      pointer-events: none;
    }
    .result-rating {
      position: relative;
      font-family: 'Epilogue', sans-serif;
      font-weight: 800; font-size: 160px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .result-rating::before {
      content: ''; position: absolute;
      inset: -40px; border-radius: 50%;
      filter: blur(60px);
      z-index: -1;
    }
    .result-rating.S { color: var(--tertiary); text-shadow: 0 0 20px rgba(229,193,145,0.6); }
    .result-rating.S::before { background: rgba(229,193,145,0.15); }
    .result-rating.A { color: #66ff99; text-shadow: 0 0 20px rgba(102,255,153,0.5); }
    .result-rating.A::before { background: rgba(102,255,153,0.12); }
    .result-rating.B { color: var(--primary); text-shadow: 0 0 20px rgba(174,198,255,0.5); }
    .result-rating.B::before { background: rgba(174,198,255,0.12); }
    .result-rating.C { color: var(--secondary-ctr); text-shadow: 0 0 20px rgba(255,86,51,0.5); }
    .result-rating.C::before { background: rgba(255,86,51,0.12); }
    .result-score-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.2em; color: var(--outline);
      margin-bottom: 4px;
    }
    .result-score {
      font-family: 'Epilogue', sans-serif;
      font-weight: 700; font-size: 42px;
      color: var(--primary);
      letter-spacing: -0.03em;
    }
    .result-attr {
      margin-top: 16px;
      background: rgba(37,42,51,0.4);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 99px;
      border-left: 4px solid var(--tertiary);
      font-weight: 700; font-size: 17px;
      color: var(--tertiary);
      display: flex; align-items: center; gap: 10px;
    }
    .result-attr-ping {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--tertiary);
      animation: pulse-ring 1.2s ease-out infinite;
    }
    .result-flavor {
      margin-top: 28px;
      max-width: 260px;
      font-style: italic; font-size: 14px;
      color: var(--outline); line-height: 1.6;
      letter-spacing: 0.02em;
    }
    .result-btn {
      margin-top: 36px;
      width: 240px; padding: 16px 0;
      background: var(--primary-ctr);
      color: #00275e;
      border: none; border-radius: 8px;
      font-family: 'Epilogue', sans-serif;
      font-weight: 700; font-size: 16px;
      text-transform: uppercase; letter-spacing: 0.15em;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(80,142,255,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.15s ease;
      pointer-events: auto;
    }
    .result-btn:active { transform: scale(0.95); }

    /* Side decoration */
    .deco-line {
      position: absolute; bottom: 120px; left: 10px; z-index: 5;
      opacity: 0.3; pointer-events: none;
    }
    .deco-line-bar {
      width: 1px; height: 80px;
      background: linear-gradient(to bottom, transparent, var(--outline), transparent);
    }
    .deco-line-text {
      margin-top: 6px;
      font-size: 9px; color: var(--outline);
      text-transform: uppercase; letter-spacing: 0.15em;
      writing-mode: vertical-rl;
    }
  </style>
</head>
<body>
<div id="game-wrap">
  <!-- HUD Overlay -->
  <div id="hud">
    <div class="hud-top">
      <div class="hud-timer">
        <span class="material-symbols-outlined" style="font-size:20px">timer</span>
        <span id="ui-timer">20</span>
      </div>
      <div class="hud-title">暗中藏匿</div>
      <span class="material-symbols-outlined" style="font-size:20px;color:var(--outline)">visibility_off</span>
    </div>
    <div class="hud-status">
      <div class="hud-status-label" id="ui-status-label">Status</div>
      <div class="hud-status-text" id="ui-status">趁现在——快跑！</div>
    </div>
    <div class="hud-bars">
      <div class="bar-row">
        <div class="bar-label escape">
          <span>逃脱进度</span>
          <span id="ui-escape-pct">0%</span>
        </div>
        <div class="bar-track"><div class="bar-fill escape" id="ui-escape-bar" style="width:0%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label tension">
          <span>暴露风险</span>
          <span id="ui-tension-level">Low</span>
        </div>
        <div class="bar-track"><div class="bar-fill tension" id="ui-tension-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="hud-bottom">
      <div class="btn-action" id="ui-btn">
        <div class="btn-ring"></div>
        <span class="material-symbols-outlined" id="ui-btn-icon">directions_run</span>
        <span class="btn-action-label" id="ui-btn-label">快跑</span>
      </div>
    </div>
  </div>

  <!-- Romantic Moment Overlay -->
  <div id="moment-overlay">
    <div class="moment-panel">
      <div class="moment-meta">
        <span>Moment of Impact</span>
        <div class="moment-dots">
          <div class="moment-dot" id="dot-1"></div>
          <div class="moment-dot dim" id="dot-2"></div>
          <div class="moment-dot dim" id="dot-3"></div>
        </div>
      </div>
      <p class="moment-text" id="moment-text"></p>
    </div>
  </div>

  <!-- Result Overlay -->
  <div id="result-overlay">
    <div class="result-bg-text">VOID</div>
    <div class="result-rating" id="res-rating">S</div>
    <div class="result-score-label">Total Score</div>
    <div class="result-score" id="res-score">0 pts</div>
    <div class="result-attr" id="res-attr">
      <span id="res-attr-text">意志 +3</span>
      <div class="result-attr-ping"></div>
    </div>
    <p class="result-flavor" id="res-flavor"></p>
    <button class="result-btn" id="res-btn">
      继续
      <span class="material-symbols-outlined" style="font-size:20px">arrow_forward</span>
    </button>
  </div>

  <!-- Side decoration -->
  <div class="deco-line">
    <div class="deco-line-bar"></div>
    <div class="deco-line-text">Log #042</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
'use strict';

// ── MoonAudio — Web Audio Synthesizer (zero-dependency) ──
class MoonAudio {
  constructor() { this._ctx = null; this._master = null; this._bgmNodes = []; this._ambientNodes = []; this._unlocked = false; }
  _ensure() {
    if (this._ctx) return this._ctx;
    this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    this._master = this._ctx.createGain(); this._master.gain.value = 0.6;
    this._master.connect(this._ctx.destination); return this._ctx;
  }
  unlock() {
    if (this._unlocked) return; this._ensure();
    if (this._ctx.state === 'suspended') this._ctx.resume(); this._unlocked = true;
  }
  tap() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(1200, t); o.frequency.exponentialRampToValueAtTime(800, t + 0.08);
    g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g).connect(this._master); o.start(t); o.stop(t + 0.1);
  }
  success() {
    const ctx = this._ensure(), t = ctx.currentTime;
    [523, 784].forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain(); o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, t + i * 0.12); g.gain.linearRampToValueAtTime(0.25, t + i * 0.12 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
      o.connect(g).connect(this._master); o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.3);
    });
  }
  fail() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t); o.frequency.linearRampToValueAtTime(80, t + 0.25);
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g).connect(this._master); o.start(t); o.stop(t + 0.3);
  }
  alert() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(880, t); o.frequency.exponentialRampToValueAtTime(220, t + 0.15);
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g).connect(this._master); o.start(t); o.stop(t + 0.2);
  }
  swoosh() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const len = ctx.sampleRate * 0.15, buf = ctx.createBuffer(1, len, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const s = ctx.createBufferSource(); s.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.setValueAtTime(2000, t);
    f.frequency.exponentialRampToValueAtTime(500, t + 0.15); f.Q.value = 2;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    s.connect(f).connect(g).connect(this._master); s.start(t);
  }
  heartbeat() {
    const ctx = this._ensure(), t = ctx.currentTime;
    [0, 0.18].forEach(off => {
      const o = ctx.createOscillator(), g = ctx.createGain(); o.type = 'sine';
      o.frequency.setValueAtTime(60, t + off); o.frequency.exponentialRampToValueAtTime(30, t + off + 0.15);
      g.gain.setValueAtTime(0.35, t + off); g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.2);
      o.connect(g).connect(this._master); o.start(t + off); o.stop(t + off + 0.2);
    });
  }
  tick() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain(); o.type = 'sine'; o.frequency.value = 1000;
    g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    o.connect(g).connect(this._master); o.start(t); o.stop(t + 0.06);
  }
  rain() {
    const ctx = this._ensure(), len = ctx.sampleRate * 2, buf = ctx.createBuffer(1, len, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = ctx.createBufferSource(); s.buffer = buf; s.loop = true;
    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 800; f.Q.value = 0.5;
    const g = ctx.createGain(); g.gain.value = 0.08;
    s.connect(f).connect(g).connect(this._master); s.start();
    this._ambientNodes.push({ src: s, gain: g }); return { src: s, gain: g };
  }
  bgm(style) {
    this.stopBgm(); const ctx = this._ensure();
    const P = {
      tense:[[130.81,155.56,196],[123.47,146.83,185],[116.54,138.59,174.61],[123.47,146.83,185]],
      romantic:[[261.63,329.63,392],[293.66,349.23,440],[246.94,311.13,369.99],[261.63,329.63,392]],
      action:[[164.81,196,246.94],[174.61,220,261.63],[146.83,174.61,220],[155.56,196,246.94]],
      mystery:[[146.83,174.61,220],[138.59,164.81,207.65],[130.81,155.56,196],[138.59,174.61,220]],
    };
    const chords = P[style] || P.tense, bd = style === 'action' ? 0.8 : 1.2, ll = chords.length * bd;
    const mg = ctx.createGain(); mg.gain.value = 0; mg.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 1);
    mg.connect(this._master);
    const sched = () => {
      const now = ctx.currentTime;
      chords.forEach((ch, ci) => {
        const ct = now + ci * bd;
        ch.forEach(freq => {
          const o = ctx.createOscillator(), e = ctx.createGain();
          o.type = style === 'romantic' ? 'sine' : style === 'action' ? 'sawtooth' : 'triangle';
          o.frequency.value = freq;
          e.gain.setValueAtTime(0, ct); e.gain.linearRampToValueAtTime(0.08, ct + 0.05);
          e.gain.setValueAtTime(0.08, ct + bd * 0.7); e.gain.linearRampToValueAtTime(0, ct + bd);
          o.connect(e).connect(mg); o.start(ct); o.stop(ct + bd);
        });
        const b = ctx.createOscillator(), be = ctx.createGain(); b.type = 'sine'; b.frequency.value = ch[0] / 2;
        be.gain.setValueAtTime(0, ct); be.gain.linearRampToValueAtTime(0.12, ct + 0.03);
        be.gain.setValueAtTime(0.12, ct + bd * 0.5); be.gain.linearRampToValueAtTime(0, ct + bd);
        b.connect(be).connect(mg); b.start(ct); b.stop(ct + bd);
      });
    };
    sched();
    const iid = setInterval(() => { if (!this._ctx || this._ctx.state === 'closed') { clearInterval(iid); return; } sched(); }, ll * 1000);
    this._bgmNodes.push({ masterGain: mg, intervalId: iid });
  }
  stopBgm(ms) {
    const f = (ms || 500) / 1000, ctx = this._ctx; if (!ctx) return;
    const t = ctx.currentTime;
    for (const n of this._bgmNodes) { if (n.intervalId) clearInterval(n.intervalId); if (n.masterGain) n.masterGain.gain.linearRampToValueAtTime(0, t + f); }
    this._bgmNodes = [];
  }
  stopAll() { this.stopBgm(200); for (const n of this._ambientNodes) { try { n.src.stop(); } catch(_) {} } this._ambientNodes = []; }
  setVolume(v) { this._ensure(); this._master.gain.value = Math.max(0, Math.min(1, v)); }
}

const audio = new MoonAudio();

const CTX = window.__EPISODE_CTX__ || {};

const W = 393, H = 736;
const BASE = (() => {
  const s = window.location.pathname.replace(/\/[^/]*$/, '');
  return window.location.origin + s.replace(/\/games\/[^/]+$/, '');
})();

const IMG = {
  bg:    BASE + '/data/ep5/background/20260320-121814.jpg',
  avery: BASE + '/data/ep5/processed/aiden_transparent.png',
  aiden: BASE + '/data/ep5/processed/avery_transparent.png',
};

const COPY = Object.assign({
  statusDash:   '趁现在——快跑！',
  statusHide:   '⚠ 有人来了，别动！',
  statusMoment: '……',
  moments: [
    '"跟紧我。" Aiden 的手握住了你的手腕。',
    '他把你压在车门后，呼吸近得烫过耳廓。',
    '"再坚持一下。" 他的声音低沉，只对你说。',
  ],
}, CTX.copy || {});

// ── DOM refs ──
const $timer      = document.getElementById('ui-timer');
const $statusLabel= document.getElementById('ui-status-label');
const $status     = document.getElementById('ui-status');
const $escBar     = document.getElementById('ui-escape-bar');
const $escPct     = document.getElementById('ui-escape-pct');
const $tensBar    = document.getElementById('ui-tension-bar');
const $tensLvl    = document.getElementById('ui-tension-level');
const $btn        = document.getElementById('ui-btn');
const $btnIcon    = document.getElementById('ui-btn-icon');
const $btnLabel   = document.getElementById('ui-btn-label');
const $moment     = document.getElementById('moment-overlay');
const $momentText = document.getElementById('moment-text');
const $result     = document.getElementById('result-overlay');

// ── Scenes ──

class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  preload() {
    this.add.text(393/2, 736/2, 'Loading...', {
      fontFamily: 'Manrope', fontSize: '18px', color: '#aec6ff'
    }).setOrigin(0.5);
    this.load.image('bg',    IMG.bg);
    this.load.image('avery', IMG.avery);
    this.load.image('aiden', IMG.aiden);
  }
  create() {
    this.scene.start('Game');
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    const cx = W / 2, cy = H / 2;

    // ── Background (cover crop) ──
    const bgImg = this.textures.get('bg').getSourceImage();
    const bgAspect = bgImg.width / bgImg.height;
    const canvasAspect = W / H;
    let bgW, bgH;
    if (bgAspect > canvasAspect) { bgH = H; bgW = H * bgAspect; }
    else { bgW = W; bgH = W / bgAspect; }
    this.bg = this.add.image(cx, cy, 'bg').setDisplaySize(bgW, bgH).setDepth(0);
    // Night overlays
    this.add.rectangle(cx, cy, W, H, 0x040810, 0.55).setDepth(1);
    this.add.rectangle(cx, cy, W, H, 0x081028, 0.20).setDepth(1);

    // ── Characters ──
    // Original images: 768×1376, aspect ratio 1:1.79
    const CHAR_RATIO = 1376 / 768; // ~1.79
    // Car roof sits lower now to show more of the characters
    const carY = H - 100; // moved down from H-130
    const carRoofY = carY - 30; // roof line

    // Aiden — left, half body visible above car
    const aidenW = 150, aidenH = Math.round(aidenW * CHAR_RATIO);
    this.aidenBase = { x: cx - 50, y: carRoofY + 140 };
    this.aidenSpr = this.add.image(this.aidenBase.x, this.aidenBase.y, 'aiden')
      .setDisplaySize(aidenW, aidenH).setOrigin(0.5, 1).setDepth(12);

    // Avery — right, slightly smaller, flipped to face Aiden
    const averyW = 130, averyH = Math.round(averyW * CHAR_RATIO);
    this.averySpr = this.add.image(cx + 50, carRoofY + 120, 'avery')
      .setDisplaySize(averyW, averyH).setOrigin(0.5, 1).setDepth(12).setFlipX(true);

    // ── Car silhouette (lower, less obstructive) ──
    this.add.rectangle(cx, carY + 50, W + 20, 200, 0x04070e, 1).setDepth(13);
    const carGfx = this.add.graphics().setDepth(13);
    carGfx.fillStyle(0x080d1a, 1);
    carGfx.fillRoundedRect(cx - 165, carRoofY, 330, 35, { tl: 14, tr: 14, bl: 0, br: 0 });
    carGfx.lineStyle(1.5, 0x3366aa, 0.35);
    carGfx.strokeRoundedRect(cx - 136, carRoofY + 4, 108, 22, 4);
    carGfx.strokeRoundedRect(cx + 8, carRoofY + 4, 108, 22, 4);
    carGfx.lineStyle(1, 0x4488bb, 0.5);
    carGfx.beginPath();
    carGfx.moveTo(cx - 165, carRoofY);
    carGfx.lineTo(cx + 165, carRoofY);
    carGfx.strokePath();
    // Subtle primary glow on roof
    this.add.rectangle(cx, carY - 21, 330, 50, 0x508eff, 0.04).setDepth(13);

    // ── Flashlight ──
    this.flashGfx = this.add.graphics().setDepth(10);
    this.flashX = -250;
    this.flashDir = 1;
    this.flashSpeed = 140;

    // ── Danger glow ──
    this.dangerGlow = this.add.rectangle(cx, cy, W, H, 0xff2200, 0)
      .setDepth(11).setBlendMode(Phaser.BlendModes.ADD);

    // ── Rain ──
    this.rainGfx = this.add.graphics().setDepth(3);
    this.drops = Array.from({ length: 40 }, () => ({
      x: Phaser.Math.Between(0, W),
      y: Phaser.Math.Between(0, H),
      speed: Phaser.Math.FloatBetween(6, 11),
      len: Phaser.Math.Between(10, 18),
    }));

    // ── Puddles ──
    this.puddleGfx = this.add.graphics().setDepth(4);
    this.drawPuddles();

    // ── State ──
    this.gameState = 'dash';
    this.progress  = 0;
    this.tension   = 0;
    this.score     = 0;
    this.timeLeft  = 20;
    this.isDown    = false;
    this.detections = 0;
    this.patrolsDone = 0;
    this.TOTAL_PATROLS = 3;
    this.BAR_W = 240;

    // ── Audio ──
    this._hbInterval = null;

    // ── Input (DOM button + canvas) ──
    const onDown = (e) => {
      if (e) e.preventDefault();
      audio.unlock(); // unlock AudioContext on first gesture
      this.onDown();
    };
    const onUp = () => this.onUp();
    $btn.addEventListener('pointerdown', onDown);
    $btn.addEventListener('pointerup', onUp);
    $btn.addEventListener('pointerleave', onUp);
    this.input.on('pointerdown', () => { audio.unlock(); this.onDown(); });
    this.input.on('pointerup',   () => this.onUp());

    // ── Timer ──
    this.clockEvent = this.time.addEvent({
      delay: 1000, repeat: 19,
      callback: () => {
        if (this.gameState === 'done') return;
        this.timeLeft = Math.max(0, this.timeLeft - 1);
        $timer.textContent = String(this.timeLeft);
        if (this.timeLeft <= 5) {
          $timer.style.color = '#ff6644';
          audio.tick();
        }
        if (this.timeLeft <= 0) this.endGame();
      },
    });

    // Start BGM + rain on first interaction
    this._audioStarted = false;

    this.schedulePatrol(3800);
    this.syncUI();
  }

  // ── UI sync ──
  syncUI() {
    const escPct = Math.round((this.progress / this.BAR_W) * 100);
    $escBar.style.width = escPct + '%';
    $escPct.textContent = escPct + '%';
    const tensPct = Math.round((this.tension / this.BAR_W) * 100);
    $tensBar.style.width = tensPct + '%';
    if (tensPct > 70) $tensLvl.textContent = 'Critical';
    else if (tensPct > 40) $tensLvl.textContent = 'High';
    else if (tensPct > 15) $tensLvl.textContent = 'Medium';
    else $tensLvl.textContent = 'Low';
  }

  setDashMode() {
    $statusLabel.textContent = 'Status: Safe';
    $statusLabel.style.color = 'rgba(174,198,255,0.7)';
    $status.textContent = COPY.statusDash;
    $status.style.color = '';
    $btn.classList.remove('hide-mode');
    $btnIcon.textContent = 'directions_run';
    $btnLabel.textContent = '快跑';
  }

  setHideMode() {
    $statusLabel.textContent = 'Status: Danger';
    $statusLabel.style.color = 'rgba(255,86,51,0.8)';
    $status.textContent = COPY.statusHide;
    $status.style.color = '#ff5633';
    $btn.classList.add('hide-mode');
    $btnIcon.textContent = 'favorite';
    $btnLabel.textContent = '屏住';
  }

  // ── Input ──
  onDown() {
    if (this.gameState === 'done') return;
    this.isDown = true;
    // Start ambient audio on first interaction
    if (!this._audioStarted) {
      this._audioStarted = true;
      audio.bgm('tense');
      audio.rain();
    }
    if (this.gameState === 'dash') {
      audio.tap();
      this.progress = Math.min(this.BAR_W, this.progress + 16);
      this.score += 3;
      if (this.progress >= this.BAR_W) this.endGame();
    } else if (this.gameState === 'hide') {
      audio.heartbeat();
      this.tension = Math.min(this.BAR_W, this.tension + 26);
      this.cameras.main.shake(80, 0.006);
      if (this.tension >= this.BAR_W) {
        this.detections++;
        this.tension = 0;
        this.score = Math.max(0, this.score - 30);
        this.cameras.main.shake(350, 0.02);
        audio.fail();
      }
    }
    this.syncUI();
  }

  onUp() { this.isDown = false; }

  // ── Patrol ──
  schedulePatrol(delay) {
    if (this.patrolsDone >= this.TOTAL_PATROLS) return;
    this.time.delayedCall(delay, () => {
      if (this.gameState === 'done') return;
      this.startPatrol();
    });
  }

  startPatrol() {
    this.gameState = 'hide';
    this.patrolsDone++;
    this.flashX = -260;
    this.flashDir = 1;
    this.flashSpeed = 130 + this.patrolsDone * 25;
    this.setHideMode();
    audio.alert();
    // Looping heartbeat during patrol
    this._hbInterval = setInterval(() => { if (this.gameState === 'hide') audio.heartbeat(); }, 900);

    const patrolDuration = 4200 + this.patrolsDone * 400;
    this.time.delayedCall(patrolDuration, () => {
      if (this.gameState !== 'hide') return;
      this.endPatrol();
    });
  }

  endPatrol() {
    this.gameState = 'moment';
    this.flashGfx.clear();
    this.dangerGlow.setAlpha(0);
    this.score += 25;
    if (this._hbInterval) { clearInterval(this._hbInterval); this._hbInterval = null; }
    audio.success();
    audio.stopBgm(300);
    audio.bgm('romantic');

    this.showMoment(COPY.moments[Math.min(this.patrolsDone - 1, COPY.moments.length - 1)], () => {
      audio.stopBgm(300);
      audio.bgm('tense');
      if (this.patrolsDone < this.TOTAL_PATROLS) {
        this.gameState = 'dash';
        this.setDashMode();
        this.schedulePatrol(3200 - this.patrolsDone * 200);
      } else {
        this.gameState = 'dash';
        audio.stopBgm(300);
        audio.bgm('action');
        $status.textContent = '快了！最后冲刺！';
        $status.style.color = '#ffd9a8';
        $statusLabel.textContent = 'Status: Final Sprint';
        $btn.classList.remove('hide-mode');
        $btnIcon.textContent = 'directions_run';
        $btnLabel.textContent = '快跑';
      }
    });
  }

  showMoment(text, onDone) {
    $statusLabel.textContent = 'Status: Intimate';
    $statusLabel.style.color = 'rgba(229,193,145,0.8)';
    $status.textContent = COPY.statusMoment;

    // Update progress dots
    const dots = [document.getElementById('dot-1'), document.getElementById('dot-2'), document.getElementById('dot-3')];
    dots.forEach((d, i) => d.classList.toggle('dim', i >= this.patrolsDone));

    $momentText.textContent = text;
    $moment.classList.add('active');

    // Aiden leans in
    this.tweens.add({
      targets: this.aidenSpr, x: this.aidenBase.x + 22,
      duration: 500, ease: 'Sine.easeInOut', yoyo: true, hold: 1600,
    });

    this.time.delayedCall(2400, () => {
      $moment.classList.remove('active');
      this.time.delayedCall(400, () => { if (onDone) onDone(); });
    });
  }

  // ── End ──
  endGame() {
    if (this.gameState === 'done') return;
    this.gameState = 'done';
    this.clockEvent.remove();
    this.flashGfx.clear();
    this.dangerGlow.setAlpha(0);
    if (this._hbInterval) { clearInterval(this._hbInterval); this._hbInterval = null; }
    audio.stopAll();

    const penalty = this.detections * 28;
    const bonus   = this.timeLeft * 4;
    const final   = Math.max(0, Math.round(this.score - penalty + bonus));

    let rating, mod;
    if (final >= 160)      { rating = 'S'; mod = 3; }
    else if (final >= 100) { rating = 'A'; mod = 1; }
    else if (final >= 55)  { rating = 'B'; mod = 0; }
    else                   { rating = 'C'; mod = -1; }

    // Result sound
    if (rating === 'S' || rating === 'A') { audio.success(); }
    else { audio.fail(); }

    const attribute = CTX.attribute || '意志';
    const FLAVOUR = {
      S: '完美藏匿，连心跳都学会了撒谎。',
      A: '险象环生，却始终没有暴露。',
      B: '有点慌乱，但最终还是逃了出来。',
      C: '被发现了……好在 Aiden 拉住了你。',
    };

    document.getElementById('res-rating').textContent = rating;
    document.getElementById('res-rating').className = 'result-rating ' + rating;
    document.getElementById('res-score').textContent = final + ' pts';
    const modStr = mod > 0 ? `${attribute} +${mod}` : mod === 0 ? `${attribute} ±0` : `${attribute} ${mod}`;
    document.getElementById('res-attr-text').textContent = modStr;
    document.getElementById('res-flavor').textContent = `"${FLAVOUR[rating]}"`;
    $result.classList.add('active');

    document.getElementById('res-btn').onclick = () => {
      const payload = { rating, score: final, attribute, modifier: mod, gameId: 'parking-chase' };
      try { webkit.messageHandlers.jsBridge.postMessage(payload); } catch (_) {}
      try { window.jsBridge.postMessage(JSON.stringify(payload)); } catch (_) {}
      try { window.parent.postMessage({ type: 'gameComplete', ...payload }, '*'); } catch (_) {}
    };
  }

  // ── Update ──
  update(time, delta) {
    const dt = delta / 1000;
    this.updateRain(dt);

    if (this.gameState === 'hide') {
      this.flashX += this.flashDir * this.flashSpeed * dt;
      if (this.flashX > W + 260) this.flashDir = -1;
      if (this.flashX < -260)    this.flashDir = 1;
      this.drawFlashlight();

      const dist = Math.abs(this.flashX - W / 2);
      const prox = Phaser.Math.Clamp(1 - dist / 200, 0, 1);
      this.dangerGlow.setAlpha(prox * 0.20);

      if (!this.isDown) {
        this.tension = Math.max(0, this.tension - 0.8);
      }
      if (!this.isDown) this.score += dt * 2;
    } else {
      this.flashGfx.clear();
      this.dangerGlow.setAlpha(0);
    }

    if (this.gameState !== 'hide') {
      this.tension = Math.max(0, this.tension - 1.5);
    }

    this.syncUI();
  }

  // ── Drawing ──
  drawFlashlight() {
    const g = this.flashGfx;
    g.clear();
    const x = this.flashX, y = H * 0.38;
    const len = 340, ang = 0.32;

    g.fillStyle(0xffffff, 0.04);
    g.beginPath(); g.moveTo(x, y);
    g.lineTo(x + Math.cos(-ang) * len, y + Math.sin(-ang) * len + 60);
    g.lineTo(x + Math.cos(ang) * len, y + Math.sin(ang) * len + 60);
    g.closePath(); g.fillPath();

    g.fillStyle(0xddeeff, 0.09);
    g.beginPath(); g.moveTo(x, y);
    g.lineTo(x + Math.cos(-ang * 0.5) * len * 0.85, y + Math.sin(-ang * 0.5) * len * 0.85 + 30);
    g.lineTo(x + Math.cos(ang * 0.5) * len * 0.85, y + Math.sin(ang * 0.5) * len * 0.85 + 30);
    g.closePath(); g.fillPath();

    g.fillStyle(0xffffff, 0.18);
    g.beginPath(); g.moveTo(x, y);
    g.lineTo(x + Math.cos(-ang * 0.18) * len * 0.65, y + Math.sin(-ang * 0.18) * len * 0.65 + 15);
    g.lineTo(x + Math.cos(ang * 0.18) * len * 0.65, y + Math.sin(ang * 0.18) * len * 0.65 + 15);
    g.closePath(); g.fillPath();

    g.fillStyle(0xffffff, 0.55);
    g.fillCircle(x, y, 5);
    g.fillStyle(0xaaddff, 0.25);
    g.fillCircle(x, y, 12);
  }

  drawPuddles() {
    const g = this.puddleGfx;
    const puddles = [
      { x: 80,  y: H - 200, rx: 45, ry: 10 },
      { x: 280, y: H - 230, rx: 38, ry:  8 },
      { x: 190, y: H - 180, rx: 55, ry: 11 },
    ];
    puddles.forEach(p => {
      g.fillStyle(0x0a1a2e, 0.5);
      g.fillEllipse(p.x, p.y, p.rx * 2, p.ry * 2);
      g.lineStyle(1, 0x3366aa, 0.2);
      g.strokeEllipse(p.x, p.y, p.rx * 2, p.ry * 2);
    });
  }

  updateRain(dt) {
    const g = this.rainGfx;
    g.clear();
    for (const d of this.drops) {
      d.y += d.speed;
      d.x -= d.speed * 0.25;
      if (d.y > H + 10) { d.y = -10; d.x = Phaser.Math.Between(0, W); }
      g.lineStyle(1, 0x88aacc, 0.18);
      g.beginPath(); g.moveTo(d.x, d.y);
      g.lineTo(d.x - d.len * 0.25, d.y + d.len);
      g.strokePath();
    }
  }
}

// ── Boot ──
window.__GAME__ = new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  parent: 'game-wrap',
  transparent: true,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [BootScene, GameScene],
});
</script>
</body>
</html>
