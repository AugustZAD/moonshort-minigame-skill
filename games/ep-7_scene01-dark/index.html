// ── Host context ─────────────────────────────────────────────────────────────
const CTX = window.__EPISODE_CTX__ || {};
const params = new URLSearchParams(window.location.search);
const ATTRIBUTE = CTX.attribute || params.get('attribute') || '魅力';
const PRIMARY_COLOR = CTX.primaryColor || params.get('primaryColor') || '#F472B6';

const RATING_THRESHOLDS = { S: 220, A: 160, B: 110, C: 70 };
const MODIFIER_BY_RATING = { S: 3, A: 1, B: 0, C: -1 };

function getRating(score) {
  if (score >= RATING_THRESHOLDS.S) return 'S';
  if (score >= RATING_THRESHOLDS.A) return 'A';
  if (score >= RATING_THRESHOLDS.B) return 'B';
  return 'C';
}

function getModifier(rating) {
  return MODIFIER_BY_RATING[rating];
}

function notifyGameComplete(result) {
  const payload = JSON.stringify(result);
  if (window.webkit?.messageHandlers?.jsBridge) {
    window.webkit.messageHandlers.jsBridge.postMessage(payload); return;
  }
  if (window.jsBridge?.postMessage) {
    window.jsBridge.postMessage(payload); return;
  }
  if (window.parent !== window) {
    window.parent.postMessage(payload, '*'); return;
  }
  console.log('[GameComplete]', result);
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function hexToRgb(hex) {
  const raw = hex.replace('#', '');
  const full = raw.length === 3 ? raw.split('').map(c => c + c).join('') : raw;
  const v = parseInt(full, 16);
  return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
}

function rgbToHex(r, g, b) {
  const h = n => clamp(Math.round(n), 0, 255).toString(16).padStart(2, '0');
  return '#' + h(r) + h(g) + h(b);
}

function blendHex(a, b, t) {
  const ca = hexToRgb(a), cb = hexToRgb(b);
  return rgbToHex(ca.r + (cb.r - ca.r) * t, ca.g + (cb.g - ca.g) * t, ca.b + (cb.b - ca.b) * t);
}

function hexToInt(hex) { return parseInt(hex.replace('#', ''), 16); }

  WIL: { bgBase:'#F5F0FA', primary:'#8B5CF6', secondary:'#6D28D9', accentGold:'#C084FC', accentRed:'#DC2626', trackBg:'#E4D9F0', trackBorder:'#C9B8DE', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textDark:'#1A1028', textMuted:'#6E6A80', bgmStyle:'tense' },
  INT: { bgBase:'#EFF6FF', primary:'#3B82F6', secondary:'#0EA5E9', accentGold:'#67E8F9', accentRed:'#EF4444', trackBg:'#DBEAFE', trackBorder:'#BFDBFE', success:'#38C97A', warning:'#FFB347', danger:'#FF4D6A', textDark:'#0F172A', textMuted:'#64748B', bgmStyle:'mystery' },

function resolveTheme() {
  const a = (ATTRIBUTE || '').toLowerCase();
  if (/身手|atk|attack|agility/i.test(a)) return ATTR_THEMES.ATK;
  if (/意志|wil/i.test(a)) return ATTR_THEMES.WIL;
  if (/智慧|int|wisdom/i.test(a)) return ATTR_THEMES.INT;
  if (/魅力|cha|charm/i.test(a)) return ATTR_THEMES.CHA;
  return ATTR_THEMES.CHA;
}

// ── MoonAudio Engine ─────────────────────────────────────────────────────────
class MoonAudio {
  constructor() { this._ctx = null; this._master = null; this._bgmNodes = []; this._unlocked = false; }
  _ensure() {
    if (this._ctx) return this._ctx;
    this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    this._master = this._ctx.createGain();
    this._master.gain.value = 0.5;
    this._master.connect(this._ctx.destination);
    return this._ctx;
  }
  unlock() {
    if (this._unlocked) return;
    this._ensure();
    if (this._ctx.state === 'suspended') this._ctx.resume();
    this._unlocked = true;
  }
  tap() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.08);
    g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.1);
  }
  success() {
    const ctx = this._ensure(), t = ctx.currentTime;
    [523, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, t + i * 0.12);
      g.gain.linearRampToValueAtTime(0.22, t + i * 0.12 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
      osc.connect(g).connect(this._master); osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.3);
    });
  }
  fail() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t);
    osc.frequency.linearRampToValueAtTime(80, t + 0.25);
    g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.3);
  }
  alert() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(220, t + 0.15);
    g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.2);
  }
  swoosh() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const len = ctx.sampleRate * 0.15, buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.setValueAtTime(2000, t);
    f.frequency.exponentialRampToValueAtTime(500, t + 0.15); f.Q.value = 2;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.connect(f).connect(g).connect(this._master); src.start(t);
  }
  heartbeat() {
    const ctx = this._ensure(), t = ctx.currentTime;
    [0, 0.18].forEach(off => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(60, t + off);
      osc.frequency.exponentialRampToValueAtTime(30, t + off + 0.15);
      g.gain.setValueAtTime(0.3, t + off); g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.2);
      osc.connect(g).connect(this._master); osc.start(t + off); osc.stop(t + off + 0.2);
    });
  }
  tick() {
    const ctx = this._ensure(), t = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 1000;
    g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    osc.connect(g).connect(this._master); osc.start(t); osc.stop(t + 0.06);
  }
  bgm(style) {
    this.stopBgm();
    const ctx = this._ensure();
    const PROG = {
      action: [[164.81,196,246.94],[174.61,220,261.63],[146.83,174.61,220],[155.56,196,246.94]],
      tense: [[130.81,155.56,196],[123.47,146.83,185],[116.54,138.59,174.61],[123.47,146.83,185]],
      romantic: [[261.63,329.63,392],[293.66,349.23,440],[246.94,311.13,369.99],[261.63,329.63,392]],
      mystery: [[146.83,174.61,220],[138.59,164.81,207.65],[130.81,155.56,196],[138.59,174.61,220]],
    };
    const chords = PROG[style] || PROG.tense;
    const beat = style === 'action' ? 0.8 : 1.2;
    const loopLen = chords.length * beat;
    const mg = ctx.createGain(); mg.gain.value = 0;
    mg.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 1);
    mg.connect(this._master);
    const sched = () => {
      const now = ctx.currentTime;
      chords.forEach((ch, ci) => {
        const ct = now + ci * beat;
        ch.forEach(freq => {
          const o = ctx.createOscillator(), e = ctx.createGain();
          o.type = style === 'romantic' ? 'sine' : style === 'action' ? 'sawtooth' : 'triangle';
          o.frequency.value = freq;
          e.gain.setValueAtTime(0, ct);
          e.gain.linearRampToValueAtTime(0.06, ct + 0.05);
          e.gain.setValueAtTime(0.06, ct + beat * 0.7);
          e.gain.linearRampToValueAtTime(0, ct + beat);
          o.connect(e).connect(mg); o.start(ct); o.stop(ct + beat);
        });
        const b = ctx.createOscillator(), be = ctx.createGain();
        b.type = 'sine'; b.frequency.value = ch[0] / 2;
        be.gain.setValueAtTime(0, ct);
        be.gain.linearRampToValueAtTime(0.1, ct + 0.03);
        be.gain.setValueAtTime(0.1, ct + beat * 0.5);
        be.gain.linearRampToValueAtTime(0, ct + beat);
        b.connect(be).connect(mg); b.start(ct); b.stop(ct + beat);
      });
    };
    sched();
    const iid = setInterval(() => {
      if (!this._ctx || this._ctx.state === 'closed') { clearInterval(iid); return; }
      sched();
    }, loopLen * 1000);
    this._bgmNodes.push({ masterGain: mg, intervalId: iid });
  }
  stopBgm(fadeMs) {
    const fade = (fadeMs || 500) / 1000;
    if (!this._ctx) return;
    const t = this._ctx.currentTime;
    for (const n of this._bgmNodes) {
      if (n.intervalId) clearInterval(n.intervalId);
      if (n.masterGain) n.masterGain.gain.linearRampToValueAtTime(0, t + fade);
    }
    this._bgmNodes = [];
  }
  stopAll() { this.stopBgm(200); }
}

const audio = new MoonAudio();

// ── Helpers ──────────────────────────────────────────────────────────────────
function drawRRect(gfx, x, y, w, h, r) {
  gfx.beginPath(); gfx.moveTo(x + r, y); gfx.lineTo(x + w - r, y);
  gfx.arc(x + w - r, y + r, r, -Math.PI / 2, 0); gfx.lineTo(x + w, y + h - r);
  gfx.arc(x + w - r, y + h - r, r, 0, Math.PI / 2); gfx.lineTo(x + r, y + h);
  gfx.arc(x + r, y + h - r, r, Math.PI / 2, Math.PI); gfx.lineTo(x, y + r);
  gfx.arc(x + r, y + r, r, Math.PI, -Math.PI / 2); gfx.closePath();
}

function spawnParticles(scene, x, y, color, count, life) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = 80 + Math.random() * 120;
    const sz = 3 + Math.random() * 4;
    const p = scene.add.circle(x, y, sz, color, 1).setDepth(50);
    scene.tweens.add({ targets: p, x: x + Math.cos(angle) * speed, y: y + Math.sin(angle) * speed, alpha: 0, scaleX: 0.2, scaleY: 0.2, duration: life || 400, ease: 'Quad.easeOut', onComplete: () => p.destroy() });
  }
}

function showToast(scene, text, colorHex, x, y) {
  const t = scene.add.text(x, y, text, { fontFamily: 'Nunito', fontSize: '28px', fontStyle: '900', color: colorHex, stroke: '#ffffff', strokeThickness: 4 }).setOrigin(0.5).setDepth(60).setAlpha(0);
  scene.tweens.add({ targets: t, y: y - 30, alpha: 1, duration: 200, ease: 'Back.easeOut', onComplete: () => { scene.time.delayedCall(600, () => { scene.tweens.add({ targets: t, y: y - 50, alpha: 0, duration: 200, onComplete: () => t.destroy() }); }); } });
}

function damageFlash(scene) {
  const flash = scene.add.rectangle(W / 2, H / 2, W, H, 0xff4d6a, 0).setDepth(80);
  scene.tweens.add({ targets: flash, alpha: 0.3, yoyo: true, duration: 80, onComplete: () => flash.destroy() });
}

function screenShake(scene, intensity) { scene.cameras.main.shake(150, intensity || 0.008); }

function drawGoldCorners(scene, cx, cy, cw, ch, radius, depth) {
  const r = radius || 7, d = depth || 16, inset = r + 4;
  [[cx - cw/2 + inset, cy - ch/2 + inset],[cx + cw/2 - inset, cy - ch/2 + inset],[cx - cw/2 + inset, cy + ch/2 - inset],[cx + cw/2 - inset, cy + ch/2 - inset]].forEach(([px, py]) => {
    scene.add.circle(px, py, r, CC.accentGold, 1).setDepth(d);
    scene.add.circle(px - 1, py - 1, r * 0.4, 0xffffff, 0.5).setDepth(d + 1);
  });
}

function drawCandyCard(scene, cx, cy, cw, ch, bgColor, depth) {
  const d = depth || 14, r = 24;
  const sg = scene.add.graphics().setDepth(d);
  sg.fillStyle(0x000000, 0.06); sg.fillRoundedRect(cx - cw/2 + 3, cy - ch/2 + 5, cw, ch, r);
  sg.fillStyle(0x000000, 0.04); sg.fillRoundedRect(cx - cw/2 + 1, cy - ch/2 + 3, cw, ch, r);
  const bg = scene.add.graphics().setDepth(d + 1);
  bg.fillStyle(bgColor, 1); bg.fillRoundedRect(cx - cw/2, cy - ch/2, cw, ch, r);
  return bg;
}

function makeButton(scene, cfg) {
  const { x, y, w, label, fontSize, onTap, icon } = cfg;
  const h = cfg.h || 64, r = 22, slabH = 7;
  const container = scene.add.container(x, y).setDepth(20);
  const slabGfx = scene.add.graphics(); slabGfx.fillStyle(CC.candy_btnSlab, 1); drawRRect(slabGfx, -w/2, -h/2 + slabH, w, h, r); slabGfx.fillPath(); container.add(slabGfx);
  const bodyGfx = scene.add.graphics(); bodyGfx.fillStyle(CC.candy_btnBottom, 1); drawRRect(bodyGfx, -w/2, -h/2, w, h, r); bodyGfx.fillPath(); container.add(bodyGfx);
  const topGfx = scene.add.graphics(); topGfx.fillStyle(CC.candy_btnTop, 1); drawRRect(topGfx, -w/2, -h/2, w, h * 0.55, r); topGfx.fillPath(); container.add(topGfx);
  const glossGfx = scene.add.graphics(); glossGfx.fillStyle(0xffffff, 0.28); drawRRect(glossGfx, -w/2 + 4, -h/2 + 3, w - 8, h * 0.30, r - 4); glossGfx.fillPath(); container.add(glossGfx);
  if (icon) { container.add(scene.add.text(-w/4 + 4, 0, icon, { fontFamily:'Nunito', fontSize:'22px', fontStyle:'900', color:'#ffffff' }).setOrigin(0.5)); }
  container.add(scene.add.text(icon ? 8 : 0, 0, label.toUpperCase(), { fontFamily:'Nunito', fontSize:(fontSize||20)+'px', fontStyle:'900', color:'#ffffff', stroke:'rgba(0,0,0,0.15)', strokeThickness:1, letterSpacing:2 }).setOrigin(0.5));
  const hit = scene.add.rectangle(0, 0, w, h + slabH + 4).setOrigin(0.5).setInteractive({ useHandCursor: true }).setAlpha(0.001);
  container.add(hit);
  hit.on('pointerdown', () => { container.setPosition(x, y + slabH - 1); slabGfx.setVisible(false); audio.tap(); });
  hit.on('pointerup', () => { container.setPosition(x, y); slabGfx.setVisible(true); if (onTap) onTap(); });
  hit.on('pointerout', () => { container.setPosition(x, y); slabGfx.setVisible(true); });
  return container;
}

function createTimerBar(scene, y, w) {
  const h = 8, barObj = { maxW: w };
  const tg = scene.add.graphics().setDepth(5); tg.fillStyle(CC.trackBg, 1); tg.fillRoundedRect(W/2 - w/2, y, w, h, h/2);
  barObj.gfx = scene.add.graphics().setDepth(6); barObj.y = y; barObj.h = h;
  barObj.update = function(ratio) {
    barObj.gfx.clear(); const r = clamp(ratio, 0, 1);
    let col; if (r > 0.33) col = CC.success; else if (r > 0.15) col = CC.warning; else col = CC.danger;
    const fw = barObj.maxW * r;
    barObj.gfx.fillStyle(col, 1); barObj.gfx.fillRoundedRect(W/2 - barObj.maxW/2, barObj.y, fw, barObj.h, barObj.h/2);
    if (fw > 10) { barObj.gfx.fillStyle(0xffffff, 0.3); barObj.gfx.fillRoundedRect(W/2 - barObj.maxW/2 + 2, barObj.y + 1, fw - 4, 3, 1.5); }
  };
  barObj.update(1); return barObj;
}

function drawSceneBg(scene, sceneKey, dotOpacity) {
  scene.cameras.main.setBackgroundColor(PALETTE.bgBase);
  const bgAssetKey = 'ep_bg_' + sceneKey;
  if (EP && EP.backgrounds && scene.textures.exists(bgAssetKey)) {
    const tex = scene.textures.get(bgAssetKey).getSourceImage();
    const scale = Math.max(W / tex.width, H / tex.height);
    scene.add.image(W / 2, H / 2, bgAssetKey)
      .setScale(scale).setDepth(0).setAlpha(EP.backgrounds.opacity || 0.25);
    if (EP.backgrounds.overlay) {
      scene.add.rectangle(W / 2, H / 2, W, H,
        hexToInt(EP.backgrounds.overlay), EP.backgrounds.overlayAlpha || 0.4)
        .setDepth(0.5);
    }
  }
  drawDotPattern(scene, dotOpacity);
}

function drawDotPattern(scene, opacity) {
  const dots = scene.add.graphics().setDepth(0); dots.fillStyle(CC.primary, opacity || 0.05);
  for (let bx = 20; bx < W; bx += 28) { for (let by = 18; by < H; by += 30) { dots.fillCircle(bx + ((by/30) % 2 ? 5 : -3), by, 2); } }
}

//  BOOT SCENE
// ══════════════════════════════════════════════════════════════════════════════
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  preload() {
    Object.entries(EP.assets).forEach(([key, path]) => { this.load.image('ep_' + key, path); });
    if (EP.backgrounds) {
      Object.entries(EP.backgrounds).forEach(([key, path]) => {
        if (typeof path === 'string' && path.match(/\.(jpg|png|webp)$/i)) {
          this.load.image('ep_bg_' + key, path);
        }
      });
    }
  }
  create() {
    drawSceneBg(this, 'boot', 0.04);
    this.add.text(W/2, H*0.26, EP.subtitle || 'Spotlight Seek', { fontFamily:'Nunito', fontSize:'38px', fontStyle:'900', color:PALETTE.primary, stroke:PALETTE.primaryDark, strokeThickness:4 }).setOrigin(0.5).setDepth(10);
    this.add.text(W/2, H*0.32, DISPLAY_ATTRIBUTE + ' Challenge', { fontFamily:'Patrick Hand', fontSize:'18px', color:PALETTE.textMuted }).setOrigin(0.5);
    const cardX = W/2, cardY = H*0.50, cardW = W - 54, cardH = 180;
    drawCandyCard(this, cardX, cardY, cardW, cardH, CC.candy_cardPink, 5);
    drawGoldCorners(this, cardX, cardY, cardW, cardH, 7, 8);
    this.add.text(cardX, cardY, '在黑暗中移动目光\n找到闪过的线索\n速度会越来越快！', { fontFamily:'Patrick Hand', fontSize:'16px', color:PALETTE.textDark, align:'center', lineSpacing:8, wordWrap:{width:cardW-40} }).setOrigin(0.5).setDepth(10);
    makeButton(this, { x:W/2, y:H*0.72, w:200, h:66, label:'START', fontSize:26, onTap:() => { audio.unlock(); this.scene.start('NarrativeScene'); } });
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  NARRATIVE SCENE
// ══════════════════════════════════════════════════════════════════════════════
class NarrativeScene extends Phaser.Scene {
  constructor() { super('NarrativeScene'); }
  create() {
    drawSceneBg(this, 'narrative', 0.02);
    const lines = EP.narrative;
    let lineIdx = 0, typing = false, charIdx = 0, fullText = '';

    this.add.text(W/2, 38, EP.title, { fontFamily:'Nunito', fontSize:'16px', fontStyle:'700', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(10);

    const portraitY = H * 0.32, portraitW = 240, portraitH = 320;
    drawCandyCard(this, W/2, portraitY, portraitW + 16, portraitH + 16, CC.white, 4);
    drawGoldCorners(this, W/2, portraitY, portraitW + 16, portraitH + 16, 6, 7);

    const maskShape = this.make.graphics({ x:0, y:0, add:false });
    maskShape.fillStyle(0xffffff);
    maskShape.fillRoundedRect(W/2 - portraitW/2, portraitY - portraitH/2, portraitW, portraitH, 18);
    const mask = maskShape.createGeometryMask();

    // White backing for transparent PNGs
    const backing = this.add.graphics().setDepth(4);
    backing.fillStyle(0xffffff, 1);
    backing.fillRoundedRect(W/2 - portraitW/2, portraitY - portraitH/2, portraitW, portraitH, 18);

    const portraitImg = this.add.image(W/2, portraitY - portraitH/2 + 8, 'ep_' + lines[0].key).setOrigin(0.5, 0).setDepth(5);
    const tex = this.textures.get('ep_' + lines[0].key);
    const frame = tex.getSourceImage();
    portraitImg.setScale(portraitW / frame.width).setMask(mask);

    const speakerText = this.add.text(W/2, portraitY + portraitH/2 + 18, lines[0].speaker, { fontFamily:'Nunito', fontSize:'18px', fontStyle:'900', color:EP.characters[lines[0].key]?.color || PALETTE.primary }).setOrigin(0.5).setDepth(10);

    const dlgY = H * 0.78, dlgW = W - 40, dlgH = 110;
    drawCandyCard(this, W/2, dlgY, dlgW, dlgH, hexToInt(blendHex(PALETTE.bgBase, '#ffffff', 0.5)), 8);
    drawGoldCorners(this, W/2, dlgY, dlgW, dlgH, 5, 10);

    const dlgText = this.add.text(W/2, dlgY - 8, '', { fontFamily:'Patrick Hand', fontSize:'17px', color:PALETTE.textDark, align:'center', lineSpacing:6, wordWrap:{width:dlgW-40} }).setOrigin(0.5).setDepth(12);
    const hintText = this.add.text(W/2, dlgY + dlgH/2 - 12, 'Tap to continue', { fontFamily:'Patrick Hand', fontSize:'13px', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(12).setAlpha(0);
    this.tweens.add({ targets:hintText, alpha:0.6, yoyo:true, repeat:-1, duration:800 });

    const typeSpeed = 30;
    let typeTimer = null;

    const startTyping = () => {
      const line = lines[lineIdx];
      fullText = line.text; charIdx = 0; typing = true;
      hintText.setAlpha(0); dlgText.setText('');
      const newKey = 'ep_' + line.key;
      if (this.textures.exists(newKey)) {
        const newTex = this.textures.get(newKey).getSourceImage();
        portraitImg.setTexture(newKey).setScale(portraitW / newTex.width).setY(portraitY - portraitH/2 + 8);
      }
      speakerText.setText(line.speaker);
      speakerText.setColor(EP.characters[line.key]?.color || PALETTE.primary);
      portraitImg.setAlpha(0.5);
      this.tweens.add({ targets:portraitImg, alpha:1, duration:200 });
      typeTimer = this.time.addEvent({ delay:typeSpeed, repeat:fullText.length - 1, callback:() => {
        charIdx++; dlgText.setText(fullText.slice(0, charIdx));
        if (charIdx >= fullText.length) { typing = false; hintText.setAlpha(0.6); }
      }});
    };

    this.input.on('pointerdown', () => {
      audio.tap();
      if (typing) { if (typeTimer) typeTimer.remove(false); charIdx = fullText.length; dlgText.setText(fullText); typing = false; hintText.setAlpha(0.6); return; }
      lineIdx++;
      if (lineIdx >= lines.length) { this.cameras.main.fadeOut(400, 0, 0, 0); this.time.delayedCall(450, () => { this.scene.start('GameScene'); }); return; }
      startTyping();
    });

    startTyping();
    audio.bgm('tense');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  GAME SCENE
// ══════════════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }
  init() {
    this.score = 0; this.timeLeft = ROUND_SECONDS; this.isOver = false;
    this.cells = []; this.targetIndex = Math.floor(Math.random() * 9);
    this.phase = 'show'; this.showMs = 800; this.round = 1;
    this.combo = 0; this.maxCombo = 0; this.totalHits = 0; this.totalMiss = 0;
    this.lastTickSec = -1; this.audioStarted = false; this.difficulty = 1;
    this.decoyCount = 0; this.inputWindowMs = 3000; this.inputTimer = 0;
  }
  create() {
    drawSceneBg(this, 'game', 0.03);
    this.timerBar = createTimerBar(this, 0, W);

    this.add.text(W/2, 32, EP.subtitle || 'Spotlight Seek', { fontFamily:'Nunito', fontSize:'22px', fontStyle:'900', color:PALETTE.textDark }).setOrigin(0.5).setDepth(16);
    this.add.text(W/2, 56, DISPLAY_ATTRIBUTE + ' check', { fontFamily:'Patrick Hand', fontSize:'16px', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(16);

    // Score pill
    const ss = this.add.graphics().setDepth(9); ss.fillStyle(0x000000, 0.05); drawRRect(ss, 17, 79, 100, 32, 16); ss.fillPath();
    const sg = this.add.graphics().setDepth(10); sg.fillStyle(CC.white, 0.92); drawRRect(sg, 16, 76, 100, 32, 16); sg.fillPath();
    this.scoreText = this.add.text(66, 92, '0', { fontFamily:'Nunito', fontSize:'16px', fontStyle:'900', color:PALETTE.textDark }).setOrigin(0.5).setDepth(11);

    // Timer pill
    const ts = this.add.graphics().setDepth(9); ts.fillStyle(0x000000, 0.05); drawRRect(ts, W-115, 79, 100, 32, 16); ts.fillPath();
    const tg = this.add.graphics().setDepth(10); tg.fillStyle(CC.white, 0.92); drawRRect(tg, W-116, 76, 100, 32, 16); tg.fillPath();
    this.timerText = this.add.text(W-66, 92, ROUND_SECONDS+'s', { fontFamily:'Nunito', fontSize:'16px', fontStyle:'900', color:PALETTE.textDark }).setOrigin(0.5).setDepth(11);

    // Main card
    const cardCX = W/2, cardCY = 360, cardW = 330, cardH = 370;
    drawCandyCard(this, cardCX, cardCY, cardW, cardH, CC.candy_cardPink, 3);
    drawGoldCorners(this, cardCX, cardCY, cardW, cardH, 7, 6);

    this.roundText = this.add.text(W/2, 200, 'Round 1', { fontFamily:'Nunito', fontSize:'18px', fontStyle:'900', color:PALETTE.primary }).setOrigin(0.5).setDepth(10);
    this.hintText = this.add.text(W/2, 224, '在黑暗中寻找线索……', { fontFamily:'Patrick Hand', fontSize:'16px', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(10);

    // 3x3 grid
    const sx = 98, sy = 310, gap = 98;
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const idx = r * 3 + c, cx = sx + c * gap, cy = sy + r * gap;
        const cellBg = this.add.graphics().setDepth(8);
        cellBg.fillStyle(CC.trackBg, 1); drawRRect(cellBg, cx-36, cy-36, 72, 72, 12); cellBg.fillPath();
        cellBg.lineStyle(2, CC.trackBorder, 1); drawRRect(cellBg, cx-36, cy-36, 72, 72, 12); cellBg.strokePath();
        const cellOverlay = this.add.graphics().setDepth(9);
        const hitRect = this.add.rectangle(cx, cy, 72, 72).setOrigin(0.5).setAlpha(0.001).setDepth(15).setInteractive({ useHandCursor:true });
        hitRect.on('pointerdown', () => this.pressCell(idx));
        this.cells.push({ bg:cellBg, overlay:cellOverlay, x:cx, y:cy });
      }
    }

    this.statusText = this.add.text(W/2, 550, '仔细观察……', { fontFamily:'Patrick Hand', fontSize:'18px', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(18);
    this.comboText = this.add.text(W/2, 578, '', { fontFamily:'Nunito', fontSize:'20px', fontStyle:'900', color:PALETTE.primary, stroke:'#ffffff', strokeThickness:2 }).setOrigin(0.5).setDepth(18);
    this.inputBarGfx = this.add.graphics().setDepth(10);
    this.paintBoard();
    this.input.once('pointerdown', () => { audio.unlock(); audio.bgm('tense'); this.audioStarted = true; });
  }

  addScore(delta) {
    this.score = Math.max(0, this.score + delta);
    this.scoreText.setText(Math.round(this.score));
    this.tweens.add({ targets:this.scoreText, scaleX:1.2, scaleY:1.2, yoyo:true, duration:120, ease:'Quad.easeOut' });
  }

  paintBoard() {
    for (let i = 0; i < this.cells.length; i++) this.cells[i].overlay.clear();
    if (this.phase === 'show') {
      const target = this.cells[this.targetIndex];
      target.overlay.fillStyle(CC.primary, 0.9); drawRRect(target.overlay, target.x-34, target.y-34, 68, 68, 10); target.overlay.fillPath();
      if (this.decoyCount > 0) {
        const decoys = [];
        while (decoys.length < this.decoyCount) { const di = Math.floor(Math.random()*9); if (di !== this.targetIndex && !decoys.includes(di)) decoys.push(di); }
        decoys.forEach(di => { const d = this.cells[di]; d.overlay.fillStyle(CC.secondary, 0.6); drawRRect(d.overlay, d.x-34, d.y-34, 68, 68, 10); d.overlay.fillPath(); });
      }
    }
  }

  flashCell(idx, color, isSuccess) {
    const cell = this.cells[idx]; if (!cell) return;
    cell.overlay.clear(); cell.overlay.fillStyle(color, 0.8); drawRRect(cell.overlay, cell.x-34, cell.y-34, 68, 68, 10); cell.overlay.fillPath();
    if (isSuccess) spawnParticles(this, cell.x, cell.y, CC.accentGold, 6, 350);
    this.time.delayedCall(240, () => { cell.overlay.clear(); });
  }

  startNewRound() {
    this.targetIndex = Math.floor(Math.random() * 9);
    this.phase = 'show';
    this.showMs = Math.max(200, 800 - this.difficulty * 40);
    this.decoyCount = Math.min(4, Math.floor(this.difficulty / 3));
    this.inputWindowMs = Math.max(1200, 3000 - this.difficulty * 120);
    this.inputTimer = 0;
    audio.alert(); this.paintBoard();
  }

  pressCell(idx) {
    if (this.isOver) return;
    if (!this.audioStarted) { audio.unlock(); audio.bgm('tense'); this.audioStarted = true; }
    if (this.phase !== 'input') {
      this.totalMiss += 1; this.combo = 0; this.addScore(-5);
      showToast(this, '太早了! -5', PALETTE.danger, W/2, 480);
      audio.fail(); screenShake(this, 0.005); this.comboText.setText(''); return;
    }
    if (idx === this.targetIndex) {
      this.flashCell(idx, CC.success, true);
      this.totalHits += 1; this.combo += 1; this.maxCombo = Math.max(this.maxCombo, this.combo);
      const comboBonus = Math.min(this.combo, 5) * 3;
      const gain = 16 + comboBonus;
      this.addScore(gain); this.round += 1;
      this.roundText.setText('Round ' + this.round);
      this.difficulty = Math.min(12, this.difficulty + 0.5);
      const responseRatio = this.inputTimer / this.inputWindowMs;
      if (responseRatio < 0.3) { showToast(this, '\u2726 Perfect +' + gain, PALETTE.success, W/2, 480); spawnParticles(this, W/2, 400, CC.accentGold, 8, 400); }
      else { showToast(this, '找到了! +' + gain, PALETTE.primary, W/2, 480); }
      audio.success();
      this.comboText.setText('Combo x' + this.combo);
      this.tweens.add({ targets:this.comboText, scaleX:1.2, scaleY:1.2, yoyo:true, duration:120, ease:'Quad.easeOut' });
      this.time.delayedCall(300, () => { if (!this.isOver) this.startNewRound(); });
      return;
    }
    this.flashCell(idx, hexToInt(PALETTE.danger), false);
    this.combo = 0; this.totalMiss += 1;
    const penalty = Math.min(12, 6 + Math.floor(this.totalMiss / 4));
    this.addScore(-penalty);
    showToast(this, '看错了! -' + penalty, PALETTE.danger, W/2, 480);
    audio.fail(); damageFlash(this); screenShake(this, 0.01); this.comboText.setText('');
    this.time.delayedCall(500, () => { if (!this.isOver) this.startNewRound(); });
  }

  finishGame(reason) {
    if (this.isOver) return; this.isOver = true; audio.stopBgm(600);
    this.scene.start('ResultScene', { score:Math.round(this.score), maxCombo:this.maxCombo, hits:this.totalHits, misses:this.totalMiss, reason:reason||'time' });
  }

  update(time, delta) {
    if (this.isOver) return;
    this.timeLeft = Math.max(0, this.timeLeft - delta / 1000);
    const sec = Math.ceil(this.timeLeft);
    this.timerText.setText(sec + 's'); this.timerBar.update(this.timeLeft / ROUND_SECONDS);
    if (this.timeLeft <= 10 && sec !== this.lastTickSec && sec > 0) { this.lastTickSec = sec; if (this.timeLeft <= 5) audio.heartbeat(); else audio.tick(); }
    if (this.timeLeft <= 10) this.timerText.setColor(PALETTE.danger); else this.timerText.setColor(PALETTE.textDark);

    if (this.phase === 'show') {
      this.showMs -= delta;
      if (this.showMs <= 0) { this.phase = 'input'; this.inputTimer = 0; this.statusText.setText('点击隐藏的位置!'); this.statusText.setColor(PALETTE.primary); this.paintBoard(); }
    } else if (this.phase === 'input') {
      this.inputTimer += delta;
      this.inputBarGfx.clear();
      const ratio = clamp(1 - this.inputTimer / this.inputWindowMs, 0, 1);
      let barCol; if (ratio > 0.5) barCol = CC.success; else if (ratio > 0.25) barCol = CC.warning; else barCol = CC.danger;
      this.inputBarGfx.fillStyle(CC.trackBg, 1); this.inputBarGfx.fillRoundedRect(W/2-120, 250, 240, 8, 4);
      this.inputBarGfx.fillStyle(barCol, 1); this.inputBarGfx.fillRoundedRect(W/2-120, 250, 240 * ratio, 8, 4);
      if (this.inputTimer >= this.inputWindowMs) {
        this.inputBarGfx.clear(); this.combo = 0; this.totalMiss += 1;
        const penalty = Math.min(10, 4 + Math.floor(this.totalMiss / 3));
        this.addScore(-penalty); showToast(this, '太慢了! -' + penalty, PALETTE.danger, W/2, 480);
        audio.fail(); damageFlash(this); this.comboText.setText('');
        this.time.delayedCall(400, () => { if (!this.isOver) this.startNewRound(); }); this.phase = 'wait';
      }
    }
    if (this.timeLeft <= 0) this.finishGame('time');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  RESULT SCENE
// ══════════════════════════════════════════════════════════════════════════════
class ResultScene extends Phaser.Scene {
  constructor() { super('ResultScene'); }
  init(data) { this.finalScore = data.score||0; this.maxCombo = data.maxCombo||0; this.hits = data.hits||0; this.misses = data.misses||0; }
  create() {
    drawSceneBg(this, 'result', 0.03);
    const rating = getRating(this.finalScore), modifier = getModifier(rating);
    const modText = modifier > 0 ? '+' + modifier : String(modifier);
    const ratingColors = { S:CC.accentGold, A:CC.primary, B:CC.secondary, C:hexToInt(PALETTE.textMuted) };
    const ratingHex = { S:PALETTE.accentGold, A:PALETTE.primary, B:'#9B7DB8', C:PALETTE.textMuted };
    const ratingColor = ratingColors[rating], ratingColorHex = ratingHex[rating];

    const headerW = 340, headerH = 100;
    drawCandyCard(this, W/2, 80, headerW, headerH, CC.white, 5);
    drawGoldCorners(this, W/2, 80, headerW, headerH, 6, 8);
    this.add.text(W/2, 60, 'Settlement', { fontFamily:'Nunito', fontSize:'30px', fontStyle:'900', color:PALETTE.textDark }).setOrigin(0.5).setDepth(8);
    this.add.text(W/2, 96, EP.subtitle, { fontFamily:'Patrick Hand', fontSize:'18px', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(8);

    const rt = this.add.text(W/2, 230, rating, { fontFamily:'Nunito', fontSize:'96px', fontStyle:'900', color:ratingColorHex, stroke:PALETTE.textDark, strokeThickness:4 }).setOrigin(0.5).setDepth(10).setScale(0);
    if (rating === 'S') {
      const glow = this.add.circle(W/2, 230, 70, ratingColor, 0.25).setDepth(9).setScale(0);
      this.tweens.add({ targets:glow, scaleX:1.5, scaleY:1.5, alpha:0, duration:800 });
      const glow2 = this.add.circle(W/2, 230, 50, ratingColor, 0.15).setDepth(9).setScale(0);
      this.tweens.add({ targets:glow2, scaleX:2, scaleY:2, alpha:0, duration:1000, delay:100 });
      spawnParticles(this, W/2, 230, CC.accentGold, 16, 600);
      audio.success(); this.time.delayedCall(100, () => audio.success());
    } else if (rating === 'A') {
      const glow = this.add.circle(W/2, 230, 60, ratingColor, 0.18).setDepth(9).setScale(0);
      this.tweens.add({ targets:glow, scaleX:1.3, scaleY:1.3, alpha:0, duration:600 });
      audio.success();
    }
    this.tweens.add({ targets:rt, scaleX:1, scaleY:1, duration:400, ease:'Back.easeOut', delay:100 });

    const starCount = { S:4, A:3, B:2, C:1 }[rating];
    for (let i = 0; i < 4; i++) {
      const sx = W/2 - 54 + i*36, filled = i < starCount;
      const star = this.add.text(sx, 300, '\u2605', { fontFamily:'Nunito', fontSize:'30px', color:filled ? PALETTE.accentGold : '#D4C0AB', stroke:filled ? PALETTE.primaryDark : 'transparent', strokeThickness:filled ? 1 : 0 }).setOrigin(0.5).setDepth(10).setScale(0);
      this.tweens.add({ targets:star, scaleX:1, scaleY:1, duration:300, ease:'Back.easeOut', delay:200+i*80 });
    }

    this.add.text(W/2, 350, 'Score ' + this.finalScore, { fontFamily:'Nunito', fontSize:'28px', fontStyle:'900', color:PALETTE.textDark }).setOrigin(0.5).setDepth(10);
    this.add.text(W/2, 388, DISPLAY_ATTRIBUTE + ' ' + modText, { fontFamily:'Patrick Hand', fontSize:'22px', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(10);

    const scW = 140, scH = 86, statY = 465;
    drawCandyCard(this, W/2-scW/2-12, statY, scW, scH, CC.white, 5); drawGoldCorners(this, W/2-scW/2-12, statY, scW, scH, 5, 8);
    this.add.text(W/2-scW/2-12, statY-18, 'Max Combo', { fontFamily:'Nunito', fontSize:'13px', fontStyle:'700', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(8);
    this.add.text(W/2-scW/2-12, statY+14, String(this.maxCombo), { fontFamily:'Nunito', fontSize:'28px', fontStyle:'900', color:PALETTE.textDark }).setOrigin(0.5).setDepth(8);
    drawCandyCard(this, W/2+scW/2+12, statY, scW, scH, CC.white, 5); drawGoldCorners(this, W/2+scW/2+12, statY, scW, scH, 5, 8);
    this.add.text(W/2+scW/2+12, statY-18, 'Hits / Miss', { fontFamily:'Nunito', fontSize:'13px', fontStyle:'700', color:PALETTE.textMuted }).setOrigin(0.5).setDepth(8);
    this.add.text(W/2+scW/2+12, statY+14, this.hits + ' / ' + this.misses, { fontFamily:'Nunito', fontSize:'26px', fontStyle:'900', color:PALETTE.textDark }).setOrigin(0.5).setDepth(8);

    makeButton(this, { x:W/2, y:H-110, w:240, h:66, label:'Continue', fontSize:24, onTap:() => {
      notifyGameComplete({ rating, score:this.finalScore, attribute:ATTRIBUTE, modifier, gameId:EP.gameId, maxCombo:this.maxCombo, hits:this.hits, misses:this.misses });
      this.time.delayedCall(600, () => this.scene.start('BootScene'));
    }});
  }
}

// ── Phaser Config ────────────────────────────────────────────────────────────
const config = {
  type: Phaser.AUTO, width: W, height: H,
  fps: { forceSetTimeOut: true },
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [BootScene, NarrativeScene, GameScene, ResultScene]
};
window.__game = new Phaser.Game(config);
</script>
