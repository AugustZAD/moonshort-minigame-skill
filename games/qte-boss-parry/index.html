<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>QTE Boss Parry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1f2937; overflow: hidden; }
  canvas { display: block; margin: 0 auto; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>
const params = new URLSearchParams(window.location.search);
const ATTRIBUTE = params.get('attribute') || 'Charm';
const PRIMARY_COLOR = params.get('primaryColor') || '#ff6b9d';

const W = 393;
const H = 736;
const ROUND_SECONDS = 38;
const RATING_THRESHOLDS = { S: 430, A: 330, B: 225, C: 135 };
const MODIFIER_BY_RATING = { S: 3, A: 1, B: 0, C: -1 };

function getRating(score) {
  if (score >= RATING_THRESHOLDS.S) return 'S';
  if (score >= RATING_THRESHOLDS.A) return 'A';
  if (score >= RATING_THRESHOLDS.B) return 'B';
  if (score >= RATING_THRESHOLDS.C) return 'C';
  return 'C';
}

function getModifier(rating) {
  return MODIFIER_BY_RATING[rating];
}

function notifyGameComplete(result) {
  const payload = JSON.stringify(result);
  if (window.webkit?.messageHandlers?.jsBridge) {
    window.webkit.messageHandlers.jsBridge.postMessage(payload);
    return;
  }
  if (window.jsBridge?.postMessage) {
    window.jsBridge.postMessage(payload);
    return;
  }
  if (window.parent !== window) {
    window.parent.postMessage(payload, '*');
    return;
  }
  console.log('[GameComplete]', result);
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function hexToRgb(hex) {
  const raw = hex.replace('#', '');
  const full = raw.length === 3
    ? raw.split('').map((c) => c + c).join('')
    : raw;
  const value = parseInt(full, 16);
  return {
    r: (value >> 16) & 255,
    g: (value >> 8) & 255,
    b: value & 255
  };
}

function rgbToHex(r, g, b) {
  const toHex = (n) => clamp(Math.round(n), 0, 255).toString(16).padStart(2, '0');
  return '#' + toHex(r) + toHex(g) + toHex(b);
}

function blendHex(a, b, t) {
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);
  return rgbToHex(
    ca.r + (cb.r - ca.r) * t,
    ca.g + (cb.g - ca.g) * t,
    ca.b + (cb.b - ca.b) * t
  );
}

function fallbackPalette(primaryColor) {
  return {
    primary: primaryColor,
    light: blendHex(primaryColor, '#ffffff', 0.84),
    accent: blendHex(primaryColor, '#111827', 0.56),
    neutral: blendHex(primaryColor, '#1f2937', 0.75)
  };
}

async function fetchScenePalette(primaryColor) {
  const payload = {
    mode: 'transformer',
    num_colors: 4,
    temperature: '1.2',
    num_results: 20,
    adjacency: [
      '0', '65', '45', '35',
      '65', '0', '35', '65',
      '45', '35', '0', '35',
      '35', '65', '35', '0'
    ],
    palette: [primaryColor, '-', '-', '-']
  };
  const response = await fetch('https://api.huemint.com/color', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await response.json();
  if (!data || !Array.isArray(data.results) || data.results.length === 0) {
    throw new Error('No palette from Huemint');
  }
  const best = data.results.slice().sort((a, b) => a.score - b.score)[0];
  return {
    primary: best.palette[0],
    light: best.palette[1],
    accent: best.palette[2],
    neutral: best.palette[3]
  };
}

function colorSet(palette) {
  return {
    primaryHex: palette.primary,
    lightHex: palette.light,
    accentHex: palette.accent,
    neutralHex: palette.neutral,
    primary: Phaser.Display.Color.HexStringToColor(palette.primary).color,
    light: Phaser.Display.Color.HexStringToColor(palette.light).color,
    accent: Phaser.Display.Color.HexStringToColor(palette.accent).color,
    neutral: Phaser.Display.Color.HexStringToColor(palette.neutral).color,
    white: 0xffffff,
    dark: 0x111827,
    success: 0x34d399,
    danger: 0xf87171,
    gold: 0xffd700
  };
}

function makeButton(scene, cfg) {
  const x = cfg.x;
  const y = cfg.y;
  const w = cfg.w;
  const h = cfg.h;
  const shadow = scene.add.rectangle(x + 3, y + 3, w, h, scene.C.accent, 1).setDepth(20);
  const body = scene.add.rectangle(x, y, w, h, scene.C.primary, 1)
    .setStrokeStyle(2.5, scene.C.accent)
    .setInteractive({ useHandCursor: true })
    .setDepth(21);
  const label = scene.add.text(x, y, cfg.label, {
    fontFamily: 'Nunito',
    fontSize: cfg.fontSize + 'px',
    fontStyle: '900',
    color: '#ffffff'
  }).setOrigin(0.5).setDepth(22);

  const release = (emitTap) => {
    body.setPosition(x, y);
    label.setPosition(x, y);
    shadow.setVisible(true);
    if (emitTap && cfg.onTap) cfg.onTap();
  };

  body.on('pointerdown', () => {
    body.setPosition(x + 2, y + 2);
    label.setPosition(x + 2, y + 2);
    shadow.setVisible(false);
  });
  body.on('pointerup', () => release(true));
  body.on('pointerout', () => release(false));
}

class BootScene extends Phaser.Scene {
  constructor() {
    super('BootScene');
  }

  async create() {
    this.cameras.main.setBackgroundColor('#111827');
    this.add.text(W / 2, H / 2 - 16, 'QTE Boss Parry', {
      fontFamily: 'Nunito',
      fontSize: '34px',
      fontStyle: '900',
      color: '#ffffff'
    }).setOrigin(0.5);
    const statusText = this.add.text(W / 2, H / 2 + 24, 'Loading palette...', {
      fontFamily: 'Patrick Hand',
      fontSize: '22px',
      color: '#e5e7eb'
    }).setOrigin(0.5);

    const fallback = fallbackPalette(PRIMARY_COLOR);
    try {
      window.__PALETTE__ = await fetchScenePalette(PRIMARY_COLOR);
      statusText.setText('Palette ready');
    } catch (error) {
      window.__PALETTE__ = fallback;
      statusText.setText('Using fallback palette');
    }

    this.time.delayedCall(260, () => this.scene.start('GameScene'));
  }
}

class GameScene extends Phaser.Scene {
  constructor() {
    super('GameScene');
  }

  init() {
    this.score = 0;
    this.timeLeft = ROUND_SECONDS;
    this.isOver = false;
    this.attackActive = false;
    this.currentAttack = null;
    this.windupMs = 0;
    this.nextAttackMs = 700;
    this.playerHp = 3;
    this.bossHp = 100;
    this.combo = 0;
    this.maxCombo = 0;
    this.totalHits = 0;
    this.totalMiss = 0;
    this.attacks = [
      { key: 'parry', label: 'SLASH', symbol: 'S', counter: 'PARRY', color: '#f97316' },
      { key: 'dodge', label: 'HEAVY', symbol: 'H', counter: 'DODGE', color: '#3b82f6' },
      { key: 'block', label: 'BURST', symbol: 'B', counter: 'BLOCK', color: '#a855f7' }
    ];
  }

  create() {
    this.C = colorSet(window.__PALETTE__ || fallbackPalette(PRIMARY_COLOR));
    this.cameras.main.setBackgroundColor(this.C.lightHex);

    const dots = this.add.graphics();
    dots.fillStyle(this.C.primary, 0.09);
    for (let x = 20; x < W; x += 28) {
      for (let y = 18; y < H; y += 30) {
        dots.fillCircle(x + ((y / 30) % 2 ? 5 : -3), y, 2.2);
      }
    }

    this.add.rectangle(W / 2, 82, 350, 118, this.C.white, 1).setStrokeStyle(2.5, this.C.accent);
    this.add.text(W / 2, 46, 'QTE Boss Parry', {
      fontFamily: 'Nunito',
      fontSize: '28px',
      fontStyle: '900',
      color: this.C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 78, 'Read windup, choose counter action.', {
      fontFamily: 'Patrick Hand',
      fontSize: '19px',
      color: this.C.neutralHex
    }).setOrigin(0.5);

    this.scorePill = this.add.rectangle(24, 112, 138, 34, this.C.light, 1)
      .setOrigin(0, 0.5).setStrokeStyle(2, this.C.accent);
    this.scoreText = this.add.text(35, 112, 'Score 0', {
      fontFamily: 'Nunito',
      fontSize: '16px',
      fontStyle: '700',
      color: this.C.accentHex
    }).setOrigin(0, 0.5);

    this.timerPill = this.add.rectangle(W - 24, 112, 126, 34, this.C.light, 1)
      .setOrigin(1, 0.5).setStrokeStyle(2, this.C.accent);
    this.timerText = this.add.text(W - 34, 112, 'Time ' + this.timeLeft, {
      fontFamily: 'Nunito',
      fontSize: '16px',
      fontStyle: '700',
      color: this.C.accentHex
    }).setOrigin(1, 0.5);

    this.add.rectangle(W / 2, 356, 312, 328, this.C.white, 0.95).setStrokeStyle(2.5, this.C.accent);
    this.cueCircle = this.add.circle(W / 2, 290, 82, this.C.light, 1).setStrokeStyle(5, this.C.accent);
    this.cueText = this.add.text(W / 2, 290, '-', {
      fontFamily: 'Nunito',
      fontSize: '72px',
      fontStyle: '900',
      color: this.C.neutralHex
    }).setOrigin(0.5);
    this.attackLabel = this.add.text(W / 2, 360, 'Incoming: ...', {
      fontFamily: 'Nunito',
      fontSize: '21px',
      fontStyle: '700',
      color: this.C.accentHex
    }).setOrigin(0.5);

    this.windowBg = this.add.rectangle(W / 2, 398, 240, 20, this.C.light, 1).setStrokeStyle(2, this.C.accent);
    this.windowBar = this.add.rectangle(W / 2 - 116, 398, 0, 14, this.C.primary, 1).setOrigin(0, 0.5);
    this.statusText = this.add.text(W / 2, 560, 'Prepare to counter...', {
      fontFamily: 'Patrick Hand',
      fontSize: '20px',
      color: this.C.neutralHex
    }).setOrigin(0.5);
    this.comboText = this.add.text(W / 2, 590, 'Combo x0', {
      fontFamily: 'Nunito',
      fontSize: '20px',
      fontStyle: '700',
      color: this.C.accentHex
    }).setOrigin(0.5);

    this.playerHpText = this.add.text(42, 146, 'HP 3', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: this.C.accentHex
    }).setOrigin(0, 0.5);
    this.bossHpText = this.add.text(W - 42, 146, 'Boss 100%', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: this.C.accentHex
    }).setOrigin(1, 0.5);

    makeButton(this, {
      x: 86,
      y: H - 128,
      w: 112,
      h: 56,
      label: 'PARRY',
      fontSize: 22,
      onTap: () => this.handleCounter('parry')
    });
    makeButton(this, {
      x: W / 2,
      y: H - 128,
      w: 112,
      h: 56,
      label: 'DODGE',
      fontSize: 22,
      onTap: () => this.handleCounter('dodge')
    });
    makeButton(this, {
      x: W - 86,
      y: H - 128,
      w: 112,
      h: 56,
      label: 'BLOCK',
      fontSize: 22,
      onTap: () => this.handleCounter('block')
    });
  }

  setStatus(text, colorHex) {
    this.statusText.setText(text);
    this.statusText.setColor(colorHex || this.C.neutralHex);
    this.comboText.setText('Combo x' + this.combo);
  }

  addScore(delta) {
    this.score = Math.max(0, this.score + delta);
    this.scoreText.setText('Score ' + Math.round(this.score));
    this.tweens.add({
      targets: this.scoreText,
      scaleX: 1.14,
      scaleY: 1.14,
      yoyo: true,
      duration: 110,
      ease: 'Quad.easeOut'
    });
  }

  spawnAttack() {
    const atk = this.attacks[Math.floor(Math.random() * this.attacks.length)];
    this.currentAttack = atk;
    this.attackActive = true;
    this.windupMs = 620 + Math.random() * 360;
    this.cueText.setText(atk.symbol);
    this.cueText.setColor(atk.color);
    this.attackLabel.setText('Incoming: ' + atk.label);
    this.cueCircle.setStrokeStyle(5, Phaser.Display.Color.HexStringToColor(atk.color).color);
    this.setStatus('Counter with ' + atk.counter, atk.color);
  }

  clearAttack(nextMs) {
    this.attackActive = false;
    this.currentAttack = null;
    this.windupMs = 0;
    this.windowBar.width = 0;
    this.nextAttackMs = nextMs;
    this.cueCircle.setStrokeStyle(5, this.C.accent);
    this.cueText.setText('-');
    this.cueText.setColor(this.C.neutralHex);
    this.attackLabel.setText('Incoming: ...');
  }

  handleCounter(counter) {
    if (this.isOver) return;
    if (!this.attackActive) {
      this.combo = 0;
      this.totalMiss += 1;
      this.addScore(-4);
      this.setStatus('No attack to counter -4', '#dc2626');
      return;
    }

    if (counter === this.currentAttack.key) {
      const gain = 16 + Math.min(this.combo, 4) * 3;
      this.combo += 1;
      this.maxCombo = Math.max(this.maxCombo, this.combo);
      this.totalHits += 1;
      this.addScore(gain);
      this.bossHp = clamp(this.bossHp - (8 + this.combo), 0, 100);
      this.bossHpText.setText('Boss ' + this.bossHp + '%');
      this.setStatus('Perfect counter +' + gain, '#059669');
      this.clearAttack(220 + Math.random() * 360);
      if (this.bossHp <= 0) {
        this.addScore(80 + this.timeLeft * 2);
        this.finishGame('clear');
      }
      return;
    }

    this.combo = 0;
    this.totalMiss += 1;
    this.addScore(-8);
    this.playerHp = clamp(this.playerHp - 1, 0, 3);
    this.playerHpText.setText('HP ' + this.playerHp);
    this.setStatus('Wrong counter -8', '#dc2626');
    this.clearAttack(460 + Math.random() * 520);
    if (this.playerHp <= 0) this.finishGame('fail');
  }

  finishGame(reason) {
    if (this.isOver) return;
    this.isOver = true;
    this.scene.start('ResultScene', {
      score: Math.round(this.score),
      maxCombo: this.maxCombo,
      hits: this.totalHits,
      misses: this.totalMiss,
      reason: reason || 'time'
    });
  }

  update(time, delta) {
    if (this.isOver) return;

    this.timeLeft = Math.max(0, this.timeLeft - delta / 1000);
    this.timerText.setText('Time ' + Math.ceil(this.timeLeft));

    if (!this.attackActive) {
      this.nextAttackMs -= delta;
      if (this.nextAttackMs <= 0) this.spawnAttack();
    } else {
      this.windupMs -= delta;
      const ratio = clamp(this.windupMs / 1000, 0, 1);
      this.windowBar.width = 232 * ratio;
      if (this.windupMs <= 0) {
        this.totalMiss += 1;
        this.combo = 0;
        this.playerHp = clamp(this.playerHp - 1, 0, 3);
        this.playerHpText.setText('HP ' + this.playerHp);
        this.addScore(-7);
        this.setStatus('Counter too late -7', '#dc2626');
        this.clearAttack(430 + Math.random() * 520);
        if (this.playerHp <= 0) this.finishGame('fail');
      }
    }

    if (this.timeLeft <= 0) this.finishGame('time');
  }
}

class ResultScene extends Phaser.Scene {
  constructor() {
    super('ResultScene');
  }

  init(data) {
    this.finalScore = data.score || 0;
    this.maxCombo = data.maxCombo || 0;
    this.hits = data.hits || 0;
    this.misses = data.misses || 0;
  }

  create() {
    const C = colorSet(window.__PALETTE__ || fallbackPalette(PRIMARY_COLOR));
    this.C = C;
    this.cameras.main.setBackgroundColor(C.lightHex);

    const rating = getRating(this.finalScore);
    const modifier = getModifier(rating);
    const ratingColor = { S: '#ffd700', A: C.primaryHex, B: '#9ca3af', C: '#fb7185' }[rating];
    const modText = modifier > 0 ? '+' + modifier : String(modifier);

    this.add.rectangle(W / 2, 94, 350, 116, C.white, 1).setStrokeStyle(2.5, C.accent);
    this.add.text(W / 2, 50, 'Settlement', {
      fontFamily: 'Nunito',
      fontSize: '32px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 86, 'QTE Boss Parry', {
      fontFamily: 'Patrick Hand',
      fontSize: '21px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.text(W / 2, 252, rating, {
      fontFamily: 'Nunito',
      fontSize: '108px',
      fontStyle: '900',
      color: ratingColor,
      stroke: '#111827',
      strokeThickness: 4
    }).setOrigin(0.5);

    this.add.text(W / 2, 336, 'Score ' + this.finalScore, {
      fontFamily: 'Nunito',
      fontSize: '28px',
      fontStyle: '800',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 372, ATTRIBUTE + ' ' + modText, {
      fontFamily: 'Patrick Hand',
      fontSize: '24px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.rectangle(110, 448, 130, 78, C.white, 1).setStrokeStyle(2, C.accent);
    this.add.text(110, 432, 'Max Combo', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: C.neutralHex
    }).setOrigin(0.5);
    this.add.text(110, 463, String(this.maxCombo), {
      fontFamily: 'Nunito',
      fontSize: '30px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);

    this.add.rectangle(282, 448, 130, 78, C.white, 1).setStrokeStyle(2, C.accent);
    this.add.text(282, 432, 'Hits / Miss', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: C.neutralHex
    }).setOrigin(0.5);
    this.add.text(282, 463, this.hits + ' / ' + this.misses, {
      fontFamily: 'Nunito',
      fontSize: '28px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);

    makeButton(this, {
      x: W / 2,
      y: H - 132,
      w: 234,
      h: 58,
      label: 'Continue',
      fontSize: 26,
      onTap: () => {
        notifyGameComplete({
          rating: rating,
          score: this.finalScore,
          attribute: ATTRIBUTE,
          modifier: modifier,
          gameId: 'qte-boss-parry',
          maxCombo: this.maxCombo,
          hits: this.hits,
          misses: this.misses
        });
      }
    });
  }
}

const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [BootScene, GameScene, ResultScene]
};

window.__game = new Phaser.Game(config);
</script>
</body>
</html>
