<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Orbit Avoid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #172033; overflow: hidden; }
  canvas { display: block; margin: 0 auto; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
<script>
const CTX = window.__EPISODE_CTX__ || {};
const params = new URLSearchParams(window.location.search);
const ATTRIBUTE = CTX.attribute || params.get('attribute') || 'Focus';
const PRIMARY_COLOR = CTX.primaryColor || params.get('primaryColor') || '#ff6b9d';
const DISPLAY_ATTRIBUTE = (CTX.character && CTX.character.name ? CTX.character.name + '\u7684' : '') + ATTRIBUTE;

const W = 393;
const H = 736;
const ROUND_SECONDS = 45;
const RATING_THRESHOLDS = { S: 320, A: 245, B: 175, C: 100 };
const MODIFIER_BY_RATING = { S: 3, A: 1, B: 0, C: -1 };

function getRating(score) {
  if (score >= RATING_THRESHOLDS.S) return 'S';
  if (score >= RATING_THRESHOLDS.A) return 'A';
  if (score >= RATING_THRESHOLDS.B) return 'B';
  if (score >= RATING_THRESHOLDS.C) return 'C';
  return 'C';
}

function getModifier(rating) {
  return MODIFIER_BY_RATING[rating];
}

function notifyGameComplete(result) {
  const payload = JSON.stringify(result);
  if (window.webkit?.messageHandlers?.jsBridge) {
    window.webkit.messageHandlers.jsBridge.postMessage(payload);
    return;
  }
  if (window.jsBridge?.postMessage) {
    window.jsBridge.postMessage(payload);
    return;
  }
  if (window.parent !== window) {
    window.parent.postMessage(payload, '*');
    return;
  }
  console.log('[GameComplete]', result);
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function hexToRgb(hex) {
  const raw = hex.replace('#', '');
  const full = raw.length === 3 ? raw.split('').map((c) => c + c).join('') : raw;
  const value = parseInt(full, 16);
  return {
    r: (value >> 16) & 255,
    g: (value >> 8) & 255,
    b: value & 255
  };
}

function rgbToHex(r, g, b) {
  const toHex = (n) => clamp(Math.round(n), 0, 255).toString(16).padStart(2, '0');
  return '#' + toHex(r) + toHex(g) + toHex(b);
}

function blendHex(a, b, t) {
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);
  return rgbToHex(
    ca.r + (cb.r - ca.r) * t,
    ca.g + (cb.g - ca.g) * t,
    ca.b + (cb.b - ca.b) * t
  );
}

function colorSet(primaryColor) {
  const palette = {
    primary: primaryColor,
    light: blendHex(primaryColor, '#f8fafc', 0.88),
    accent: blendHex(primaryColor, '#111827', 0.62),
    neutral: blendHex(primaryColor, '#1f2937', 0.76)
  };
  return {
    primaryHex: palette.primary,
    lightHex: palette.light,
    accentHex: palette.accent,
    neutralHex: palette.neutral,
    primary: Phaser.Display.Color.HexStringToColor(palette.primary).color,
    light: Phaser.Display.Color.HexStringToColor(palette.light).color,
    accent: Phaser.Display.Color.HexStringToColor(palette.accent).color,
    neutral: Phaser.Display.Color.HexStringToColor(palette.neutral).color,
    white: 0xffffff,
    dark: 0x111827,
    success: 0x22c55e,
    danger: 0xef4444,
    gold: 0xffd700
  };
}

const C = colorSet(PRIMARY_COLOR);

function makeButton(scene, cfg) {
  const shadow = scene.add.rectangle(cfg.x + 3, cfg.y + 3, cfg.w, cfg.h, C.accent, 1).setDepth(20);
  const body = scene.add.rectangle(cfg.x, cfg.y, cfg.w, cfg.h, cfg.fill || C.primary, 1)
    .setStrokeStyle(2.5, C.accent)
    .setInteractive({ useHandCursor: true })
    .setDepth(21);
  const label = scene.add.text(cfg.x, cfg.y, cfg.label, {
    fontFamily: 'Nunito',
    fontSize: (cfg.fontSize || 22) + 'px',
    fontStyle: '900',
    color: cfg.textColor || '#ffffff'
  }).setOrigin(0.5).setDepth(22);

  const release = (emitTap) => {
    body.setPosition(cfg.x, cfg.y);
    label.setPosition(cfg.x, cfg.y);
    shadow.setVisible(true);
    if (emitTap && cfg.onTap) cfg.onTap();
  };

  body.on('pointerdown', () => {
    body.setPosition(cfg.x + 2, cfg.y + 2);
    label.setPosition(cfg.x + 2, cfg.y + 2);
    shadow.setVisible(false);
  });
  body.on('pointerup', () => release(true));
  body.on('pointerout', () => release(false));
}

class GameScene extends Phaser.Scene {
  constructor() {
    super('GameScene');
  }

  init() {
    this.score = 0;
    this.timeLeft = ROUND_SECONDS;
    this.isOver = false;
    this.combo = 0;
    this.maxCombo = 0;
    this.stars = 0;
    this.collisions = 0;
    this.playerAngle = 0;
    this.playerLane = 0;
    this.angularSpeed = 1.8;
    this.survivalMs = 0;
    this.hazards = [];
    this.spawnMs = 0;
    this.invulnMs = 0;
  }

  create() {
    this.cameras.main.setBackgroundColor(C.lightHex);

    const dots = this.add.graphics();
    dots.fillStyle(C.primary, 0.08);
    for (let x = 16; x < W; x += 26) {
      for (let y = 12; y < H; y += 28) {
        dots.fillCircle(x + ((y / 28) % 2 ? 4 : -2), y, 2);
      }
    }

    this.add.rectangle(W / 2, 82, 350, 118, C.white, 1).setStrokeStyle(2.5, C.accent);
    this.add.text(W / 2, 46, 'Orbit Avoid', {
      fontFamily: 'Nunito',
      fontSize: '30px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 78, 'Swap rings to dodge spikes and sweep stars.', {
      fontFamily: 'Patrick Hand',
      fontSize: '20px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.rectangle(24, 112, 142, 34, C.light, 1).setOrigin(0, 0.5).setStrokeStyle(2, C.accent);
    this.scoreText = this.add.text(36, 112, 'Score 0', {
      fontFamily: 'Nunito',
      fontSize: '16px',
      fontStyle: '700',
      color: C.accentHex
    }).setOrigin(0, 0.5);

    this.add.rectangle(W - 24, 112, 126, 34, C.light, 1).setOrigin(1, 0.5).setStrokeStyle(2, C.accent);
    this.timerText = this.add.text(W - 36, 112, 'Time ' + this.timeLeft, {
      fontFamily: 'Nunito',
      fontSize: '16px',
      fontStyle: '700',
      color: C.accentHex
    }).setOrigin(1, 0.5);

    this.add.rectangle(W / 2, 386, 322, 390, C.white, 0.96).setStrokeStyle(2.5, C.accent);
    this.center = { x: W / 2, y: 364 };
    this.radii = [84, 122];
    this.graphics = this.add.graphics();

    this.statusText = this.add.text(W / 2, 568, 'Outer ring is safer for stars, inner ring turns tighter', {
      fontFamily: 'Patrick Hand',
      fontSize: '20px',
      color: C.neutralHex,
      align: 'center',
      wordWrap: { width: 308 }
    }).setOrigin(0.5);
    this.comboText = this.add.text(W / 2, 614, 'Combo x0', {
      fontFamily: 'Nunito',
      fontSize: '20px',
      fontStyle: '700',
      color: C.accentHex
    }).setOrigin(0.5);

    makeButton(this, { x: W / 2, y: H - 58, w: 182, h: 54, label: 'Swap Ring', fontSize: 24, onTap: () => this.swapLane() });
    this.input.on('pointerdown', (pointer) => {
      if (pointer.y < 620) this.swapLane();
    });
    this.cursors = this.input.keyboard.createCursorKeys();
  }

  addScore(delta) {
    this.score = Math.max(0, this.score + delta);
    this.scoreText.setText('Score ' + Math.round(this.score));
    this.tweens.add({
      targets: this.scoreText,
      scaleX: 1.12,
      scaleY: 1.12,
      yoyo: true,
      duration: 110
    });
  }

  setStatus(text, color) {
    this.statusText.setText(text);
    this.statusText.setColor(color || C.neutralHex);
    this.comboText.setText('Combo x' + this.combo);
  }

  swapLane() {
    if (this.isOver) return;
    this.playerLane = this.playerLane === 0 ? 1 : 0;
  }

  spawnPair() {
    const hazardAngle = this.playerAngle + Phaser.Math.FloatBetween(1.1, 2.6);
    const starAngle = hazardAngle + Phaser.Math.FloatBetween(0.6, 1.4);
    const hazardLane = Phaser.Math.Between(0, 1);
    this.hazards.push({ type: 'hazard', lane: hazardLane, angle: Phaser.Math.Angle.Wrap(hazardAngle) });
    this.hazards.push({ type: 'star', lane: hazardLane === 0 ? 1 : 0, angle: Phaser.Math.Angle.Wrap(starAngle) });
  }

  drawOrbit() {
    this.graphics.clear();
    this.graphics.lineStyle(12, C.light, 1);
    this.graphics.strokeCircle(this.center.x, this.center.y, this.radii[1]);
    this.graphics.strokeCircle(this.center.x, this.center.y, this.radii[0]);
    this.graphics.fillStyle(C.accent, 0.12);
    this.graphics.fillCircle(this.center.x, this.center.y, 34);

    for (const item of this.hazards) {
      const radius = this.radii[item.lane];
      const x = this.center.x + Math.cos(item.angle) * radius;
      const y = this.center.y + Math.sin(item.angle) * radius;
      if (item.type === 'hazard') {
        this.graphics.fillStyle(C.danger, 1);
        this.graphics.fillTriangle(x, y - 12, x - 10, y + 10, x + 10, y + 10);
      } else {
        this.graphics.fillStyle(C.gold, 1);
        this.graphics.fillCircle(x, y, 8);
        this.graphics.fillStyle(C.white, 0.9);
        this.graphics.fillCircle(x + 2, y - 2, 2);
      }
    }

    const playerRadius = this.radii[this.playerLane];
    const px = this.center.x + Math.cos(this.playerAngle) * playerRadius;
    const py = this.center.y + Math.sin(this.playerAngle) * playerRadius;
    const playerColor = this.invulnMs > 0 && Math.floor(this.invulnMs / 80) % 2 === 0 ? C.white : C.primary;
    this.graphics.fillStyle(playerColor, 1);
    this.graphics.fillCircle(px, py, 10);
    this.graphics.fillStyle(C.dark, 1);
    this.graphics.fillCircle(px + 2, py - 2, 2);
  }

  finishGame() {
    if (this.isOver) return;
    this.isOver = true;
    this.scene.start('ResultScene', {
      score: Math.round(this.score),
      maxCombo: this.maxCombo,
      hits: this.stars,
      misses: this.collisions
    });
  }

  update(time, delta) {
    if (this.isOver) return;

    if (Phaser.Input.Keyboard.JustDown(this.cursors.space) || Phaser.Input.Keyboard.JustDown(this.cursors.up)) this.swapLane();

    this.timeLeft = Math.max(0, this.timeLeft - delta / 1000);
    this.timerText.setText('Time ' + Math.ceil(this.timeLeft));
    this.playerAngle = Phaser.Math.Angle.Wrap(this.playerAngle + this.angularSpeed * (delta / 1000));

    this.spawnMs -= delta;
    if (this.spawnMs <= 0) {
      this.spawnMs = 900;
      this.spawnPair();
    }

    if (this.invulnMs > 0) this.invulnMs -= delta;

    this.survivalMs += delta;
    if (this.survivalMs >= 1000) {
      this.survivalMs -= 1000;
      this.addScore(3);
    }

    for (let i = this.hazards.length - 1; i >= 0; i -= 1) {
      const item = this.hazards[i];
      const deltaAngle = Math.abs(Phaser.Math.Angle.Wrap(item.angle - this.playerAngle));
      if (deltaAngle < 0.15 && item.lane === this.playerLane) {
        if (item.type === 'star') {
          this.stars += 1;
          this.combo += 1;
          this.maxCombo = Math.max(this.maxCombo, this.combo);
          const gain = 14 + Math.min(this.combo, 4) * 2;
          this.addScore(gain);
          this.setStatus('Star sweep +' + gain, '#059669');
          this.hazards.splice(i, 1);
        } else if (this.invulnMs <= 0) {
          this.collisions += 1;
          this.combo = 0;
          this.addScore(-10);
          this.setStatus('Spike hit -10', '#dc2626');
          this.invulnMs = 900;
          this.hazards.splice(i, 1);
        }
      } else if (Math.abs(Phaser.Math.Angle.Wrap(item.angle - this.playerAngle)) > 2.8) {
        this.hazards.splice(i, 1);
      }
    }

    this.drawOrbit();
    if (this.timeLeft <= 0) this.finishGame();
  }
}

class ResultScene extends Phaser.Scene {
  constructor() {
    super('ResultScene');
  }

  init(data) {
    this.finalScore = data.score || 0;
    this.maxCombo = data.maxCombo || 0;
    this.hits = data.hits || 0;
    this.misses = data.misses || 0;
  }

  create() {
    this.cameras.main.setBackgroundColor(C.lightHex);
    const rating = getRating(this.finalScore);
    const modifier = getModifier(rating);
    const modText = modifier > 0 ? '+' + modifier : String(modifier);
    const ratingColor = { S: '#ffd700', A: C.primaryHex, B: '#9ca3af', C: '#fb7185' }[rating];

    this.add.rectangle(W / 2, 94, 350, 116, C.white, 1).setStrokeStyle(2.5, C.accent);
    this.add.text(W / 2, 50, 'Settlement', {
      fontFamily: 'Nunito',
      fontSize: '32px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 86, 'Orbit Avoid', {
      fontFamily: 'Patrick Hand',
      fontSize: '21px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.text(W / 2, 252, rating, {
      fontFamily: 'Nunito',
      fontSize: '108px',
      fontStyle: '900',
      color: ratingColor,
      stroke: '#111827',
      strokeThickness: 4
    }).setOrigin(0.5);

    this.add.text(W / 2, 336, 'Score ' + this.finalScore, {
      fontFamily: 'Nunito',
      fontSize: '28px',
      fontStyle: '800',
      color: C.accentHex
    }).setOrigin(0.5);
    this.add.text(W / 2, 372, DISPLAY_ATTRIBUTE + ' ' + modText, {
      fontFamily: 'Patrick Hand',
      fontSize: '24px',
      color: C.neutralHex
    }).setOrigin(0.5);

    this.add.rectangle(110, 448, 130, 78, C.white, 1).setStrokeStyle(2, C.accent);
    this.add.text(110, 432, 'Max Combo', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: C.neutralHex
    }).setOrigin(0.5);
    this.add.text(110, 463, String(this.maxCombo), {
      fontFamily: 'Nunito',
      fontSize: '30px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);

    this.add.rectangle(282, 448, 130, 78, C.white, 1).setStrokeStyle(2, C.accent);
    this.add.text(282, 432, 'Stars / Hit', {
      fontFamily: 'Nunito',
      fontSize: '15px',
      fontStyle: '700',
      color: C.neutralHex
    }).setOrigin(0.5);
    this.add.text(282, 463, this.hits + ' / ' + this.misses, {
      fontFamily: 'Nunito',
      fontSize: '28px',
      fontStyle: '900',
      color: C.accentHex
    }).setOrigin(0.5);

    makeButton(this, {
      x: W / 2,
      y: H - 132,
      w: 234,
      h: 58,
      label: 'Continue',
      fontSize: 26,
      onTap: () => {
        notifyGameComplete({
          rating: rating,
          score: this.finalScore,
          attribute: ATTRIBUTE,
          modifier: modifier,
          gameId: 'orbit-avoid',
          maxCombo: this.maxCombo,
          hits: this.hits,
          misses: this.misses
        });
      }
    });
  }
}

const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  backgroundColor: C.lightHex,
  scene: [GameScene, ResultScene]
};

window.__game = new Phaser.Game(config);
</script>
</body>
</html>
